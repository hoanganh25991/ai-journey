<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" fill="none">
  <rect width="960" height="540" fill="#0c1118"/>
  <rect x="60" y="160" width="360" height="220" rx="10" fill="#15202e" stroke="#f0a35e" stroke-width="2"/><text x="240.0" y="274.0" text-anchor="middle" fill="#e8eef7" font-family="IBM Plex Mono, monospace" font-size="14"></text>
  <text x="240" y="220" text-anchor="middle" fill="#f0a35e" font-family="IBM Plex Mono, monospace" font-size="16">TRAIN</text>
  <text x="240" y="260" text-anchor="middle" fill="#e8eef7" font-family="Sora, sans-serif" font-size="22">many GPU epochs</text>
  <text x="240" y="300" text-anchor="middle" fill="#8b97a8" font-family="IBM Plex Mono, monospace" font-size="14">data → loss → update weights</text>
  <text x="240" y="340" text-anchor="middle" fill="#8b97a8" font-family="IBM Plex Mono, monospace" font-size="14">output: checkpoint</text>
  <rect x="540" y="160" width="360" height="220" rx="10" fill="#15202e" stroke="#5ec8d4" stroke-width="2"/><text x="720.0" y="274.0" text-anchor="middle" fill="#e8eef7" font-family="IBM Plex Mono, monospace" font-size="14"></text>
  <text x="720" y="220" text-anchor="middle" fill="#5ec8d4" font-family="IBM Plex Mono, monospace" font-size="16">INFERENCE</text>
  <text x="720" y="260" text-anchor="middle" fill="#e8eef7" font-family="Sora, sans-serif" font-size="22">light realtime</text>
  <text x="720" y="300" text-anchor="middle" fill="#8b97a8" font-family="IBM Plex Mono, monospace" font-size="14">load weights → predict</text>
  <text x="720" y="340" text-anchor="middle" fill="#8b97a8" font-family="IBM Plex Mono, monospace" font-size="14">output: label / action</text>
  <path d="M430 270 H530" stroke="#e8eef7" stroke-width="2" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e8eef7"/></marker></defs>
  <text x="480" y="80" text-anchor="middle" fill="#e8eef7" font-family="Sora, sans-serif" font-size="28">Two lives of a model</text>
</svg>
