<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" fill="none">
  <rect width="960" height="540" fill="#0c1118"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f0a35e"/>
    </marker>
  </defs>
  <!-- center hub -->
  <circle cx="480" cy="270" r="52" fill="#15202e" stroke="#5ec8d4" stroke-width="2"/>
  <text x="480" y="265" text-anchor="middle" fill="#e8eef7" font-family="IBM Plex Mono, monospace" font-size="14">taxonomy</text>
  <text x="480" y="285" text-anchor="middle" fill="#8b97a8" font-family="IBM Plex Mono, monospace" font-size="11">keywords</text>
  <!-- nodes -->
  <g font-family="IBM Plex Mono, monospace" font-size="13" fill="#e8eef7">
    <rect x="60" y="80" width="160" height="56" rx="10" fill="#15202e" stroke="#f0a35e"/>
    <text x="140" y="114" text-anchor="middle">YouTube video</text>
    <rect x="740" y="80" width="160" height="56" rx="10" fill="#15202e" stroke="#5ec8d4"/>
    <text x="820" y="114" text-anchor="middle">Documents</text>
    <rect x="60" y="400" width="160" height="56" rx="10" fill="#15202e" stroke="#5ec8d4"/>
    <text x="140" y="434" text-anchor="middle">GitHub repos</text>
    <rect x="740" y="400" width="160" height="56" rx="10" fill="#15202e" stroke="#f0a35e"/>
    <text x="820" y="434" text-anchor="middle">Tavily web</text>
    <rect x="360" y="40" width="240" height="48" rx="10" fill="#15202e" stroke="#8b97a8"/>
    <text x="480" y="70" text-anchor="middle" fill="#8b97a8">topic links � bidirectional</text>
  </g>
  <line x1="220" y1="108" x2="430" y2="240" stroke="#f0a35e" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>
  <line x1="740" y1="108" x2="530" y2="240" stroke="#5ec8d4" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>
  <line x1="220" y1="428" x2="430" y2="300" stroke="#5ec8d4" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>
  <line x1="740" y1="428" x2="530" y2="300" stroke="#f0a35e" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>
  <!-- example topic chain -->
  <g font-family="IBM Plex Mono, monospace" font-size="12">
    <rect x="300" y="360" width="100" height="36" rx="8" fill="#1a2838" stroke="#f0a35e"/>
    <text x="350" y="383" text-anchor="middle" fill="#f0a35e">database</text>
    <rect x="430" y="360" width="100" height="36" rx="8" fill="#1a2838" stroke="#5ec8d4"/>
    <text x="480" y="383" text-anchor="middle" fill="#5ec8d4">sharding</text>
    <rect x="560" y="360" width="120" height="36" rx="8" fill="#1a2838" stroke="#f0a35e"/>
    <text x="620" y="383" text-anchor="middle" fill="#f0a35e">partition</text>
  </g>
  <line x1="400" y1="378" x2="430" y2="378" stroke="#8b97a8" stroke-width="1.5"/>
  <line x1="530" y1="378" x2="560" y2="378" stroke="#8b97a8" stroke-width="1.5"/>
</svg>
