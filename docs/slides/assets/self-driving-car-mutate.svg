<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Mutate N clones and keep best brain">
  <rect width="960" height="540" fill="#eef3f9"/>
  <text x="48" y="64" font-family="ui-monospace,monospace" font-size="22" fill="#c2703a">evolve</text>
  <text x="48" y="110" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="#16202e">N clones -&gt; mutate -&gt; bestBrain</text>
  <g transform="translate(80,180)">
    <rect x="0" y="0" width="140" height="90" rx="14" fill="#fff" stroke="#d0d7e0"/>
    <text x="70" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#16202e">brain</text>
    <text x="70" y="66" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#5a6b80">seed</text>
  </g>
  <path d="M240 225 H300" stroke="#0f8a9b" stroke-width="3" fill="none"/>
  <polygon points="300,218 318,225 300,232" fill="#0f8a9b"/>
  <g transform="translate(340,150)">
    <rect x="0" y="0" width="100" height="56" rx="10" fill="#fff" stroke="#d0d7e0"/>
    <rect x="120" y="0" width="100" height="56" rx="10" fill="#fff" stroke="#d0d7e0"/>
    <rect x="240" y="0" width="100" height="56" rx="10" fill="#fff" stroke="#d0d7e0"/>
    <rect x="60" y="80" width="100" height="56" rx="10" fill="#fff" stroke="#d0d7e0"/>
    <rect x="180" y="80" width="100" height="56" rx="10" fill="#fff" stroke="#d0d7e0"/>
    <text x="170" y="200" text-anchor="middle" font-family="ui-monospace,monospace" font-size="16" fill="#5a6b80">mutate +/-</text>
  </g>
  <path d="M680 225 H740" stroke="#0f8a9b" stroke-width="3" fill="none"/>
  <polygon points="740,218 758,225 740,232" fill="#0f8a9b"/>
  <g transform="translate(780,180)">
    <rect x="0" y="0" width="140" height="90" rx="14" fill="#f8ebe0" stroke="#c2703a"/>
    <text x="70" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#16202e">bestBrain</text>
    <text x="70" y="66" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#c2703a">save</text>
  </g>
  <text x="48" y="480" font-family="system-ui,sans-serif" font-size="18" fill="#5a6b80">Fitness = distance survived on the road. No labeled dataset required.</text>
</svg>
