mplex processes. Skill interactions: when adding a skill, consider overlap with existing ones (conflicting triggers or instructions). Anthropic Opus/Sonnet is strong at asking back to clarify interactions. References Anthropic — Agent Skills AGENTS.md — standard for declaring agent instructions Related mcp.md , 07 agents.md , 08 model notes.md"}, {"id": "train-gpu", "num": "17", "date": "05/2025", "title": "Train · PyTorch / TensorFlow · GPU", "summary": "HF/Kaggle datasets, PyTorch and TensorFlow, GPU notebooks, train → inference.", "topics": ["pytorch", "tensorflow", "GPU", "huggingface", "kaggle"], "group": "concept", "page": "notes/train-gpu.html", "slides": "slides/train-gpu/index.html", "demo": null, "extra_links": [], "search_text": "train · pytorch / tensorflow · gpu hf/kaggle datasets, pytorch and tensorflow, gpu notebooks, train → inference. pytorch tensorflow gpu huggingface kaggle train · pytorch / tensorflow · gpu notebooks where models actually learn : data from hugging face / kaggle, code in pytorch or tensorflow, many epochs on a gpu (colab/cloud) until good enough, then export weights. why it matters lab demos illustrate inference only. to get a model you can plug in, you must train somewhere with a gpu. this note collects the practical stack — which tools, where data lives, where to run — so you do not rebuild the checklist every time. key ideas two layers of work: layer job output training hf/kaggle → notebook/endpoint → many gpu epochs checkpoint inference load model → predict label / action see 06 train infer.md for the two phase mental model. stack used in practice: pytorch — flexible; most training code in the lab. tensorflow — softmax regression and embedding projector for visualizing vectors. data: hugging face datasets and kaggle — pre labeled, ready to download. gpu online: google colab / cloud notebooks — train to ~95%+ accuracy, then export. short workflow: in ai lab: browser demos show the flow; they do not replace gpu training. train in a notebook / kaggle / colab, then embed weights in ui demos (car nn, sentiment…). pipeline references pytorch — training a classifier hugging face datasets related 06 train infer.md — train vs infer demo: 04 demo car.md , 05 demo text.md , softmax.md", "body_text": "Train · PyTorch / TensorFlow · GPU notebooks Where models actually learn : data from Hugging Face / Kaggle, code in PyTorch or TensorFlow, many epochs on a GPU (Colab/cloud) until good enough, then export weights. Why it matters Lab demos illustrate inference only. To get a model you can plug in, you must train somewhere with a GPU. This note collects the practical stack — which tools, where data lives, where to run — so you do not rebuild the checklist every time. Key ideas Two layers of work: Layer Job Output Training HF/Kaggle → notebook/endpoint → many GPU epochs checkpoint Inference load model → predict label / action See 06 train infer.md for the two phase mental model. Stack used in practice: PyTorch — flexible; most training code in the lab. TensorFlow — softmax regression and Embedding Projector for visualizing vectors. Data: Hugging Face Datasets and Kaggle — pre labeled, ready to download. GPU online: Google Colab / cloud notebooks — train to ~95%+ accuracy, then export. Short workflow: In AI Lab: browser demos show the flow; they do not replace GPU training. Train in a notebook / Kaggle / Colab, then embed weights in UI demos (car nn, sentiment…). Pipeline References PyTorch — Training a classifier Hugging Face Datasets Related 06 train infer.md — train vs infer Demo: 04 demo car.md , 05 demo text.md , softmax.md"}, {"id": "car-nn", "num": "18", "date": "07/2025", "title": "Car NN — sensor to action", "summary": "3 sensors → fully connected network → forward / back / left / right. A visible classification example.", "topics": ["fully-connected", "classification", "sensors"], "group": "concept", "page": "notes/car-nn.html", "slides": "slides/car-nn/index.html", "demo": "demos/car-nn/app/index.html", "extra_links": [], "search_text": "car nn — sensor to action 3 sensors → fully connected network → forward / back / left / right. a visible classification example. fully connected classification sensors demo: car nn — from sensors to action a toy car with three distance sensors. a small fully connected network reads those three numbers and picks an action: forward, backward, turn left, or turn right. a visible example of classification. why it matters concept notes (embedding, softmax) stay abstract. this demo boils them down: input is three numbers, output is one of four actions, and you watch the decision change as obstacles move. you get a concrete feel for fully connected layer + softmax . key ideas input: left / center / right sensors, each a number in . clear path → near 1; obstacle nearby → drops toward 0. network: one or more fully connected layers map three inputs to four scores — one per action. decision: softmax.md turns four scores into probabilities; pick the highest → . learning intuition: training adjusts the fully connected weights so sensor patterns map to the right action. architecture: pipeline slides & demo link slides slides/car nn app demos/car nn/app related softmax.md — action selection step 06 train infer.md , train gpu.md — training the weights", "body_text": "Demo: Car NN — from sensors to action A toy car with three distance sensors. A small fully connected network reads those three numbers and picks an action: forward, backward, turn left, or turn right. A visible example of classification. Why it matters Concept notes (embedding, softmax) stay abstract. This demo boils them down: input is three numbers, output is one of four actions, and you watch the decision change as obstacles move. You get a concrete feel for fully connected layer + softmax . Key ideas Input: left / center / right sensors, each a number in . Clear path → near 1; obstacle nearby → drops toward 0. Network: one or more fully connected layers map three inputs to four scores — one per action. Decision: softmax.md turns four scores into probabilities; pick the highest → . Learning intuition: training adjusts the fully connected weights so sensor patterns map to the right action. Architecture: Pipeline Slides & demo Link Slides slides/car nn App demos/car nn/app Related softmax.md — action selection step 06 train infer.md , train gpu.md — training the weights"}, {"id": "sentiment-routing", "num": "19", "date": "09/2025", "title": "Sentiment & complexity routing", "summary": "Read a sentence and label it: sentiment (neg/neu/pos) and easy/hard routing.", "topics": ["sentiment", "routing", "classification"], "group": "concept", "page": "notes/sentiment-routing.html", "slides": "slides/sentiment/index.html", "demo": "demos/sentiment/app/index.html", "extra_links": [{"label": "Complexity router slides", "href": "slides/complexity-router/index.html"}, {"label": "Complexity router app", "href": "demos/complexity-router/app/index.html"}], "search_text": "sentiment & complexity routing read a sentence and label it: sentiment (neg/neu/pos) and easy/hard routing. sentiment routing classification demo: sentiment & complexity routing two text demos share one idea: read a sentence and label it. sentiment labels emotion; the complexity router labels easy vs hard to pick how to handle the request. why it matters this is where tokenize → embedding → softmax runs end to end on real sentences. classification is not only \"guess the mood\" — it also routes the system: easy queries get a fast path, hard ones mobilize heavier agents. key ideas sentiment (emotion classification): three classes — negative / neutral / positive. same chain: tokenize.md → embedding.md → softmax.md . complexity router (difficulty routing): classify requests as simple or complex, then route — simple to a fast/cheap model, complex to a multi agent crew or first mate. same shape, different purpose: both are classification; the label drives different downstream behavior — display sentiment vs choose the next path. routing saves cost: not every sentence needs the strongest model; the router balances quality and spend (same spirit as 08 model notes.md ). two pipelines: slides & demo demo slides app sentiment slides app complexity router slides app related tokenize.md , embedding.md , softmax.md 07 agents.md — crew / first mate for the complex branch train: 06 train infer.md , train gpu.md", "body_text": "Demo: Sentiment & Complexity routing Two text demos share one idea: read a sentence and label it. Sentiment labels emotion; the complexity router labels easy vs hard to pick how to handle the request. Why it matters This is where tokenize → embedding → softmax runs end to end on real sentences. Classification is not only \"guess the mood\" — it also routes the system: easy queries get a fast path, hard ones mobilize heavier agents. Key ideas Sentiment (emotion classification): three classes — negative / neutral / positive. Same chain: tokenize.md → embedding.md → softmax.md . Complexity router (difficulty routing): classify requests as simple or complex, then route — simple to a fast/cheap model, complex to a multi agent crew or first mate. Same shape, different purpose: both are classification; the label drives different downstream behavior — display sentiment vs choose the next path. Routing saves cost: not every sentence needs the strongest model; the router balances quality and spend (same spirit as 08 model notes.md ). Two pipelines: Slides & demo Demo Slides App Sentiment slides app Complexity router slides app Related tokenize.md , embedding.md , softmax.md 07 agents.md — crew / first mate for the complex branch Train: 06 train infer.md , train gpu.md"}, {"id": "train-infer", "num": "20", "date": "10/2025", "title": "Train → Inference", "summary": "Two lives of a model: learn weights once (train), then use lightly many times (infer).", "topics": ["train", "inference", "checkpoint"], "group": "concept", "page": "notes/train-infer.html", "slides": "slides/train-infer/index.html", "demo": null, "extra_links": [], "search_text": "train → inference two lives of a model: learn weights once (train), then use lightly many times (infer). train inference checkpoint train → inference every model lives two lives: learning (train) — spend heavy compute once to adjust weights — and using (inference) — run lightly again and again to predict. knowing the split clarifies what needs a gpu and what runs in the browser. why it matters beginners often treat \"ai\" as one block. training (many gpu epochs) happens once to produce a checkpoint; inference (predict on new input) is what runs every time a user clicks. lab demos are all inference — real training happens in notebooks / cloud gpu, then weights plug into the ui. key ideas two phases: phase work cost output train loop data for many epochs, compare prediction to label, update weights heavy, needs gpu checkpoint (weight file) inference load weights, feed input, get prediction light, realtime label / action learning = reducing error: each round the model predicts, measures loss (e.g. cross entropy with softmax.md ), then nudges weights toward lower loss. checkpoint is the product: after training, save weights; inference no longer needs training data. in ai lab: browser demos show inference only. heavy training in protonx / kaggle / colab notebooks → export → embed in ui. pipeline related full stack (pytorch, tensorflow, hf, kaggle, gpu): train gpu.md demo inference: 04 demo car.md , 05 demo text.md softmax.md — loss when training classifiers", "body_text": "Train → Inference Every model lives two lives: learning (train) — spend heavy compute once to adjust weights — and using (inference) — run lightly again and again to predict. Knowing the split clarifies what needs a GPU and what runs in the browser. Why it matters Beginners often treat \"AI\" as one block. Training (many GPU epochs) happens once to produce a checkpoint; inference (predict on new input) is what runs every time a user clicks. Lab demos are all inference — real training happens in notebooks / cloud GPU, then weights plug into the UI. Key ideas Two phases: Phase Work Cost Output Train loop data for many epochs, compare prediction to label, update weights heavy, needs GPU checkpoint (weight file) Inference load weights, feed input, get prediction light, realtime label / action Learning = reducing error: each round the model predicts, measures loss (e.g. cross entropy with softmax.md ), then nudges weights toward lower loss. Checkpoint is the product: after training, save weights; inference no longer needs training data. In AI Lab: browser demos show inference only. Heavy training in protonx / Kaggle / Colab notebooks → export → embed in UI. Pipeline Related Full stack (PyTorch, TensorFlow, HF, Kaggle, GPU): train gpu.md Demo inference: 04 demo car.md , 05 demo text.md softmax.md — loss when training classifiers"}, {"id": "agents", "num": "21", "date": "12/2025", "title": "AI Agents · harness comparison", "summary": "Harness ≠ model: Cursor, Claude Code, Pi, Cline/Kilo, OpenCode, Zed.", "topics": ["agents", "harness", "cursor", "claude", "pi", "first-mate"], "group": "concept", "page": "notes/agents.html", "slides": "slides/agents/index.html", "demo": "demos/mcp/app/index.html", "extra_links": [], "search_text": "ai agents · harness comparison harness ≠ model: cursor, claude code, pi, cline/kilo, opencode, zed. agents harness cursor claude pi first mate ai agents · harness comparison harness ≠ model. harness = orchestration software (ui, tool calling, context, agent loop). model = the brain plugged in. the same model on different harnesses feels very different. compare models at 08 model notes.md . why it matters picking a model is only half the story. the harness decides what context the model sees, which tools it can call, and how it loops until the job is done. two people with the same model in cursor vs claude code can have opposite experiences — because the harness differs. key ideas comparison table (personal experience): harness strengths limitations feel cursor fast feedback — see results and adjust immediately; auto vs fixed model; mcp + strong skills auto quality can be unpredictable fastest loop; default is cheap with very good quality claude code excellent at clarifying context; handles complex skills/rules well slower; session limits → wait solid for hard tasks / many constraints pi loads global ; lightweight smaller ecosystem same skills as cursor/claude, minimal overhead cline / kilo open, customizable; kilo clones cline quality depends on plugged in model good for rapid self directed testing opencode open source, many models fewer \"smart\" features than cursor test models via openrouter zed fast editor, compact agent agent less deep than cursor/claude lightweight coding auto vs fixed model: cursor auto is fast but quality varies with routing. fixed model (e.g. ) is controllable — in practice often better than auto without burning much budget (token efficiency? routing? worth investigating). what harnesses differ on: context management — how files get compressed and selected for the prompt. tool calling — mcp, shell, browser — smoothness and reliability. agent loop — self correction, tests, asking back. skills / rules — loading global know how from . first mate: orchestrates crew + — an agent that knows what to do and coordinates crewmates. lab ui: kun chen video + repo . homes: (global skills), (skill trials), (codebase link viz). slides & demo link mcp demo demos/mcp complexity router demos/complexity router references agents.md — standard for declaring agent instructions cursor docs · claude code related mcp.md , skills rules.md , 08 model notes.md", "body_text": "AI Agents · harness comparison Harness ≠ model. Harness = orchestration software (UI, tool calling, context, agent loop). Model = the brain plugged in. The same model on different harnesses feels very different. Compare models at 08 model notes.md . Why it matters Picking a model is only half the story. The harness decides what context the model sees, which tools it can call, and how it loops until the job is done. Two people with the same model in Cursor vs Claude Code can have opposite experiences — because the harness differs. Key ideas Comparison table (personal experience): Harness Strengths Limitations Feel Cursor fast feedback — see results and adjust immediately; Auto vs fixed model; MCP + strong skills Auto quality can be unpredictable fastest loop; default is cheap with very good quality Claude Code excellent at clarifying context; handles complex skills/rules well slower; session limits → wait solid for hard tasks / many constraints Pi loads global ; lightweight smaller ecosystem same skills as Cursor/Claude, minimal overhead Cline / Kilo open, customizable; Kilo clones Cline quality depends on plugged in model good for rapid self directed testing OpenCode open source, many models fewer \"smart\" features than Cursor test models via OpenRouter Zed fast editor, compact agent agent less deep than Cursor/Claude lightweight coding Auto vs fixed model: Cursor Auto is fast but quality varies with routing. Fixed model (e.g. ) is controllable — in practice often better than Auto without burning much budget (token efficiency? routing? worth investigating). What harnesses differ on: Context management — how files get compressed and selected for the prompt. Tool calling — MCP, shell, browser — smoothness and reliability. Agent loop — self correction, tests, asking back. Skills / rules — loading global know how from . First mate: orchestrates crew + — an agent that knows what to do and coordinates crewmates. Lab UI: Kun Chen video + repo . Homes: (global skills), (skill trials), (codebase link viz). Slides & demo Link MCP demo demos/mcp Complexity router demos/complexity router References AGENTS.md — standard for declaring agent instructions Cursor docs · Claude Code Related mcp.md , skills rules.md , 08 model notes.md"}, {"id": "model-notes", "num": "22", "date": "02/2026", "title": "Model field notes", "summary": "Model ≠ harness: Grok 4.5, Composer, Anthropic, DeepSeek, Qwen, Kimi/GLM.", "topics": ["grok", "openrouter", "deepseek", "anthropic", "composer", "cursor"], "group": "concept", "page": "notes/model-notes.html", "slides": "slides/model-notes/index.html", "demo": null, "extra_links": [], "search_text": "model field notes model ≠ harness: grok 4.5, composer, anthropic, deepseek, qwen, kimi/glm. grok openrouter deepseek anthropic composer cursor model field notes model ≠ harness. notes on the models themselves (via openrouter + cursor). compare harnesses at 07 agents.md . why it matters harness choice shapes daily workflow; model choice shapes reasoning quality, speed, and cost. these are personal field notes — not benchmarks — on what each model feels like in real coding work. key ideas quick table (personal experience): model / mode strong weak / cost grok 4.5 fast, smooth, high quality; moderate spend not top on every benchmark; more hallucination on unverifiable tasks composer 2.5 fast very fast, good replies costs more than auto cursor auto fast feedback loop quality varies with routing anthropic opus / sonnet / fable best at clarifying context and skills; reliable interaction slow; session limits deepseek v4 strong debug / fix on existing code no images; weaker on greenfield qwen 3 simple tasks weak on complex following / describing large projects without codebase kimi / glm good code expensive grok 4.5 — why it impresses: fast, smooth, genuinely good — especially as cursor default; does not burn much budget yet often beats auto. public context (xai, mid 2026): optimized for coding + agentic at ~ 80 tps ; ~ 4.2× fewer output tokens than opus 4.8 on swe bench pro → much cheaper per task ($2 in / $6 out per 1m). benchmarks competitive with opus 4.8 / gpt 5.5 on many coding evals; trained with cursor. main edge = intelligence per unit time and cost ontrols everything\" → Hermess polishes it. Milestone table: When Event In the lab 2023 first LLM exposure (ChatGPT/GPT 4) start studying March 2023 GPT 4, Claude 1, Llama 1 tokenize · embedding · attention · softmax · RAG 2024 Gemini 1.5, Claude 3.5, GPT 4o, o1 coding agents Nov 2024 MCP launches mcp 2025 Claude 4 / GPT 5 / R1 · AGENTS.md harness, skills 2026 Grok 4.5, Opus 4.8, GPT 5.6 model notes, automation Takeaways: journey goes from understanding models (2023–2024) → steering agents (late 2024 onward). MCP (November 2024) is the hinge. 2023 concepts are not outdated — tokenize / attention / RAG still underpin every agent. Watch harnesses (Cursor / Claude Code / pi), model waves (Grok 4.5…), automation (OpenClaw / Hermess). Related 07 agents.md , 08 model notes.md , 09 agent automation.md , mcp.md"}, {"id": "personal-knowledge-base", "num": "25", "date": "07/2026", "title": "Personal Knowledge-base — videos · docs · GitHub", "summary": "Separate repo ~/work-station/personal-kb: FTS search + Graph RAG keywords. Submodule planned.", "topics": ["knowledge-base", "youtube", "github-stars", "graph-rag", "taxonomy"], "group": "concept", "page": "notes/personal-knowledge-base.html", "slides": "slides/personal-knowledge-base/index.html", "demo": null, "extra_links": [{"label": "Knowledge-base README", "href": "../../personal-kb/README.md"}, {"label": "Knowledge-base plan", "href": "../../personal-kb/plans/knowledge-base.md"}, {"label": "Graph UI", "href": "../../personal-kb/ui/public/graph.html"}], "search_text": "personal knowledge base — videos · docs · github separate repo ~/work station/personal kb: fts search + graph rag keywords. submodule planned. knowledge base youtube github stars graph rag taxonomy personal knowledge base — videos · docs · github separate repo: will attach to ai lab as a git submodule (not added yet — run tooling from the sibling path). the hub searches notes only. personal knowledge base searches videos / github / work station files plus gr <script>
(function () {
  const payload = JSON.parse(document.getElementById("NOTES_DATA").textContent);
  const notes = payload.notes || [];
  const synGroups = payload.synonyms || [];
  let query = "";

  // ---- text utils -------------------------------------------------------- //
  function fold(s) {
    return String(s || "")
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/đ/g, "d");
  }
  // synonym lookup: word -> Set(all words in its groups)
  const synMap = {};
  for (const g of synGroups) {
    for (const w of g) {
      const k = fold(w);
      (synMap[k] || (synMap[k] = new Set())).add(k);
      for (const w2 of g) synMap[k].add(fold(w2));
    }
  }
  function expand(tok) {
    const out = new Set([tok]);
    if (synMap[tok]) synMap[tok].forEach((x) => out.add(x));
    return [...out];
  }
  function tokenize(q) {
    return fold(q).split(/[^a-z0-9_+.-]+/i).filter((t) => t.length > 1);
  }

  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  // ---- scoring ----------------------------------------------------------- //
  function scoreNote(n, toks) {
    if (!toks.length) return { s: 1, hit: null };
    const title = fold(n.title);
    const summary = fold(n.summary);
    const topics = (n.topics || []).map(fold);
    const body = fold(n.search_text || "");
    let s = 0;
    let matchedAll = true;
    for (const raw of toks) {
      const variants = expand(raw);
      let best = 0;
      for (const t of variants) {
        if (title.includes(t)) best = Math.max(best, title.startsWith(t) ? 6 : 5);
        if (topics.some((x) => x.includes(t))) best = Math.max(best, 3);
        if (summary.includes(t)) best = Math.max(best, 2);
        else if (body.includes(t)) best = Math.max(best, 1);
      }
      if (best === 0) matchedAll = false;
      s += best;
    }
    if (!matchedAll) return { s: 0, hit: null };
    return { s, hit: toks };
  }

  function snippet(n, toks) {
    const text = n.body_text || n.summary || "";
    const low = fold(text);
    let idx = -1;
    for (const raw of toks) {
      for (const t of expand(raw)) {
        const i = low.indexOf(t);
        if (i !== -1 && (idx === -1 || i < idx)) idx = i;
      }
      if (idx !== -1) break;
    }
    if (idx === -1) return "";
    const start = Math.max(0, idx - 40);
    let frag = text.slice(start, start + 160).trim();
    if (start > 0) frag = "… " + frag;
    frag = escapeHtml(frag);
    for (const raw of toks) {
      for (const t of expand(raw)) {
        if (t.length < 2) continue;
        const re = new RegExp("(" + t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
        frag = frag.replace(re, "<mark>$1</mark>");
      }
    }
    return frag;
  }

  function matched() {
    const toks = tokenize(query);
    return notes
      .map((n) => ({ n, ...scoreNote(n, toks) }))
      .filter((x) => x.s > 0)
      .sort((a, b) => b.s - a.s || a.n.title.localeCompare(b.n.title));
  }

  // ---- render ------------------------------------------------------------ //
  function badge(on, label) {
    return `<span class="badge ${on ? "on" : ""}">${label}</span>`;
  }

  function rowHtml(n, toks) {
    const snip = toks && toks.length ? snippet(n, toks) : "";
    return `
      <a class="row" href="${escapeHtml(n.page)}">
        ${n.date ? `<div class="row-date">${escapeHtml(n.date)}</div>` : ""}
        <div class="row-top">
          ${n.num ? `<span class="row-num">${escapeHtml(n.num)}</span>` : ""}
          <h3>${escapeHtml(n.title)}</h3>
          <span class="spacer"></span>
          <span class="badges">
            ${badge(!!n.slides, "slides")}
            ${badge(!!n.demo, "demo")}
          </span>
        </div>
        <p>${escapeHtml(n.summary)}</p>
        ${snip ? `<div class="snippet">${snip}</div>` : ""}
        <div class="topics">${(n.topics || []).slice(0, 5).map((t) => `<span>#${escapeHtml(t)}</span>`).join("")}</div>
      </a>`;
  }

  function followup(toks) {
    // suggest related topics / notes from the whole catalog
    const all = new Map();
    for (const n of notes) for (const t of n.topics || []) all.set(t, (all.get(t) || 0) + 1);
    const suggestions = [...all.keys()].filter((t) => {
      const ft = fold(t);
      return !toks.some((q) => ft.includes(q) || q.includes(ft));
    }).slice(0, 8);
    const chips = suggestions.map((t) => `<button type="button" data-chip="${escapeHtml(t)}">${escapeHtml(t)}</button>`).join("");
    return `
      <div class="followup">
        <h4>Few hits for “${escapeHtml(query)}”.</h4>
        <p>Search only covers <strong>notes</strong> (not videos/GitHub — see the Personal Knowledge-base note). Try a narrower query or pick a related topic:</p>
        <div class="chips">${chips}</div>
      </div>`;
  }

  function render() {
    const toks = tokenize(query);
    const rows = matched();
    document.getElementById("metaLine").textContent =
      `${rows.length}/${notes.length} notes · search = notes only · built ${payload.built_at || "?"}`;

    let html = "";
    if (query.trim()) {
      // flat ranked list with snippets
      html = rows.length
        ? `<div class="list">${rows.map((x) => rowHtml(x.n, toks)).join("")}</div>`
        : `<p class="empty">No matching notes.</p>`;
      if (rows.length < 2) html += followup(toks);
    } else {
      // flat browse list in catalog order
      html = notes.length
        ? `<div class="list">${notes.map((n) => rowHtml(n, null)).join("")}</div>`
        : `<p class="empty">No notes yet.</p>`;
    }
    document.getElementById("results").innerHTML = html;
  }

  // ---- events ------------------------------------------------------------ //
  const qEl = document.getElementById("q");
  document.getElementById("searchForm").addEventListener("submit", (e) => e.preventDefault());
  qEl.addEventListener("input", (e) => {
    query = e.target.value;
    const u = new URL(location);
    if (query) u.searchParams.set("q", query); else u.searchParams.delete("q");
    history.replaceState(null, "", u);
    render();
  });
  document.getElementById("results").addEventListener("click", (e) => {
    const chip = e.target.closest("button[data-chip]");
    if (chip) {
      query = chip.dataset.chip;
      qEl.value = query;
      const u = new URL(location); u.searchParams.set("q", query); history.replaceState(null, "", u);
      render();
      qEl.focus();
    }
  });

  document.getElementById("foot").textContent = "Build: ./scripts/build.sh — source: notes/*.md + catalog.json";

  // deep link ?q= and ?note=
  const params = new URLSearchParams(location.search);
  if (params.get("note")) {
    const n = notes.find((x) => x.id === params.get("note"));
    if (n) { location.replace(n.page); return; }
  }
  if (params.get("q")) { query = params.get("q"); qEl.value = query; }

  render();
  if (window.AiLabNav) {
    AiLabNav.enter("Home");
  }
  qEl.focus();
})();
</script>
