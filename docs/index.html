<style>

:root {
  --bg: #eef3f9; --surface: #ffffff; --ink: #16202e; --muted: #5a6b80;
  --teal: #0f8a9b; --teal-soft: rgba(15,138,155,.12); --amber: #c2703a;
  --line: rgba(20,32,46,.12); --line-soft: rgba(20,32,46,.07);
  --shadow: 0 1px 2px rgba(20,32,46,.05), 0 8px 24px rgba(20,32,46,.06);
  --font: Sora, system-ui, sans-serif; --serif: "Instrument Serif", Georgia, serif;
  --mono: "IBM Plex Mono", ui-monospace, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh; color: var(--ink); font-family: var(--font);
  background:
    radial-gradient(ellipse 60% 45% at 88% -5%, rgba(15,138,155,.10), transparent 60%),
    radial-gradient(ellipse 55% 45% at 0% 105%, rgba(194,112,58,.08), transparent 55%),
    var(--bg);
  -webkit-font-smoothing: antialiased;
}
a { color: var(--teal); }
::selection { background: var(--teal-soft); }

.shell { max-width: 880px; margin: 0 auto; padding: 56px 22px 96px; }
.brand {
  font-family: var(--serif); font-size: 40px; letter-spacing: -.02em;
  color: var(--ink); line-height: 1;
}
.brand em { font-style: italic; color: var(--teal); }
.tagline { margin-top: 10px; color: var(--muted); font-size: 15px; max-width: 560px; line-height: 1.5; }
.search-wrap { position: relative; margin: 30px 0 10px; }
#q {
  width: 100%; background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 18px 20px 18px 52px; color: var(--ink);
  font: 500 18px var(--font); box-shadow: var(--shadow);
}
#q:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 4px var(--teal-soft); }
.search-wrap svg { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--muted); }
.meta-line { font-family: var(--mono); font-size: 12px; color: var(--muted); margin: 10px 2px 22px; }
.filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 26px; }
.filters button {
  background: var(--surface); border: 1px solid var(--line); color: var(--muted);
  border-radius: 999px; padding: 8px 14px; font: 500 12px var(--mono); cursor: pointer;
  transition: all .15s;
}
.filters button:hover { border-color: var(--teal); color: var(--teal); }
.filters button.on { background: var(--teal); border-color: var(--teal); color: #fff; }
.section-label {
  font: 500 11px var(--mono); letter-spacing: .16em; text-transform: uppercase;
  color: var(--muted); margin: 26px 2px 12px;
}
.list { display: flex; flex-direction: column; gap: 8px; }
.row {
  display: block; text-decoration: none; color: inherit; background: var(--surface);
  border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px;
  transition: border-color .15s, transform .15s, box-shadow .15s;
}
.row:hover { border-color: var(--teal); transform: translateY(-1px); box-shadow: var(--shadow); }
.row-top { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.row h3 { font-size: 17px; font-weight: 600; letter-spacing: -.01em; }
.row .grp { font: 500 10px var(--mono); letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
.row .badge {
  font: 500 10px var(--mono); letter-spacing: .05em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 999px; border: 1px solid var(--line-soft); color: var(--muted);
}
.row .badge.on { color: var(--teal); border-color: var(--teal-soft); background: var(--teal-soft); }
.row p { color: var(--muted); font-size: 13.5px; line-height: 1.5; margin: 7px 0 0; }
.row .snippet { font-size: 13px; margin-top: 8px; color: var(--ink); opacity: .82; }
.row .topics { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.row .topics span { font: 500 11px var(--mono); color: var(--amber); }
.spacer { flex: 1; }
.badges { display: flex; gap: 6px; }
mark { background: rgba(194,112,58,.22); color: inherit; border-radius: 3px; padding: 0 2px; }
.followup {
  background: var(--surface); border: 1px dashed var(--line); border-radius: 14px;
  padding: 18px 20px; margin-top: 6px;
}
.followup h4 { font-size: 14px; margin-bottom: 6px; }
.followup p { color: var(--muted); font-size: 13px; line-height: 1.5; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.chips button {
  background: var(--teal-soft); border: 1px solid var(--teal-soft); color: var(--teal);
  border-radius: 999px; padding: 7px 13px; font: 500 12px var(--mono); cursor: pointer;
}
.chips button:hover { border-color: var(--teal); }
.empty { color: var(--muted); font-size: 14px; }
footer { margin-top: 40px; font: 12px var(--mono); color: var(--muted); }
</style>

"cursor", "claude", "pi", "first-mate"], "group": "concept", "page": "notes/agents.html", "slides": null, "demo": "demos/mcp/app/index.html", "extra_links": [], "search_text": "ai agents · so sánh harness harness ≠ model: cursor, claude code, pi, cline/kilo, opencode, zed. agents harness cursor claude pi first mate ai agents · so sánh harness harness ≠ model. harness = phần mềm điều phối (ui, tool calling, context, agent loop). model = bộ não cắm vào. cùng một model chạy trên harness khác nhau cho trải nghiệm rất khác. so sánh model ở 08 model notes.md . related demos mcp — tools protocol complexity router — simple vs crew notes: mcp.md , skills rules.md , 08 model notes.md bảng so sánh (kinh nghiệm cá nhân) harness điểm mạnh hạn chế cảm nhận cursor vòng feedback nhanh — thấy kết quả là chỉnh ngay; auto vs model cố định linh hoạt; mcp + skills tốt auto đôi khi khó đoán chất lượng tương tác nhanh nhất; default đốt ít tiền mà chất lượng rất tốt claude code clarify context cực mạnh — hỏi ngược để làm rõ; xử lý skill/rule phức tạp tốt chậm; có session limit → phải chờ chắc tay, hợp task khó / nhiều ràng buộc pi tự load global; nhẹ hệ sinh thái nhỏ hơn tiện dùng chung skill với cursor/claude cline / kilo open, tuỳ biến; kilo là clone của cline chất lượng phụ thuộc model cắm vào thử nghiệm nhanh, tự kiểm soát opencode open source, chạy nhiều model ít tính năng \"smart\" hơn cursor tốt để test model qua openrouter zed editor nhanh, agent tích hợp gọn agent chưa sâu bằng cursor/claude nhẹ, hợp code nhanh auto vs model cố định cursor auto : nhanh, feedback loop tốt, nhưng chất lượng dao động theo model được route. model cố định (vd đặt ): kiểm soát được, và trải nghiệm cá nhân thấy chạy tốt hơn auto mà không đốt nhiều tiền — cần investigate vì sao (token efficiency? routing?). điều gì tạo khác biệt giữa harness context management : cách nén / chọn file đưa vào prompt. tool calling : mcp, shell, browser — độ mượt và độ tin cậy. agent loop : có tự sửa lỗi, chạy test, hỏi ngược không. skills / rules : có nạp know how global ( ) không. first mate orchestrate crew + — một agent \"biết phải làm gì\", điều phối các crewmate. search lab ui: video kun chen + repo . homes — global skills — skill trials — method link viz", "body_text": "AI Agents · So sánh harness Harness ≠ model. Harness = phần mềm điều phối (UI, tool calling, context, agent loop). Model = bộ não cắm vào. Cùng một model chạy trên harness khác nhau cho trải nghiệm rất khác. So sánh model ở 08 model notes.md . Related demos MCP — tools protocol Complexity router — simple vs crew Notes: mcp.md , skills rules.md , 08 model notes.md Bảng so sánh (kinh nghiệm cá nhân) Harness Điểm mạnh Hạn chế Cảm nhận Cursor Vòng feedback nhanh — thấy kết quả là chỉnh ngay; Auto vs model cố định linh hoạt; MCP + skills tốt Auto đôi khi khó đoán chất lượng Tương tác nhanh nhất; default đốt ít tiền mà chất lượng rất tốt Claude Code Clarify context cực mạnh — hỏi ngược để làm rõ; xử lý skill/rule phức tạp tốt Chậm; có session limit → phải chờ Chắc tay, hợp task khó / nhiều ràng buộc Pi Tự load global; nhẹ Hệ sinh thái nhỏ hơn Tiện dùng chung skill với Cursor/Claude Cline / Kilo Open, tuỳ biến; Kilo là clone của Cline Chất lượng phụ thuộc model cắm vào Thử nghiệm nhanh, tự kiểm soát OpenCode Open source, chạy nhiều model Ít tính năng \"smart\" hơn Cursor Tốt để test model qua OpenRouter Zed Editor nhanh, agent tích hợp gọn Agent chưa sâu bằng Cursor/Claude Nhẹ, hợp code nhanh Auto vs model cố định Cursor Auto : nhanh, feedback loop tốt, nhưng chất lượng dao động theo model được route. Model cố định (vd đặt ): kiểm soát được, và trải nghiệm cá nhân thấy chạy tốt hơn Auto mà không đốt nhiều tiền — cần investigate vì sao (token efficiency? routing?). Điều gì tạo khác biệt giữa harness Context management : cách nén / chọn file đưa vào prompt. Tool calling : MCP, shell, browser — độ mượt và độ tin cậy. Agent loop : có tự sửa lỗi, chạy test, hỏi ngược không. Skills / rules : có nạp know how global ( ) không. First mate Orchestrate crew + — một agent \"biết phải làm gì\", điều phối các crewmate. Search Lab UI: video Kun Chen + repo . Homes — global skills — skill trials — method link viz"}, {"id": "model-notes", "title": "Model field notes", "summary": "Model ≠ harness: Grok 4.5, Composer, Anthropic, DeepSeek, Qwen, Kimi/GLM.", "topics": ["grok", "openrouter", "deepseek", "anthropic", "composer", "cursor"], "group": "concept", "page": "notes/model-notes.html", "slides": null, "demo": null, "extra_links": [], "search_text": "model field notes model ≠ harness: grok 4.5, composer, anthropic, deepseek, qwen, kimi/glm. grok openrouter deepseek anthropic composer cursor model field notes model ≠ harness. đây là cảm nhận về bản thân mô hình (qua openrouter + cursor). so sánh harness ở 07 agents.md . bảng nhanh (kinh nghiệm cá nhân) model / mode mạnh yếu / chi phí grok 4.5 nhanh, mượt, cảm giác rất tốt; chất lượng cao; đốt ít tiền không dẫn đầu mọi benchmark; hallucination cao hơn ở task không verify được composer 2.5 fast rất nhanh, trả lời tốt tốn tiền hơn auto cursor auto feedback loop nhanh chất lượng dao động theo routing anthropic opus / sonnet / fable hỏi ngược làm rõ context & skill cực tốt; tương tác chắc chậm; có session limit deepseek v4 debug / fix lỗi tốt không nhận ảnh; yếu khi code mới (greenfield) qwen 3 task đơn giản yếu ở complex follow / mô tả dự án lớn không có codebase kimi / glm code tốt đắt grok 4.5 — vì sao ấn tượng trải nghiệm: nhanh, mượt, thật sự rất tốt — đặc biệt khi để làm default trong cursor thì tiền không bị đốt nhiều mà chất lượng còn tốt hơn auto . context công khai (xai, 2026 07) khớp cảm nhận: tối ưu cho coding + agentic, phục vụ ở tốc độ ~ 80 tps (fast model). token efficiency : dùng ~4.2× ít output token hơn opus 4.8 trên swe bench pro → rẻ hơn nhiều mỗi task (giá $2 in / $6 out /1m). benchmark ngang tầm opus 4.8 / gpt 5.5 ở nhiều eval coding (mạnh terminal bench 2.1), không dẫn đầu tuyệt đối; được train cùng cursor. điểm mạnh chính = intelligence trên mỗi đơn vị thời gian & chi phí , hợp task verify được bằng máy. → đây chính là lý do \"chạy tốt hơn auto mà đốt ít tiền\": tốc độ cao + ít token. nguyên tắc rút ra greenfield (dự án mới, ít codebase): ưu tiên model mạnh reasoning (anthropic, grok) hơn deepseek/qwen. debug / fix trên codebase có sẵn : deepseek v4 rất hiệu quả, rẻ. cần ảnh (screenshot, diagram) : tránh deepseek (không nhận ảnh). cần tốc độ + chi phí thấp : grok 4.5 / composer fast. cần làm rõ ràng buộc, thiết kế skill : anthropic mạnh nhất ở hỏi ngược. related: 07 agents.md , mcp.md , skills rules.md , personal kb.md", "body_text": "Model field notes Model ≠ harness. Đây là cảm nhận về bản thân mô hình (qua OpenRouter + Cursor). So sánh harness ở 07 agents.md . Bảng nhanh (kinh nghiệm cá nhân) Model / Mode Mạnh Yếu / chi phí Grok 4.5 Nhanh, mượt, cảm giác rất tốt; chất lượng cao; đốt ít tiền Không dẫn đầu mọi benchmark; hallucination cao hơn ở task không verify được Composer 2.5 Fast Rất nhanh, trả lời tốt Tốn tiền hơn Auto Cursor Auto Feedback loop nhanh Chất lượng dao động theo routing Anthropic Opus / Sonnet / Fable Hỏi ngược làm rõ context & skill cực tốt; tương tác chắc Chậm; có session limit DeepSeek V4 Debug / fix lỗi tốt Không nhận ảnh; yếu khi code mới (greenfield) Qwen 3 Task đơn giản Yếu ở complex follow / mô tả dự án lớn không có codebase Kimi / GLM Code tốt Đắt Grok 4.5 — vì sao ấn tượng Trải nghiệm: nhanh, mượt, thật sự rất tốt — đặc biệt khi để làm default trong Cursor thì tiền không bị đốt nhiều mà chất lượng còn tốt hơn Auto . Context công khai (xAI, 2026 07) khớp cảm nhận: Tối ưu cho coding + agentic, phục vụ ở tốc độ ~ 80 TPS (fast model). Token efficiency : dùng ~4.2× ít output token hơn Opus 4.8 trên SWE Bench Pro → rẻ hơn nhiều mỗi task (giá $2 in / $6 out /1M). Benchmark ngang tầm Opus 4.8 / GPT 5.5 ở nhiều eval coding (mạnh Terminal Bench 2.1), không dẫn đầu tuyệt đối; được train cùng Cursor. Điểm mạnh chính = intelligence trên mỗi đơn vị thời gian & chi phí , hợp task verify được bằng máy. → Đây chính là lý do \"chạy tốt hơn Auto mà đốt ít tiền\": tốc độ cao + ít token. Nguyên tắc rút ra Greenfield (dự án mới, ít codebase): ưu tiên model mạnh reasoning (Anthropic, Grok) hơn DeepSeek/Qwen. Debug / fix trên codebase có sẵn : DeepSeek V4 rất hiệu quả, rẻ. Cần ảnh (screenshot, diagram) : tránh DeepSeek (không nhận ảnh). Cần tốc độ + chi phí thấp : Grok 4.5 / Composer Fast. Cần làm rõ ràng buộc, thiết kế skill : Anthropic mạnh nhất ở hỏi ngược. Related: 07 agents.md , mcp.md , skills rules.md , personal kb.md"}, {"id": "agent-automation", "title": "Agent automation — OpenClaw · Hermess", "summary": "Câu chuyện: OpenClaw (pi harness) mở màn cảm giác agent control mọi thứ → Hermess làm tốt.", "topics": ["openclaw", "hermess", "pi", "automation", "harness"], "group": "concept", "page": "notes/agent-automation.html", "slides": "demos/hermess/slides/index.html", "demo": null, "extra_links": [], "search_text": "agent automation — openclaw · hermess câu chuyện: openclaw (pi harness) mở màn cảm giác agent control mọi thứ → hermess làm tốt. openclaw hermess pi automation harness agent automation — openclaw · hermess câu chuyện cá nhân về làn sóng \"ai agent tự chạy việc\": từ chatbot trả lời → agent cầm tay làm (chạy lệnh, đụng file, điều khiển máy). hai con mình dùng qua: openclaw và hermess . bối cảnh trước đây ai chỉ trả lời : hỏi — đáp, còn làm là việc của mình. bước ngoặt là khi agent bắt đầu tích hợp vào máy và control mọi thứ : tự mở terminal, sửa file, gọi tool, chạy cả một chuỗi task mà không cần mình bấm từng bước. openclaw — con đầu tiên cho cảm giác đó dùng làm harness: đơn giản, nhanh, gọn, nhẹ — cắm vào là chạy task ngay. điểm khiến nó đáng nhớ: nó là thằng đầu tiên cho người ta cảm giác \"ai agent integrate sâu, control giúp mọi thứ\". không chỉ gợi ý — nó thực sự làm : đọc/ghi file, chạy shell, tự nối các bước. lần đầu thấy một agent \"cầm lái\" thay vì chỉ ngồi cạnh nhắc bài. triết lý: harness mỏng, ít ma sát → thử nghiệm <script>
(function () {
  const payload = JSON.parse(document.getElementById("NOTES_DATA").textContent);
  const notes = payload.notes || [];
  const synGroups = payload.synonyms || [];
  let query = "";

  // ---- text utils -------------------------------------------------------- //
  function fold(s) {
    return String(s || "")
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/đ/g, "d");
  }
  // synonym lookup: word -> Set(all words in its groups)
  const synMap = {};
  for (const g of synGroups) {
    for (const w of g) {
      const k = fold(w);
      (synMap[k] || (synMap[k] = new Set())).add(k);
      for (const w2 of g) synMap[k].add(fold(w2));
    }
  }
  function expand(tok) {
    const out = new Set([tok]);
    if (synMap[tok]) synMap[tok].forEach((x) => out.add(x));
    return [...out];
  }
  function tokenize(q) {
    return fold(q).split(/[^a-z0-9_+.-]+/i).filter((t) => t.length > 1);
  }

  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  // ---- scoring ----------------------------------------------------------- //
  function scoreNote(n, toks) {
    if (!toks.length) return { s: 1, hit: null };
    const title = fold(n.title);
    const summary = fold(n.summary);
    const topics = (n.topics || []).map(fold);
    const body = fold(n.search_text || "");
    let s = 0;
    let matchedAll = true;
    for (const raw of toks) {
      const variants = expand(raw);
      let best = 0;
      for (const t of variants) {
        if (title.includes(t)) best = Math.max(best, title.startsWith(t) ? 6 : 5);
        if (topics.some((x) => x.includes(t))) best = Math.max(best, 3);
        if (summary.includes(t)) best = Math.max(best, 2);
        else if (body.includes(t)) best = Math.max(best, 1);
      }
      if (best === 0) matchedAll = false;
      s += best;
    }
    if (!matchedAll) return { s: 0, hit: null };
    return { s, hit: toks };
  }

  function snippet(n, toks) {
    const text = n.body_text || n.summary || "";
    const low = fold(text);
    let idx = -1;
    for (const raw of toks) {
      for (const t of expand(raw)) {
        const i = low.indexOf(t);
        if (i !== -1 && (idx === -1 || i < idx)) idx = i;
      }
      if (idx !== -1) break;
    }
    if (idx === -1) return "";
    const start = Math.max(0, idx - 40);
    let frag = text.slice(start, start + 160).trim();
    if (start > 0) frag = "… " + frag;
    frag = escapeHtml(frag);
    for (const raw of toks) {
      for (const t of expand(raw)) {
        if (t.length < 2) continue;
        const re = new RegExp("(" + t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
        frag = frag.replace(re, "<mark>$1</mark>");
      }
    }
    return frag;
  }

  function matched() {
    const toks = tokenize(query);
    return notes
      .map((n) => ({ n, ...scoreNote(n, toks) }))
      .filter((x) => x.s > 0)
      .sort((a, b) => b.s - a.s || a.n.title.localeCompare(b.n.title));
  }

  // ---- render ------------------------------------------------------------ //
  function badge(on, label) {
    return `<span class="badge ${on ? "on" : ""}">${label}</span>`;
  }

  function rowHtml(n, toks) {
    const snip = toks && toks.length ? snippet(n, toks) : "";
    return `
      <a class="row" href="${escapeHtml(n.page)}">
        <div class="row-top">
          <h3>${escapeHtml(n.title)}</h3>
          <span class="spacer"></span>
          <span class="badges">
            ${badge(!!n.slides, "slides")}
            ${badge(!!n.demo, "demo")}
          </span>
        </div>
        <p>${escapeHtml(n.summary)}</p>
        ${snip ? `<div class="snippet">${snip}</div>` : ""}
        <div class="topics">${(n.topics || []).slice(0, 5).map((t) => `<span>#${escapeHtml(t)}</span>`).join("")}</div>
      </a>`;
  }

  function followup(toks) {
    // suggest related topics / notes from the whole catalog
    const all = new Map();
    for (const n of notes) for (const t of n.topics || []) all.set(t, (all.get(t) || 0) + 1);
    const suggestions = [...all.keys()].filter((t) => {
      const ft = fold(t);
      return !toks.some((q) => ft.includes(q) || q.includes(ft));
    }).slice(0, 8);
    const chips = suggestions.map((t) => `<button type="button" data-chip="${escapeHtml(t)}">${escapeHtml(t)}</button>`).join("");
    return `
      <div class="followup">
        <h4>Ít kết quả cho “${escapeHtml(query)}”.</h4>
        <p>Search chỉ quét <strong>notes</strong> (không phải video/GitHub — xem note Personal KB). Thử thu hẹp hoặc chọn một hướng liên quan:</p>
        <div class="chips">${chips}</div>
      </div>`;
  }

  function render() {
    const toks = tokenize(query);
    const rows = matched();
    document.getElementById("metaLine").textContent =
      `${rows.length}/${notes.length} notes · search = notes only · built ${payload.built_at || "?"}`;

    let html = "";
    if (query.trim()) {
      // flat ranked list with snippets
      html = rows.length
        ? `<div class="list">${rows.map((x) => rowHtml(x.n, toks)).join("")}</div>`
        : `<p class="empty">Không có note khớp.</p>`;
      if (rows.length < 2) html += followup(toks);
    } else {
      // flat browse list in catalog order
      html = notes.length
        ? `<div class="list">${notes.map((n) => rowHtml(n, null)).join("")}</div>`
        : `<p class="empty">Chưa có note.</p>`;
    }
    document.getElementById("results").innerHTML = html;
  }

  // ---- events ------------------------------------------------------------ //
  const qEl = document.getElementById("q");
  document.getElementById("searchForm").addEventListener("submit", (e) => e.preventDefault());
  qEl.addEventListener("input", (e) => {
    query = e.target.value;
    const u = new URL(location);
    if (query) u.searchParams.set("q", query); else u.searchParams.delete("q");
    history.replaceState(null, "", u);
    render();
  });
  document.getElementById("results").addEventListener("click", (e) => {
    const chip = e.target.closest("button[data-chip]");
    if (chip) {
      query = chip.dataset.chip;
      qEl.value = query;
      const u = new URL(location); u.searchParams.set("q", query); history.replaceState(null, "", u);
      render();
      qEl.focus();
    }
  });

  document.getElementById("foot").textContent = "Build: python3 scripts/build-docs.py — source: notes/*.md + catalog.json";

  // deep link ?q= and ?note=
  const params = new URLSearchParams(location.search);
  if (params.get("note")) {
    const n = notes.find((x) => x.id === params.get("note"));
    if (n) { location.replace(n.page); return; }
  }
  if (params.get("q")) { query = params.get("q"); qEl.value = query; }

  render();
  qEl.focus();
})();
</script>
</body>
</html>
