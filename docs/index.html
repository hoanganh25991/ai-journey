    if (pref !== "light" && pref !== "dark" && pref !== "system") pref = "system";
    var dark = pref === "dark" || (pref === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");

(function () {

    if (pref !== "en" && pref !== "vi" && pref !== "system") pref = "system";
    var nav = String(navigator.language || "en").toLowerCase();
    var resolved = pref === "system" ? (nav.indexOf("vi") === 0 ? "vi" : "en") : pref;

    document.documentElement.setAttribute("data-lang", resolved);
    document.documentElement.lang = resolved;

body {

<script>
(function () {
  var KEY = "ai-lab-theme";
  function resolve(pref) {
    if (pref === "light" || pref === "dark") return pref;
    return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  }
  function apply(pref) {
    if (pref !== "light" && pref !== "dark" && pref !== "system") pref = "system";
    var resolved = resolve(pref);
    document.documentElement.setAttribute("data-theme", resolved);
    document.documentElement.setAttribute("data-theme-pref", pref);
    try { localStorage.setItem(KEY, pref); } catch (e) {}
    document.querySelectorAll("[data-theme-set]").forEach(function (btn) {
      btn.classList.toggle("on", btn.getAttribute("data-theme-set") === pref);
    });
  }
  var pref = document.documentElement.getAttribute("data-theme-pref") || "system";
  apply(pref);
  document.querySelectorAll("[data-theme-set]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      apply(btn.getAttribute("data-theme-set"));
    });
  });
  try {
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () {
      var p = document.documentElement.getAttribute("data-theme-pref") || "system";
      if (p === "system") apply("system");
    });
  } catch (e) {}
})();
</script>

<script>
(function () {
  var KEY = "ai-lab-lang";
  var CACHE_KEY = "ai-lab-i18n-en-vi";
  var SKIP = /^(SCRIPT|STYLE|NOSCRIPT|CODE|PRE|KBD|SAMP|TEXTAREA|SVG|MATH)$/;
  var cache = {};
  try { cache = JSON.parse(localStorage.getItem(CACHE_KEY) || "{}") || {}; } catch (e) { cache = {}; }

  function resolve(pref) {
    if (pref === "en" || pref === "vi") return pref;
    var nav = String(navigator.language || "en").toLowerCase();
    return nav.indexOf("vi") === 0 ? "vi" : "en";
  }

  function saveCache() {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch (e) {}
  }

  async function translateOne(text) {
    if (!text || !text.trim()) return text;
    if (cache[text]) return cache[text];
    // Google gtx web endpoint (no API key). Fallback: MyMemory.
    var q = encodeURIComponent(text);
    try {
      var url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=" + q;
      var res = await fetch(url);
      if (res.ok) {
        var data = await res.json();
        var out = (data[0] || []).map(function (row) { return row[0] || ""; }).join("");
        if (out) { cache[text] = out; return out; }
      }
    } catch (e) {}
    try {
      var url2 = "https://api.mymemory.translated.net/get?langpair=en|vi&q=" + q;
      var res2 = await fetch(url2);
      if (res2.ok) {
        var data2 = await res2.json();
        var out2 = data2 && data2.responseData && data2.responseData.translatedText;
        if (out2 && out2.indexOf("MYMEMORY WARNING") === -1) {
          cache[text] = out2;
          return out2;
        }
      }
    } catch (e2) {}
    return text;
  }

  function collectNodes(root) {
    var out = [];
    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode: function (node) {
        if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
        var el = node.parentElement;
        if (!el) return NodeFilter.FILTER_REJECT;
        if (el.closest("[translate=no], .notranslate, .theme-bar, .lang-bar, .prefs, code, pre, kbd, samp")) {
          return NodeFilter.FILTER_REJECT;
        }
        if (SKIP.test(el.tagName)) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    while (walker.nextNode()) out.push(walker.currentNode);
    return out;
  }

  async function mapPool(items, limit, fn) {
    var i = 0;
    var workers = [];
    async function worker() {
      while (i < items.length) {
        var idx = i++;
        items[idx].result = await fn(items[idx].src);
      }
    }
    for (var w = 0; w < Math.min(limit, items.length); w++) workers.push(worker());
    await Promise.all(workers);
  }

  async function applyLang(pref) {
    if (pref !== "en" && pref !== "vi" && pref !== "system") pref = "system";
    var resolved = resolve(pref);
    document.documentElement.setAttribute("data-lang-pref", pref);
    document.documentElement.setAttribute("data-lang", resolved);
    document.documentElement.lang = resolved;
    try { localStorage.setItem(KEY, pref); } catch (e) {}
    document.querySelectorAll("[data-lang-set]").forEach(function (btn) {
      btn.classList.toggle("on", btn.getAttribute("data-lang-set") === pref);
    });

    var nodes = collectNodes(document.body);
    nodes.forEach(function (node) {
      if (node._i18nEn == null) node._i18nEn = node.nodeValue;
    });

    if (resolved === "en") {
      nodes.forEach(function (node) {
        if (node._i18nEn != null) node.nodeValue = node._i18nEn;
      });
      return;
    }

    document.documentElement.classList.add("i18n-busy");
    try {
      var jobs = nodes.map(function (node) {
        return { node: node, src: node._i18nEn };
      });
      await mapPool(jobs, 4, translateOne);
      jobs.forEach(function (job) {
        job.node.nodeValue = job.result;
      });
      saveCache();
    } finally {
      document.documentElement.classList.remove("i18n-busy");
    }
  }

  var pref = document.documentElement.getAttribute("data-lang-pref") || "system";
  document.querySelectorAll("[data-lang-set]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      applyLang(btn.getAttribute("data-lang-set"));
    });
  });
  // Defer first translate so DOM is ready
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function () { applyLang(pref); });
  } else {
    applyLang(pref);
  }
})();
</script>

ck, but sequences get very long. Vocabulary: a fixed set of tokens the model knows; each token maps to one ID. Example: . BPE vs WordPiece: two ways to build a subword vocabulary. Both merge frequent pairs; they differ in merge criteria. GPT uses BPE; BERT uses WordPiece. Rough rule: one token ≈ four English characters — model cost is counted in tokens, not characters. Wrong tokenizer = wrong everything: train with one tokenizer, run with another → IDs mismatch → the model misreads input completely. Illustrations Text split into tokens, each token highlighted in a different color BPE and WordPiece: two ways to build a subword vocabulary Merge frequent character pairs step by step to build the vocabulary Pipeline Token IDs feed embedding.md ; from there the path goes to attention, classification, and RAG. Slides & demo Link Slides slides/tokenize Working app demos/tokenize/app References Hugging Face — Tokenizers summary Sennrich et al. 2016 — Neural Machine Translation of Rare Words with Subword Units (BPE) Related embedding.md , 05 demo text.md"}, {"id": "embedding", "num": "02", "date": "03/2023", "title": "Embedding", "summary": "Turn IDs into vectors: similar meaning → nearby points, measured with cosine similarity.", "topics": ["embedding", "cosine", "CBOW"], "group": "concept", "page": "notes/embedding.html", "slides": "slides/embedding/index.html", "demo": "demos/embedding/app/index.html", "extra_links": [], "search_text": "embedding turn ids into vectors: similar meaning → nearby points, measured with cosine similarity. embedding cosine cbow embedding turn each token id into a vector — a list of numbers. the key idea: things close in meaning sit close together in that number space. why it matters an id is just a label: , — whether those numbers are near or far means nothing. embedding replaces each id with a learned vector so \"dog\" and \"cat\" (both pets) land close together, while \"dog\" and \"invoice\" land far apart. that lets the machine measure semantic similarity — the foundation of semantic search, classification, and rag. key ideas vector = meaning coordinates: each token or sentence is a point in high dimensional space (often 300–1536 dimensions). similar meaning → nearby points. learn from context: models like cbow/word2vec learn vectors by predicting words from their neighbors. \"you are known by the company you keep.\" cosine similarity: compare the direction of two vectors, not their length. same direction → cosine ≈ 1 (very similar); perpendicular → ≈ 0. cosine or dot product? cosine normalizes length — good when you care about topic, not strength. dot product also weights vector magnitude. not just text: images, audio, users — anything can be embedded and compared in the same space. illustrations embedding: a function that maps each token to a dense vector cbow learns vectors from surrounding context words cosine similarity: measure the angle between two meaning vectors words projected into 3d space in tensorflow projector pipeline embedding takes output from tokenize.md and powers both attention.md and rag.md . slides & demo link slides slides/embedding working app demos/embedding/app references google — machine learning crash course: embeddings mikolov et al. 2013 — word2vec related tokenize.md , rag.md , 05 demo text.md", "body_text": "Embedding Turn each token ID into a vector — a list of numbers. The key idea: things close in meaning sit close together in that number space. Why it matters An ID is just a label: , — whether those numbers are near or far means nothing. Embedding replaces each ID with a learned vector so \"dog\" and \"cat\" (both pets) land close together, while \"dog\" and \"invoice\" land far apart. That lets the machine measure semantic similarity — the foundation of semantic search, classification, and RAG. Key ideas Vector = meaning coordinates: each token or sentence is a point in high dimensional space (often 300–1536 dimensions). Similar meaning → nearby points. Learn from context: models like CBOW/Word2Vec learn vectors by predicting words from their neighbors. \"You are known by the company you keep.\" Cosine similarity: compare the direction of two vectors, not their length. Same direction → cosine ≈ 1 (very similar); perpendicular → ≈ 0. Cosine or dot product? Cosine normalizes length — good when you care about topic, not strength. Dot product also weights vector magnitude. Not just text: images, audio, users — anything can be embedded and compared in the same space. Illustrations Embedding: a function that maps each token to a dense vector CBOW learns vectors from surrounding context words Cosine similarity: measure the angle between two meaning vectors Words projected into 3D space in TensorFlow Projector Pipeline Embedding takes output from tokenize.md and powers both attention.md and rag.md . Slides & demo Link Slides slides/embedding Working app demos/embedding/app References Google — Machine Learning Crash Course: Embeddings Mikolov et al. 2013 — Word2Vec Related tokenize.md , rag.md , 05 demo text.md"}, {"id": "attention", "num": "03", "date": "05/2023", "title": "Attention", "summary": "Each word decides which other words to attend to — the Q·K·V mechanism behind Transformers.", "topics": ["attention", "QKV", "transformer"], "group": "concept", "page": "notes/attention.html", "slides": "slides/attention/index.html", "demo": "demos/attention/app/index.html", "extra_links": [], "search_text": "attention each word decides which other words to attend to — the q·k·v mechanism behind transformers. attention qkv transformer attention when reading a word, which other words should you look at to understand it correctly? attention is how the model decides that for itself. why it matters in \"the dog chased the cat because it was hungry,\" what does \"it\" refer to? a reader links \"it\" to \"dog.\" attention lets each word scan the whole sentence and assign its own weights: relevant words get high attention; irrelevant ones fade out. that is the core idea behind the transformer — the architecture behind nearly every modern language model. key ideas q, k, v — three roles per word: query (q): \"what information do i need?\" key (k): \"what information can i provide?\" value (v): \"the content i actually carry.\" compare this word's q to every word's k → relevance scores → mix v values by those scores. score → softmax → weighted average: raw scores pass through softmax.md into weights that sum to 1, then combine v vectors. self attention vs cross attention: self = words in the same sentence look at each other; cross = one sentence attends to another (e.g. translation: target attends to source). multi head = parallel views: one head may capture grammar, another topic — then results merge. illustrations self attention: each word in a sentence attends to the others attention table: weights between every pair of words cross attention: target sentence attends to source sentence attention weights after softmax (sum to 1) pipeline attention follows embedding.md and uses softmax.md to normalize weights. slides & demo link slides slides/attention working app demos/attention/app references vaswani et al. 2017 — attention is all you need jay alammar — the illustrated transformer related softmax.md , embedding.md", "body_text": "Attention When reading a word, which other words should you look at to understand it correctly? Attention is how the model decides that for itself. Why it matters In \"the dog chased the cat because it was hungry,\" what does \"it\" refer to? A reader links \"it\" to \"dog.\" Attention lets each word scan the whole sentence and assign its own weights: relevant words get high attention; irrelevant ones fade out. That is the core idea behind the Transformer — the architecture behind nearly every modern language model. Key ideas Q, K, V — three roles per word: Query (Q): \"What information do I need?\" Key (K): \"What information can I provide?\" Value (V): \"The content I actually carry.\" Compare this word's Q to every word's K → relevance scores → mix V values by those scores. Score → softmax → weighted average: raw scores pass through softmax.md into weights that sum to 1, then combine V vectors. Self attention vs cross attention: self = words in the same sentence look at each other; cross = one sentence attends to another (e.g. translation: target attends to source). Multi head = parallel views: one head may capture grammar, another topic — then results merge. Illustrations Self attention: each word in a sentence attends to the others Attention table: weights between every pair of words Cross attention: target sentence attends to source sentence Attention weights after softmax (sum to 1) Pipeline Attention follows embedding.md and uses softmax.md to normalize weights. Slides & demo Link Slides slides/attention Working app demos/attention/app References Vaswani et al. 2017 — Attention Is All You Need Jay Alammar — The Illustrated Transformer Related softmax.md , embedding.md"}, {"id": "softmax", "num": "04", "date": "06/2023", "title": "Softmax", "summary": "Turn raw scores into probabilities that sum to 1.", "topics": ["softmax", "logits", "classification"], "group": "concept", "page": "notes/softmax.html", "slides": "slides/softmax/index.html", "demo": "demos/softmax/app/index.html", "extra_links": [], "search_text": "softmax turn raw scores into probabilities that sum to 1. softmax logits classification softmax turn raw scores (logits) into percentages: each choice gets a probability, and they all add up to 1. why it matters a model often outputs rough numbers — for three sentiment classes: . those are hard to read and not probabilities. softmax compresses them to — easy to interpret (\"66% negative\") and guaranteed to sum to 1. it is the final step in most classification tasks and the normalization step inside attention. key ideas intuitive formula: take for each choice and divide by the total. exponentiation makes high scores stand out and low scores shrink. ranking preserved, gap widened: the highest score still wins, but the spread is stretched — often showing a clear peak. two common uses: classification head: e.g. three emotion classes — see 05 demo text.md . attention weights: normalize relevance scores between words — see attention.md . paired with cross entropy in training: softmax gives predicted probabilities; cross entropy measures how far they are from the correct label → the learning signal. softmax regression = multi class logistic regression: the natural extension when picking one label from many classes. illustrations softmax turns raw scores into a probability distribution that sums to 1 softmax regression: multi class classification pipeline softmax is the key step in 05 demo text.md and the normalization step inside attention.md . slides & demo link slides slides/softmax working app demos/softmax/app references google — ml crash course: softmax cs231n — softmax classifier related classification.md — model building right after softmax attention.md , 05 demo text.md", "body_text": "Softmax Turn raw scores (logits) into percentages: each choice gets a probability, and they all add up to 1. Why it matters A model often outputs rough numbers — for three sentiment classes: . Those are hard to read and not probabilities. Softmax compresses them to — easy to interpret (\"66% negative\") and guaranteed to sum to 1. It is the final step in most classification tasks and the normalization step inside attention. Key ideas Intuitive formula: take for each choice and divide by the total. Exponentiation makes high scores stand out and low scores shrink. Ranking preserved, gap widened: the highest score still wins, but the spread is stretched — often showing a clear peak. Two common uses: Classification head: e.g. three emotion classes — see 05 demo text.md . Attention weights: normalize relevance scores between words — see attention.md . Paired with cross entropy in training: softmax gives predicted probabilities; cross entropy measures how far they are from the correct label → the learning signal. Softmax regression = multi class logistic regression: the natural extension when picking one label from many classes. Illustrations Softmax turns raw scores into a probability distribution that sums to 1 Softmax regression: multi class classification Pipeline Softmax is the key step in 05 demo text.md and the normalization step inside attention.md . Slides & demo Link Slides slides/softmax Working app demos/softmax/app References Google — ML Crash Course: Softmax CS231n — Softmax classifier Related classification.md — model building right after softmax attention.md , 05 demo text.md"}, {"id": "classification", "num": "05", "date": "08/2023", "title": "Classification", "summary": "Assign a label to input — the most common model-building task, right after softmax.", "topics": ["classification", "cross-entropy", "multi-class", "F1"], "group": "concept", "page": "notes/classification.html", "slides": "slides/classification/index.html", "demo": null, "extra_links": [], "search_text": "classification assign a label to input — the most common model building task, right after softmax. classification cross entropy multi class f1 classification — label the input given an input (text, image, numbers), the model picks one label from a fixed set. everyday example: a review arrives → the model says positive , neutral , or negative . this is the most common “build a model” problem — right after softmax . why it matters much practical work is categorization: is this review positive or negative, is the email spam, is the photo a dog or a cat, is the question easy or hard. understanding classification is understanding how a model makes discrete decisions — and it reuses the same tokenize → embedding → softmax chain the lab walks through. if you can train a solid classifier, you already understand loss, evaluation, and the train/infer split that every larger system (rag routers, sentiment demos, car nn) depends on. key ideas classification head: the last layer turns a representation (vector) into a score per label ( logits ), then softmax converts to probabilities → pick the highest ( ). binary vs multi class vs multi label: binary: two classes (spam / not spam). often one logit + sigmoid, or two logits + softmax. multi class: pick exactly one of many (neg / neu / pos). softmax + cross entropy. multi label: one input can carry several labels at once (e.g. a news article tagged politics and economy ). usually independent sigmoids + binary cross entropy per label. training loss: cross entropy measures how wrong the predicted probability is versus the true label; training pushes loss down (06 train infer.md ). evaluation beyond accuracy: accuracy is easy but misleading on imbalanced data. also check precision , recall , and f1 . for rare classes (fraud, rare diseases), recall often matters more than overall accuracy. class balance: rare labels are easily ignored — the model can get 95% accuracy by always predicting the majority class. always inspect the label distribution before trusting a score. worked example input sentence: 1. tokenize → ids → embedding → (optional transformer) → one vector for the sentence. 2. classification head → logits, e.g. for . 3. softmax → probabilities ≈ . 4. prediction = neg . during training, if the true label is , cross entropy is low; if the true label were , loss would be high and weights would update. common pitfalls wrong metric on skewed data — report f1 / per class recall, not only accuracy. train/val leakage — same review appearing in both splits → fake high scores. label noise — inconsistent human labels cap how good the model can get. threshold blindness — for binary tasks, the default 0.5 cutoff may be wrong; tune on validation. illustrations softmax regression: multi class classification model softmax converts raw scores to probabilities for label selection classification pipeline: input → embedding → head → softmax → label classification hero: scores become a discrete decision pipeline classification is the destination of softmax.md ; train it with pytorch training.md or tensorflow training.md . see it live in 05 demo text.md and 04 demo car.md . slides & demo link slides slides/classification related demos sentiment · car nn references scikit learn — classification google — classification (ml crash course) related softmax.md , 05 demo text.md , 04 demo car.md pytorch training.md , tensorflow training.md", "body_text": "Classification — label the input Given an input (text, image, numbers), the model picks one label from a fixed set. Everyday example: a review arrives → the model says positive , neutral , or negative . This is the most common “build a model” problem — right after softmax . Why it matters Much practical work is categorization: is this review positive or negative, is the email spam, is the photo a dog or a cat, is the question easy or hard. Understanding classification is understanding how a model makes discrete decisions — and it reuses the same tokenize → embedding → softmax chain the lab walks through. If you can train a solid classifier, you already understand loss, evaluation, and the train/infer split that every larger system (RAG routers, sentiment demos, car nn) depends on. Key ideas Classification head: the last layer turns a representation (vector) into a score per label ( logits ), then softmax converts to probabilities → pick the highest ( ). Binary vs multi class vs multi label: Binary: two classes (spam / not spam). Often one logit + sigmoid, or two logits + softmax. Multi class: pick exactly one of many (neg / neu / pos). Softmax + cross entropy. Multi label: one input can carry several labels at once (e.g. a news article tagged politics and economy ). Usually independent sigmoids + binary cross entropy per label. Training loss: cross entropy measures how wrong the predicted probability is versus the true label; training pushes loss down (06 train infer.md ). Evaluation beyond accuracy: accuracy is easy but misleading on imbalanced data. Also check precision , recall , and F1 . For rare classes (fraud, rare diseases), recall often matters more than overall accuracy. Class balance: rare labels are easily ignored — the model can get 95% accuracy by always predicting the majority class. Always inspect the label distribution before trusting a score. Worked example Input sentence: 1. Tokenize → IDs → embedding → (optional Transformer) → one vector for the sentence. 2. Classification head → logits, e.g. for . 3. Softmax → probabilities ≈ . 4. Prediction = neg . During training, if the true label is , cross entropy is low; if the true label were , loss would be high and weights would update. Common pitfalls Wrong metric on skewed data — report F1 / per class recall, not only accuracy. Train/val leakage — same review appearing in both splits → fake high scores. Label noise — inconsistent human labels cap how good the model can get. Threshold blindness — for binary tasks, the default 0.5 cutoff may be wrong; tune on validation. Illustrations Softmax regression: multi class classification model Softmax converts raw scores to probabilities for label selection Classification pipeline: input → embedding → head → softmax → label Classification hero: scores become a discrete decision Pipeline Classification is the destination of softmax.md ; train it with pytorch training.md or tensorflow training.md . See it live in 05 demo text.md and 04 demo car.md . Slides & demo Link Slides slides/classification Related demos sentiment · car nn References scikit learn — classification Google — Classification (ML Crash Course) Related softmax.md , 05 demo text.md , 04 demo car.md pytorch training.md , tensorflow training.md"}, {"id": "pytorch-training", "num": "06", "date": "10/2023", "title": "Train with PyTorch", "summary": "Epoch loop: forward → loss → backward → step. Train a classifier by hand.", "topics": ["pytorch", "training", "epoch", "optimizer", "backprop"], "group": "concept", "page": "notes/pytorch-training.html", "slides": "slides/pytorch-training/index.html", "demo": null, "extra_links": [], "search_text": "train with pytorch epoch loop: forward → loss → backward → step. train a classifier by hand. pytorch training epoch optimizer backprop train with pytorch a hands on lesson: use pytorch to train a classifier — epoch loop, compute loss, backprop, update weights until the model is good enough. everyday metaphor: each batch is one practice set; each epoch is one full pass through the textbook. why it matters pytorch is the most popular flexible framework for building and training models yourself. understanding its training loop means understanding how learning actually happens — the same mechanism every high level library (hugging face , sentence transformers) wraps underneath. if you can write confidently, you can debug exploding loss, pick learning rates, and move models to gpu without treating training as a black box. key ideas epoch vs batch: an epoch is one pass over all data; a batch is a small chunk processed per step. many epochs let the model learn gradually. large batches are stabler but need more memory; small batches are noisier but can generalize better. four steps per batch: 1. — clear old gradients (they accumulate by default). 2. forward — . 3. loss — compare logits to labels (e.g. ). 4. then — compute gradients, update weights. optimizer and learning rate: adam/sgd decides how far to move each step. lr too high → unstable jumps / nans; too low → painfully slow learning. start with for adam on small nets; fine tuning transformers often uses – . train/val split: track validation loss to catch overfitting (memorizes training data, fails on new data). rising val loss while train loss falls is the classic signal. gpu: (or on apple silicon) for both model and each batch → much faster training; see train gpu.md . when done, save: → checkpoint for inference . prefer saving the best val checkpoint, not only the last epoch. training loop (skeleton) worked example (intuition) suppose a tiny binary classifier is wrong on a batch. loss is high → assigns blame to each weight → nudges weights slightly so the next forward pass is a bit less wrong. after thousands of batches, the decision boundary fits the data. that is all “learning” is, at the loop level. common pitfalls forgot — gradients stack across batches → wild updates. train mode at eval — dropout/batchnorm behave differently; use + when validating. device mismatch — model on cuda, batch on cpu → runtime error. move both. leaky validation — tuning hyperparameters on the test set; keep a true held out test. illustrations pytorch training loop as a circular flowchart four steps per batch: forward → loss → backward → step pipeline this is how to implement training for classification.md ; the tensorflow version is at tensorflow training.md . slides & demo link slides slides/pytorch training references pytorch — training a classifier torch.optim related classification.md , tensorflow training.md train gpu.md , huggingface.md , 06 train infer.md", "body_text": "Train with PyTorch A hands on lesson: use PyTorch to train a classifier — epoch loop, compute loss, backprop, update weights until the model is good enough. Everyday metaphor: each batch is one practice set; each epoch is one full pass through the textbook. Why it matters PyTorch is the most popular flexible framework for building and training models yourself. Understanding its training loop means understanding how learning actually happens — the same mechanism every high level library (Hugging Face , sentence transformers) wraps underneath. If you can write confidently, you can debug exploding loss, pick learning rates, and move models to GPU without treating training as a black box. Key ideas Epoch vs batch: an epoch is one pass over all data; a batch is a small chunk processed per step. Many epochs let the model learn gradually. Large batches are stabler but need more memory; small batches are noisier but can generalize better. Four steps per batch: 1. — clear old gradients (they accumulate by default). 2. Forward — . 3. Loss — compare logits to labels (e.g. ). 4. then — compute gradients, update weights. Optimizer and learning rate: Adam/SGD decides how far to move each step. LR too high → unstable jumps / NaNs; too low → painfully slow learning. Start with for Adam on small nets; fine tuning Transformers often uses – . Train/val split: track validation loss to catch overfitting (memorizes training data, fails on new data). Rising val loss while train loss falls is the classic signal. GPU: (or on Apple Silicon) for both model and each batch → much faster training; see train gpu.md . When done, save: → checkpoint for inference . Prefer saving the best val checkpoint, not only the last epoch. Training loop (skeleton) Worked example (intuition) Suppose a tiny binary classifier is wrong on a batch. Loss is high → assigns blame to each weight → nudges weights slightly so the next forward pass is a bit less wrong. After thousands of batches, the decision boundary fits the data. That is all “learning” is, at the loop level. Common pitfalls Forgot — gradients stack across batches → wild updates. Train mode at eval — dropout/batchnorm behave differently; use + when validating. Device mismatch — model on CUDA, batch on CPU → runtime error. Move both. Leaky validation — tuning hyperparameters on the test set; keep a true held out test. Illustrations PyTorch training loop as a circular flowchart Four steps per batch: forward → loss → backward → step Pipeline This is how to implement training for classification.md ; the TensorFlow version is at tensorflow training.md . Slides & demo Link Slides slides/pytorch training References PyTorch — Training a classifier torch.optim Related classification.md , tensorflow training.md train gpu.md , huggingface.md , 06 train infer.md"}, {"id": "tensorflow-training", "num": "07", "date": "11/2023", "title": "Train with TensorFlow / Keras", "summary": "compile + fit: declare the model, let Keras run the epoch loop.", "topics": ["tensorflow", "keras", "training", "epoch"], "group": "concept", "page": "notes/tensorflow-training.html", "slides": "slides/tensorflow-training/index.html", "demo": null, "extra_links": [], "search_text": "train with tensorflow / keras compile + fit: declare the model, let keras run the epoch loop. tensorflow keras training epoch train with tensorflow / keras same classifier lesson, but with tensorflow (keras api): define the model, , then over many epochs. more concise than pytorch thanks to the built in training loop. everyday metaphor: you write the recipe ( ); the kitchen runs it ( ). why it matters tensorflow (via keras) is declarative training: you describe the model and settings, the framework runs the epoch loop. contrasting with pytorch (where you write the loop yourself) shows the same learning idea in two api styles — pick the one that fits the project. keras is especially handy for quick softmax regression experiments and for the embedding projector, which makes vector space visible in 3d while you train (embedding.md ). key ideas = declare how to learn: pick optimizer, loss (softmax + cross entropy for multi class), and metrics to track ( , etc.). = run training: the framework handles epoch/batch iteration and backprop — no manual / like pytorch. monitor with metrics: and print each epoch; rising while train loss falls → overfitting. callbacks: stops when val stops improving; saves the best weights automatically. tensorboard and projector: plot loss curves and project embeddings into 3d to inspect clusters and outliers. same math as pytorch: under the hood it is still forward → loss → gradients → weight update. only the api shape differs. skeleton worked example (intuition) you stack a small dense net ending in with units. after , each epoch shuffles batches, computes cross entropy against integer labels, and updates weights. when bottoms out, earlystopping restores that checkpoint — ready for inference. common pitfalls vs — one hot labels need ; integer labels need . mixing them silently fails or errors. forgot validation data — you only see train accuracy and miss overfitting. no earlystopping — you keep the last epoch, which may be worse than an earlier one. projector without labels — hard to interpret; color points by class when possible. illustrations softmax regression — multi class classification in tensorflow tensorflow embedding projector: vectors projected into 3d keras compile → fit flow pipeline same target as pytorch training.md , serving classification.md . slides & demo link slides slides/tensorflow training references tensorflow — basic classification keras api related classification.md , pytorch training.md train gpu.md , embedding.md", "body_text": "Train with TensorFlow / Keras Same classifier lesson, but with TensorFlow (Keras API): define the model, , then over many epochs. More concise than PyTorch thanks to the built in training loop. Everyday metaphor: you write the recipe ( ); the kitchen runs it ( ). Why it matters TensorFlow (via Keras) is declarative training: you describe the model and settings, the framework runs the epoch loop. Contrasting with PyTorch (where you write the loop yourself) shows the same learning idea in two API styles — pick the one that fits the project. Keras is especially handy for quick softmax regression experiments and for the Embedding Projector, which makes vector space visible in 3D while you train (embedding.md ). Key ideas = declare how to learn: pick optimizer, loss (softmax + cross entropy for multi class), and metrics to track ( , etc.). = run training: the framework handles epoch/batch iteration and backprop — no manual / like PyTorch. Monitor with metrics: and print each epoch; rising while train loss falls → overfitting. Callbacks: stops when val stops improving; saves the best weights automatically. TensorBoard and Projector: plot loss curves and project embeddings into 3D to inspect clusters and outliers. Same math as PyTorch: under the hood it is still forward → loss → gradients → weight update. Only the API shape differs. Skeleton Worked example (intuition) You stack a small dense net ending in with units. After , each epoch shuffles batches, computes cross entropy against integer labels, and updates weights. When bottoms out, EarlyStopping restores that checkpoint — ready for inference. Common pitfalls vs — one hot labels need ; integer labels need . Mixing them silently fails or errors. Forgot validation data — you only see train accuracy and miss overfitting. No EarlyStopping — you keep the last epoch, which may be worse than an earlier one. Projector without labels — hard to interpret; color points by class when possible. Illustrations Softmax regression — multi class classification in TensorFlow TensorFlow Embedding Projector: vectors projected into 3D Keras compile → fit flow Pipeline Same target as pytorch training.md , serving classification.md . Slides & demo Link Slides slides/tensorflow training References TensorFlow — Basic classification Keras API Related classification.md , pytorch training.md train gpu.md , embedding.md"}, {"id": "huggingface", "num": "08", "date": "01/2024", "title": "Hugging Face — dataset + Space", "summary": "GitHub for AI: Datasets + pretrained Models + Spaces → a usable model fast.", "topics": ["huggingface", "datasets", "spaces", "transformers", "fine-tune"], "group": "concept", "page": "notes/huggingface.html", "slides": "slides/huggingface/index.html", "demo": null, "extra_links": [], "search_text": "hugging face — dataset + space github for ai: datasets + pretrained models + spaces → a usable model fast. huggingface datasets spaces transformers fine tune hugging face — dataset + space → usable model “github for ai”: get datasets , pretrained models , and host demos with spaces . shortens the path from idea to a model you can actually use. everyday metaphor: don’t forge steel — borrow a good knife, sharpen it on your wood, then show others how it cuts. why it matters training from scratch is expensive. hugging face lets you stand on others’ work: download a labeled dataset, grab a pretrained model, fine tune lightly, and deploy a demo in minutes. it is the fastest route from training to a shareable model. for the lab, hf is also where sentence transformers models, tokenizer cards, and many rag embedding checkpoints live. key ideas three main pieces: datasets — labeled data, often one line: . models (hub) — pretrained bert, gpt, vit, minilm, etc.; fine tune instead of training from zero. spaces — host demo apps (gradio/streamlit), with optional gpu, plus a simple api endpoint. + : a few lines to load model, tokenizer, and data; fine tune with or a familiar pytorch/tf loop. fine tune beats scratch: leverage knowledge from large models → needs far less data and time. a few thousand labeled examples often beat a huge scratch train. spaces = demo + endpoint: push a model to a space → instant ui and api for others to try. model card and license: read license, intended use, and limitations before commercial use. some weights are research only. tokenizer must match the model: always load the tokenizer that belongs to that checkpoint — mismatch corrupts every id (tokenize.md ). output is a model: checkpoint or endpoint ready for inference . typical path worked example (intuition) want a vietnamese sentiment demo? search the hub for a multilingual or vi checkpoint → load a small labeled set → fine tune 2–3 epochs on a free gpu (kaggle.md / colab) → push to a space. you never trained a transformer from random weights. common pitfalls ignoring the model card — wrong license or unsafe intended use. tokenizer mismatch — using a different vocab than the checkpoint. fine tuning the whole giant model when lora would do — wasted gpu and money for small tasks. eval on the hub’s test split after peeking — keep a private holdout. illustrations hugging face hub: datasets, models, spaces pipeline hugging face is the data source and runtime partner for pytorch training.md / tensorflow training.md ; for competition style data and free gpu, see kaggle.md . slides & demo link slides slides/huggingface references hugging face hub · datasets · spaces transformers related pytorch training.md , tensorflow training.md kaggle.md , sentence transformers.md , train gpu.md", "body_text": "Hugging Face — dataset + Space → usable model “GitHub for AI”: get datasets , pretrained models , and host demos with Spaces . Shortens the path from idea to a model you can actually use. Everyday metaphor: don’t forge steel — borrow a good knife, sharpen it on your wood, then show others how it cuts. Why it matters Training from scratch is expensive. Hugging Face lets you stand on others’ work: download a labeled dataset, grab a pretrained model, fine tune lightly, and deploy a demo in minutes. It is the fastest route from training to a shareable model. For the lab, HF is also where sentence transformers models, tokenizer cards, and many RAG embedding checkpoints live. Key ideas Three main pieces: Datasets — labeled data, often one line: . Models (Hub) — pretrained BERT, GPT, ViT, MiniLM, etc.; fine tune instead of training from zero. Spaces — host demo apps (Gradio/Streamlit), with optional GPU, plus a simple API endpoint. + : a few lines to load model, tokenizer, and data; fine tune with or a familiar PyTorch/TF loop. Fine tune beats scratch: leverage knowledge from large models → needs far less data and time. A few thousand labeled examples often beat a huge scratch train. Spaces = demo + endpoint: push a model to a Space → instant UI and API for others to try. Model card and license: read license, intended use, and limitations before commercial use. Some weights are research only. Tokenizer must match the model: always load the tokenizer that belongs to that checkpoint — mismatch corrupts every ID (tokenize.md ). Output is a model: checkpoint or endpoint ready for inference . Typical path Worked example (intuition) Want a Vietnamese sentiment demo? Search the Hub for a multilingual or vi checkpoint → load a small labeled set → fine tune 2–3 epochs on a free GPU (kaggle.md / Colab) → push to a Space. You never trained a Transformer from random weights. Common pitfalls Ignoring the model card — wrong license or unsafe intended use. Tokenizer mismatch — using a different vocab than the checkpoint. Fine tuning the whole giant model when LoRA would do — wasted GPU and money for small tasks. Eval on the Hub’s test split after peeking — keep a private holdout. Illustrations Hugging Face Hub: Datasets, Models, Spaces Pipeline Hugging Face is the data source and runtime partner for pytorch training.md / tensorflow training.md ; for competition style data and free GPU, see kaggle.md . Slides & demo Link Slides slides/huggingface References Hugging Face Hub · Datasets · Spaces transformers Related pytorch training.md , tensorflow training.md kaggle.md , sentence transformers.md , train gpu.md"}, {"id": "kaggle", "num": "09", "date": "03/2024", "title": "Kaggle — dataset + GPU notebook", "summary": "Dataset library + free GPU/TPU notebooks + competitions to practice.", "topics": ["kaggle", "dataset", "gpu", "notebook", "competition"], "group": "concept", "page": "notes/kaggle.html", "slides": "slides/kaggle/index.html", "demo": null, "extra_links": [], "search_text": "kaggle — dataset + gpu notebook dataset library + free gpu/tpu notebooks + competitions to practice. kaggle dataset gpu notebook competition kaggle — free dataset + notebook + gpu ml learning and competition platform: huge dataset library, notebooks with free gpu/tpu , and competitions to practice. similar to hugging face but tilted toward hands on work and leaderboards. everyday metaphor: a shared workshop with free tools, wood piles (datasets), and contests on the wall. why it matters when learning, two things are often missing: good data and enough compute . kaggle offers both for free — diverse datasets and gpu notebooks in the browser. competitions add leaderboards and public solutions so you can learn from what top performers do. pair it with hugging face : grab a pretrained model from the hub, train on kaggle’s gpu, export the checkpoint into a lab demo. key ideas datasets: tens of thousands of public datasets, downloadable straight into a notebook (or via the kaggle api). notebooks (kernels): built in libraries (pytorch, tf, sklearn…); enable gpu/tpu in settings → train without installing cuda locally. competitions: real problem + metric + leaderboard; submit predictions for a score. read public notebooks for tips — reproducing a strong baseline teaches faster than starting blank. quota limits: free gpu hours are capped per week — save them for real training runs, not idle kernels left open overnight. hf connection: often download data on kaggle, grab a pretrained model from hugging face, then train in a kaggle notebook. export: download weights / onnx / torchscript → plug into inference demos (car nn, sentiment…). short workflow worked example (intuition) competition: classify dog breeds from images. you fork a public efficientnet notebook, swap in a hub vision model, train 5 epochs on gpu, submit. leaderboard feedback tells you if augmentation or lr was the real lever — not just “i trained something.” common pitfalls burning gpu quota on print debug loops — debug on cpu / tiny samples first. ignoring the competition metric — optimizing accuracy when the score is log loss. copy paste without understanding — public notebooks win until the private leaderboard; learn why steps exist. no offline export plan — notebook dies with the session; save artifacts to kaggle datasets or download them. illustrations kaggle stack: dataset → notebook → free gpu pipeline same role as “data + gpu runtime” alongside huggingface.md ; stack overview at train gpu.md . slides & demo link slides slides/kaggle references kaggle datasets · notebooks kaggle learn related huggingface.md , pytorch training.md train gpu.md , 06 train infer.md", "body_text": "Kaggle — free dataset + notebook + GPU ML learning and competition platform: huge dataset library, notebooks with free GPU/TPU , and competitions to practice. Similar to Hugging Face but tilted toward hands on work and leaderboards. Everyday metaphor: a shared workshop with free tools, wood piles (datasets), and contests on the wall. Why it matters When learning, two things are often missing: good data and enough compute . Kaggle offers both for free — diverse datasets and GPU notebooks in the browser. Competitions add leaderboards and public solutions so you can learn from what top performers do. Pair it with Hugging Face : grab a pretrained model from the Hub, train on Kaggle’s GPU, export the checkpoint into a lab demo. Key ideas Datasets: tens of thousands of public datasets, downloadable straight into a notebook (or via the Kaggle API). Notebooks (Kernels): built in libraries (PyTorch, TF, sklearn…); enable GPU/TPU in settings → train without installing CUDA locally. Competitions: real problem + metric + leaderboard; submit predictions for a score. Read public notebooks for tips — reproducing a strong baseline teaches faster than starting blank. Quota limits: free GPU hours are capped per week — save them for real training runs, not idle kernels left open overnight. HF connection: often download data on Kaggle, grab a pretrained model from Hugging Face, then train in a Kaggle notebook. Export: download weights / ONNX / TorchScript → plug into inference demos (car nn, sentiment…). Short workflow Worked example (intuition) Competition: classify dog breeds from images. You fork a public EfficientNet notebook, swap in a Hub vision model, train 5 epochs on GPU, submit. Leaderboard feedback tells you if augmentation or LR was the real lever — not just “I trained something.” Common pitfalls Burning GPU quota on print debug loops — debug on CPU / tiny samples first. Ignoring the competition metric — optimizing accuracy when the score is log loss. Copy paste without understanding — public notebooks win until the private leaderboard; learn why steps exist. No offline export plan — notebook dies with the session; save artifacts to Kaggle datasets or download them. Illustrations Kaggle stack: dataset → notebook → free GPU Pipeline Same role as “data + GPU runtime” alongside huggingface.md ; stack overview at train gpu.md . Slides & demo Link Slides slides/kaggle References Kaggle Datasets · Notebooks Kaggle Learn Related huggingface.md , pytorch training.md train gpu.md , 06 train infer.md"}, {"id": "transformer", "num": "10", "date": "05/2024", "title": "Transformer — core LLM architecture", "summary": "Stack attention blocks + positional encoding; encoder (BERT) / decoder (GPT).", "topics": ["transformer", "attention", "encoder", "decoder", "positional-encoding"], "group": "concept", "page": "notes/transformer.html", "slides": "slides/transformer/index.html", "demo": null, "extra_links": [], "search_text": "transformer — core llm architecture stack attention blocks + positional encoding; encoder (bert) / decoder (gpt). transformer attention encoder decoder positional encoding transformer — core architecture of llms stack many attention blocks and process a whole sentence in parallel instead of step by step. the framework behind bert, gpt, and nearly every modern language model. why it matters before transformers, models read sentences sequentially (rnn/lstm) — slow and prone to forgetting early context. the transformer (2017, \"attention is all you need\") drops sequential processing: every word attends to every other word at once → faster gpu training and better long range links. that pivot opened the llm era. key ideas stacked attention blocks: each layer has multi head attention plus a feed forward network; stack many layers for increasingly abstract representations. positional encoding: parallel processing has no built in order — inject position info so the model knows word sequence. encoder / decoder: encoder (bert): read and understand the whole sentence → good for classification and embeddings. decoder (gpt): generate left to right → good for text generation. encoder decoder: translation, summarization (uses cross attention). residual + layer norm: tricks that keep deep networks stable during training. parallel = fast: no step by step dependency → full gpu utilization (train gpu.md ). illustrations self attention inside one encoder block cross attention: decoder attends to encoder (machine translation) attention weights after softmax inside one layer pipeline the transformer is the \"house frame\" wrapping attention.md , embedding.md , and softmax.md into one complete model. references vaswani et al. 2017 — attention is all you need jay alammar — the illustrated transformer related attention.md , embedding.md , softmax.md huggingface.md — pretrained transformer models", "body_text": "Transformer — core architecture of LLMs Stack many attention blocks and process a whole sentence in parallel instead of step by step. The framework behind BERT, GPT, and nearly every modern language model. Why it matters Before Transformers, models read sentences sequentially (RNN/LSTM) — slow and prone to forgetting early context. The Transformer (2017, \"Attention Is All You Need\") drops sequential processing: every word attends to every other word at once → faster GPU training and better long range links. That pivot opened the LLM era. Key ideas Stacked attention blocks: each layer has multi head attention plus a feed forward network; stack many layers for increasingly abstract representations. Positional encoding: parallel processing has no built in order — inject position info so the model knows word sequence. Encoder / decoder: Encoder (BERT): read and understand the whole sentence → good for classification and embeddings. Decoder (GPT): generate left to right → good for text generation. Encoder decoder: translation, summarization (uses cross attention). Residual + layer norm: tricks that keep deep networks stable during training. Parallel = fast: no step by step dependency → full GPU utilization (train gpu.md ). Illustrations Self attention inside one encoder block Cross attention: decoder attends to encoder (machine translation) Attention weights after softmax inside one layer Pipeline The Transformer is the \"house frame\" wrapping attention.md , embedding.md , and softmax.md into one complete model. References Vaswani et al. 2017 — Attention Is All You Need Jay Alammar — The Illustrated Transformer Related attention.md , embedding.md , softmax.md huggingface.md — pretrained Transformer models"}, {"id": "sentence-transformers", "num": "11", "date": "07/2024", "title": "sentence-transformers — sentence embeddings", "summary": "Sentence → vector in a few lines; classification and similarity made fast and simple.", "topics": ["sentence-transformers", "sbert", "embedding", "similarity", "classification"], "group": "concept", "page": "notes/sentence-transformers.html", "slides": "slides/sentence-transformers/index.html", "demo": null, "extra_links": [], "search_text": "sentence transformers — sentence embeddings sentence → vector in a few lines; classification and similarity made fast and simple. sentence transformers sbert embedding similarity classification sentence transformers — sentence embedding in a few lines a hugging face library that turns a whole sentence into a high quality vector in just a few lines. classification and similarity tasks become fast and simple. why it matters training an embedding model yourself takes serious effort. packages pretrained models (e.g. , ) so returns vectors ready to use. for many problems, good embeddings plus a light classifier are enough — no need to train a large network. key ideas sentence → one vector: returns embeddings optimized for sentence level meaning comparison (not per token vectors). fast classification: encode sentences, then attach a light classifier (logistic / k nn) on top — no full transformer fine tune required. similarity and search: finds semantically close sentences; core of semantic search.md and retrieval in rag.md . load into a vector db: vectors from go straight into vector database.md for top k search. pick a model for the job: minilm is light and fast; mpnet is more accurate but heavier. quick use: illustrations cosine similarity between two sentence vectors embedding: a function that maps text to vectors pipeline the shortest path from embedding.md to classification.md and semantic search.md without heavy training. references sbert / sentence transformers reimers & gurevych 2019 — sentence bert related embedding.md , classification.md semantic search.md , vector database.md , huggingface.md", "body_text": "sentence transformers — sentence embedding in a few lines A Hugging Face library that turns a whole sentence into a high quality vector in just a few lines. Classification and similarity tasks become fast and simple. Why it matters Training an embedding model yourself takes serious effort. packages pretrained models (e.g. , ) so returns vectors ready to use. For many problems, good embeddings plus a light classifier are enough — no need to train a large network. Key ideas Sentence → one vector: returns embeddings optimized for sentence level meaning comparison (not per token vectors). Fast classification: encode sentences, then attach a light classifier (logistic / k NN) on top — no full Transformer fine tune required. Similarity and search: finds semantically close sentences; core of semantic search.md and retrieval in rag.md . Load into a vector DB: vectors from go straight into vector database.md for top k search. Pick a model for the job: MiniLM is light and fast; mpnet is more accurate but heavier. Quick use: Illustrations Cosine similarity between two sentence vectors Embedding: a function that maps text to vectors Pipeline The shortest path from embedding.md to classification.md and semantic search.md without heavy training. References SBERT / sentence transformers Reimers & Gurevych 2019 — Sentence BERT Related embedding.md , classification.md semantic search.md , vector database.md , huggingface.md"}, {"id": "rag", "num": "12", "date": "08/2024", "title": "RAG", "summary": "Retrieve relevant documents first, then let the model compose a grounded answer with citations.", "topics": ["RAG", "vector-db", "retrieve"], "group": "concept", "page": "notes/rag.html", "slides": "slides/rag/index.html", "demo": "demos/rag/app/index.html", "extra_links": [], "search_text": "rag retrieve relevant documents first, then let the model compose a grounded answer with citations. rag vector db retrieve rag — retrieval augmented generation instead of forcing the model to answer from memory alone, first look up relevant documents, then let the model compose an answer grounded in them. like checking a book before you speak. why it matters language models know a lot but often hallucinate on unfamiliar facts and cannot read your private documents. rag fixes both: anchor answers in a real corpus (company docs, videos, repos…) with citations. answers become more accurate, more current, and verifiable — without retraining the model. key ideas two phases: retrieve: embed the question (embedding.md ), search the vector db for the top k chunks closest in meaning. generate: insert those chunks into the prompt as context; the model composes the answer from them. chunk + vector db: split documents into segments, embed each segment; a db (faiss, chroma, pgvector…) finds nearest segments fast, optionally filtered by metadata. unlike pure chat: pure chat relies on model memory; rag is always anchored to your corpus — it can answer about documents the model never saw. quality depends on retrieval: wrong chunks → wrong answers no matter how good the model is. good chunking and embeddings are critical. advanced variants: graph rag links entities in a graph for multi hop questions; reranking and hybrid search (keyword + vector) boost accuracy. illustrations embed the question, then query the document store flow of a rag pipeline graph rag: connect entities in a graph for multi hop answers advanced rag: rerank and filter for higher accuracy pipeline rag stands on embedding.md ; the lab's personal knowledge base follows this direction (personal knowledge base.md ). slides & demo link slides slides/rag working app demos/rag/app references lewis et al. 2020 — retrieval augmented generation microsoft graphrag related vector database.md , semantic search.md — infrastructure and retrieval for rag embedding.md , personal knowledge base.md", "body_text": "RAG — Retrieval Augmented Generation Instead of forcing the model to answer from memory alone, first look up relevant documents, then let the model compose an answer grounded in them. Like checking a book before you speak. Why it matters Language models know a lot but often hallucinate on unfamiliar facts and cannot read your private documents. RAG fixes both: anchor answers in a real corpus (company docs, videos, repos…) with citations. Answers become more accurate, more current, and verifiable — without retraining the model. Key ideas Two phases: Retrieve: embed the question (embedding.md ), search the vector DB for the top k chunks closest in meaning. Generate: insert those chunks into the prompt as context; the model composes the answer from them. Chunk + vector DB: split documents into segments, embed each segment; a DB (FAISS, Chroma, pgvector…) finds nearest segments fast, optionally filtered by metadata. Unlike pure chat: pure chat relies on model memory; RAG is always anchored to your corpus — it can answer about documents the model never saw. Quality depends on retrieval: wrong chunks → wrong answers no matter how good the model is. Good chunking and embeddings are critical. Advanced variants: Graph RAG links entities in a graph for multi hop questions; reranking and hybrid search (keyword + vector) boost accuracy. Illustrations Embed the question, then query the document store Flow of a RAG pipeline Graph RAG: connect entities in a graph for multi hop answers Advanced RAG: rerank and filter for higher accuracy Pipeline RAG stands on embedding.md ; the lab's Personal Knowledge base follows this direction (personal knowledge base.md ). Slides & demo Link Slides slides/rag Working app demos/rag/app References Lewis et al. 2020 — Retrieval Augmented Generation Microsoft GraphRAG Related vector database.md , semantic search.md — infrastructure and retrieval for RAG embedding.md , personal knowledge base.md"}, {"id": "vector-database", "num": "13", "date": "10/2024", "title": "Vector database", "summary": "Store vectors and find top-k nearest neighbors (ANN). Infrastructure for RAG and semantic search.", "topics": ["vector-db", "ANN", "faiss", "elasticsearch", "pgvector"], "group": "concept", "page": "notes/vector-database.html", "slides": "slides/vector-database/index.html", "demo": null, "extra_links": [], "search_text": "vector database store vectors and find top k nearest neighbors (ann). infrastructure for rag and semantic search. vector db ann faiss elasticsearch pgvector vector database store millions of embedding vectors and answer \"which vectors are closest to this one?\" in milliseconds. the infrastructure under rag and semantic search. why it matters embedding turns everything into vectors — but where do you store them, and how do you search? scanning every vector one by one (brute force) is too slow at scale. a vector database stores vectors with their source data and finds top k nearest neighbors fast via approximate indexes. without it, rag and semantic search cannot run at real world scale. key ideas core problem — nearest neighbor: given a query vector, find the k closest by cosine or dot product (embedding.md ). ann instead of brute force: approximate indexes (hnsw, ivf…) trade a little accuracy for orders of magnitude speed — good enough for search. more than vectors: each record carries metadata (source, date, tags) for filtering before or after search; needs crud when data changes. common choices: faiss — in memory, very fast, good for experiments; lacks durable storage and crud. elasticsearch (knn plugin) — integrates with keyword search, has crud, scales out. pgvector / chroma — postgres extension or lightweight store for small apps. pick by need: scale + crud + distribution → elastic; pure in ram speed → faiss. illustrations embed the question, then query the vector store when to use cosine vs dot product for comparing vectors pipeline vector databases receive vectors from embedding.md and supply top k results to rag.md and semantic search.md . references faiss (meta) pgvector · elasticsearch knn search related embedding.md , rag.md , semantic search.md", "body_text": "Vector database Store millions of embedding vectors and answer \"which vectors are closest to this one?\" in milliseconds. The infrastructure under RAG and semantic search. Why it matters Embedding turns everything into vectors — but where do you store them, and how do you search? Scanning every vector one by one (brute force) is too slow at scale. A vector database stores vectors with their source data and finds top k nearest neighbors fast via approximate indexes. Without it, RAG and semantic search cannot run at real world scale. Key ideas Core problem — nearest neighbor: given a query vector, find the k closest by cosine or dot product (embedding.md ). ANN instead of brute force: approximate indexes (HNSW, IVF…) trade a little accuracy for orders of magnitude speed — good enough for search. More than vectors: each record carries metadata (source, date, tags) for filtering before or after search; needs CRUD when data changes. Common choices: FAISS — in memory, very fast, good for experiments; lacks durable storage and CRUD. Elasticsearch (kNN plugin) — integrates with keyword search, has CRUD, scales out. pgvector / Chroma — Postgres extension or lightweight store for small apps. Pick by need: scale + CRUD + distribution → Elastic; pure in RAM speed → FAISS. Illustrations Embed the question, then query the vector store When to use cosine vs dot product for comparing vectors Pipeline Vector databases receive vectors from embedding.md and supply top k results to rag.md and semantic search.md . References FAISS (Meta) pgvector · Elasticsearch kNN search Related embedding.md , rag.md , semantic search.md"}, {"id": "semantic-search", "num": "14", "date": "12/2024", "title": "Semantic search — hybrid · tiered · fallback", "summary": "Search by meaning: combine inverted index (Elastic) + semantic index (embeddings). My hands-on RAG learning project.", "topics": ["semantic-search", "hybrid", "inverted-index", "elasticsearch", "ms-marco"], "group": "project", "page": "notes/semantic-search.html", "slides": "slides/semantic-search/index.html", "demo": null, "extra_links": [{"label": "GitHub — semantic-search", "href": "https://github.com/hoanganh25991/semantic-search"}], "search_text": "semantic search — hybrid · tiered · fallback search by meaning: combine inverted index (elastic) + semantic index (embeddings). my hands on rag learning project. semantic search hybrid inverted index elasticsearch ms marco semantic search — hybrid · tiered · fallback search by meaning , not just keywords, by combining two index types: inverted index (elastic, by keyword) and semantic index (embedding, by meaning). this is the project i built to learn rag deeply. repo: github.com/hoanganh25991/semantic search — hybrid / tiered / fallback on the ms marco dataset. why it matters keyword search (bm25 / tf idf in elastic) is fast and cheap, but \"car\" and \"automobile\" are different strings — easy to miss matches. embedding search captures meaning but is heavier to run on every query. pragmatic semantic search combines both: use keywords to filter quickly, embeddings to rank by meaning. that is also a high quality retrieve step for rag . key ideas two index types: index mechanism strong weak inverted index (elastic) keyword → documents fast, cheap, precise on exact terms no synonym understanding semantic index (embedding) vectors in vector database captures meaning, varied phrasing heavier, needs a model three search strategies: hybrid: inverted index filters candidates by keyword, semantic index reranks by meaning. cost efficient; fails when keywords miss entirely. tiered: classify questions as easy/hard first → easy goes keyword, hard goes semantic. balances speed and precision (same idea as complexity router ). fallback: semantic first for max accuracy; if results are poor, fall back to keyword. most accurate, most expensive. dataset and evaluation: ms marco — real user questions plus relevant passages. metrics: precision@k , mrr@10 . query classifier labels simple vs complex questions for the tiered strategy. storage: mongodb for raw documents; elasticsearch for indexed data (inverted + knn) for fast search. illustrations embed the question, then query — the retrieve step of semantic search advanced retrieval: combine filtering and reranking for higher accuracy pipeline semantic search stands on embedding.md + vector database.md , and is the retrieval step for rag.md . references repo: hoanganh25991/semantic search ms marco · elasticsearch knn related vector database.md , rag.md , embedding.md 05 demo text.md — complexity router (same tiered idea)", "body_text": "Semantic search — hybrid · tiered · fallback Search by meaning , not just keywords, by combining two index types: inverted index (Elastic, by keyword) and semantic index (embedding, by meaning). This is the project I built to learn RAG deeply. Repo: github.com/hoanganh25991/semantic search — Hybrid / Tiered / Fallback on the MS MARCO dataset. Why it matters Keyword search (BM25 / TF IDF in Elastic) is fast and cheap, but \"car\" and \"automobile\" are different strings — easy to miss matches. Embedding search captures meaning but is heavier to run on every query. Pragmatic semantic search combines both: use keywords to filter quickly, embeddings to rank by meaning. That is also a high quality retrieve step for RAG . Key ideas Two index types: Index Mechanism Strong Weak Inverted index (Elastic) keyword → documents fast, cheap, precise on exact terms no synonym understanding Semantic index (embedding) vectors in vector database captures meaning, varied phrasing heavier, needs a model Three search strategies: Hybrid: inverted index filters candidates by keyword, semantic index reranks by meaning. Cost efficient; fails when keywords miss entirely. Tiered: classify questions as easy/hard first → easy goes keyword, hard goes semantic. Balances speed and precision (same idea as complexity router ). Fallback: semantic first for max accuracy; if results are poor, fall back to keyword. Most accurate, most expensive. Dataset and evaluation: MS MARCO — real user questions plus relevant passages. Metrics: Precision@k , MRR@10 . Query classifier labels simple vs complex questions for the Tiered strategy. Storage: MongoDB for raw documents; Elasticsearch for indexed data (inverted + kNN) for fast search. Illustrations Embed the question, then query — the retrieve step of semantic search Advanced retrieval: combine filtering and reranking for higher accuracy Pipeline Semantic search stands on embedding.md + vector database.md , and is the retrieval step for rag.md . References Repo: hoanganh25991/semantic search MS MARCO · Elasticsearch kNN Related vector database.md , rag.md , embedding.md 05 demo text.md — complexity router (same tiered idea)"}, {"id": "mcp", "num": "15", "date": "01/2025", "title": "MCP", "summary": "Common standard for agents to call external tools — USB-C for AI. Host ↔ server ↔ tools with schema.", "topics": ["MCP", "tools", "protocol", "server"], "group": "concept", "page": "notes/mcp.html", "slides": "slides/mcp/index.html", "demo": "demos/mcp/app/index.html", "extra_links": [], "search_text": "mcp common standard for agents to call external tools — usb c for ai. host ↔ server ↔ tools with schema. mcp tools protocol server mcp — model context protocol a common standard for agents to call external tools — like usb c for ai. instead of every app inventing its own plugin, every tool speaks the same protocol so any agent can plug in and use it. why it matters a model only generates text. to do real things — open a browser, query a database, render in blender, search the web — it must connect to external tools. before mcp, each integration was bespoke and non reusable. mcp standardizes how tools are described and invoked, so one server written once runs in cursor, claude, pi, and more. that is the hinge from \"answering\" to \"executing\" (see 10 ai timeline.md ). key ideas architecture: host: where the model runs (cursor, claude code, pi…). server: process that exposes a tool list plus input schema (json schema). tool: one action — navigate a browser, query a db, render blender, search the web. transport via stdio or http; each tool declares its parameters → the model calls correctly. discover then invoke: the model lists available tools, then calls them — no hardcoding. new tools do not require editing the model. results with schema: json in a known shape → easy to parse and chain tools. one standard, many clients: the same mcp server works on every mcp capable host. safety boundary: tools declare parameters and permissions → the host controls what the model may do. mcp ≠ skills mcp skills what executable tools markdown instructions for doing a job well format server + schema + scripts when need to run an external action need know how / repeatable process see also: skills rules.md . example mcp servers in use: browser (playwright / chrome devtools), blender ( , scene inspect, render), tavily (web search / extract / crawl). references model context protocol — spec & docs introducing mcp (anthropic) related 07 agents.md , skills rules.md , rag.md", "body_text": "MCP — Model Context Protocol A common standard for agents to call external tools — like USB C for AI. Instead of every app inventing its own plugin, every tool speaks the same protocol so any agent can plug in and use it. Why it matters A model only generates text. To do real things — open a browser, query a database, render in Blender, search the web — it must connect to external tools. Before MCP, each integration was bespoke and non reusable. MCP standardizes how tools are described and invoked, so one server written once runs in Cursor, Claude, Pi, and more. That is the hinge from \"answering\" to \"executing\" (see 10 ai timeline.md ). Key ideas Architecture: Host: where the model runs (Cursor, Claude Code, Pi…). Server: process that exposes a tool list plus input schema (JSON Schema). Tool: one action — navigate a browser, query a DB, render Blender, search the web. Transport via stdio or HTTP; each tool declares its parameters → the model calls correctly. Discover then invoke: the model lists available tools, then calls them — no hardcoding. New tools do not require editing the model. Results with schema: JSON in a known shape → easy to parse and chain tools. One standard, many clients: the same MCP server works on every MCP capable host. Safety boundary: tools declare parameters and permissions → the host controls what the model may do. MCP ≠ Skills MCP Skills What executable tools markdown instructions for doing a job well Format server + schema + scripts When need to run an external action need know how / repeatable process See also: skills rules.md . Example MCP servers in use: browser (Playwright / Chrome DevTools), blender ( , scene inspect, render), tavily (web search / extract / crawl). References Model Context Protocol — spec & docs Introducing MCP (Anthropic) Related 07 agents.md , skills rules.md , rag.md"}, {"id": "skills-rules", "num": "16", "date": "03/2025", "title": "Skills · Rules · Commands", "summary": "Agent know-how: SKILL.md, rules, commands; global ~/.agents.", "topics": ["skills", "rules", "commands", "agents-md", "dot-agents"], "group": "concept", "page": "notes/skills-rules.html", "slides": "slides/skills-rules/index.html", "demo": "demos/mcp/app/index.html", "extra_links": [], "search_text": "skills · rules · commands agent know how: skill.md, rules, commands; global ~/.agents. skills rules commands agents md dot agents skills · rules · commands three ways to teach a coding agent. skill = packaged capability loaded when needed; rule = constraint that always applies; command = shortcut to kick off a workflow. why it matters the same model, loaded with the right know how, works far better: it knows your process, follows project conventions, and you do not repeat instructions every turn. these three layers are how that \"brain gets configured.\" put mandatory things in rules, complex processes in skills. key ideas three concepts: kind what when loaded example skill folder with (+ scripts/assets) model reads when task matches description , , rule instructions always on or matched by glob every turn (always) or on file pattern commit style, \"docs = notes first\" command prompt / workflow via shortcut user types it (e.g. ) , skill.md structure: the description is the most important field: write a clear trigger (\"use when…\") so the agent picks correctly. skills can include scripts the agent runs via shell/mcp. global home: canonical path: . cursor / claude / pi load from here → write once, use across clients. do not copy skills into or (keep empty); pi uses symlinks to only. install github skill packs: (alias ) — rsync copy with lockfile at . do not use for . project local exception: repo specific skills may live in that repo's . global skills stay in . rules in practice: \"always\" rules consume context every turn → keep them short. glob rules ( , ) load only on matching files → cheaper. rules for conventions; skills for complex processes. skill interactions: when adding a skill, consider overlap with existing ones (conflicting triggers or instructions). anthropic opus/sonnet is strong at asking back to clarify interactions. references anthropic — agent skills agents.md — standard for declaring agent instructions related mcp.md , 07 agents.md , 08 model notes.md", "body_text": "Skills · Rules · Commands Three ways to teach a coding agent. Skill = packaged capability loaded when needed; Rule = constraint that always applies; Command = shortcut to kick off a workflow. Why it matters The same model, loaded with the right know how, works far better: it knows your process, follows project conventions, and you do not repeat instructions every turn. These three layers are how that \"brain gets configured.\" Put mandatory things in rules, complex processes in skills. Key ideas Three concepts: Kind What When loaded Example Skill folder with (+ scripts/assets) model reads when task matches description , , Rule instructions always on or matched by glob every turn (always) or on file pattern commit style, \"docs = notes first\" Command prompt / workflow via shortcut user types it (e.g. ) , SKILL.md structure: The description is the most important field: write a clear trigger (\"use when…\") so the agent picks correctly. Skills can include scripts the agent runs via shell/MCP. Global home: Canonical path: . Cursor / Claude / Pi load from here → write once, use across clients. Do not copy skills into or (keep empty); Pi uses symlinks to only. Install GitHub skill packs: (alias ) — rsync copy with lockfile at . Do not use for . Project local exception: repo specific skills may live in that repo's . Global skills stay in . Rules in practice: \"always\" rules consume context every turn → keep them short. Glob rules ( , ) load only on matching files → cheaper. Rules for conventions; skills for co
