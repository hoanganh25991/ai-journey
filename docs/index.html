<style>

:root {

* { box-sizing: border-box; margin: 0; padding: 0; }

a { color: var(--teal); }

.brand {

.tagline { margin-top: 14px; color: var(--muted); font-size: 15px; max-width: 560px; line-height: 1.5; }

.section-label {

.list { display: flex; flex-direction: column; gap: 8px; }

.row-date { font: 500 11px var(--mono); letter-spacing: .08em; color: var(--amber); margin-bottom: 6px; }
.row-num {
  font: 600 11px var(--mono); letter-spacing: .05em; color: var(--teal);
  background: var(--teal-soft); border-radius: 7px; padding: 3px 8px; align-self: center;
}
.row-top { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.row h3 { font-size: 17px; font-weight: 600; letter-spacing: -.01em; }
.row .grp { font: 500 10px var(--mono); letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
.row .badge {
  font: 500 10px var(--mono); letter-spacing: .05em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 999px; border: 1px solid var(--line-soft); color: var(--muted);
}
.row .badge.on { color: var(--teal); border-color: var(--teal-soft); background: var(--teal-soft); }

.row .snippet { font-size: 13px; margin-top: 8px; color: var(--ink); opacity: .82; }
.row .topics { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.row .topics span { font: 500 11px var(--mono); color: var(--amber); }
.spacer { flex: 1; }
.badges { display: flex; gap: 6px; }
mark { background: rgba(194,112,58,.22); color: inherit; border-radius: 3px; padding: 0 2px; }
.followup {
  background: var(--surface); border: 1px dashed var(--line); border-radius: 14px;
  padding: 18px 20px; margin-top: 6px;

.followup h4 { font-size: 14px; margin-bottom: 6px; }

.chips button:hover { border-color: var(--teal); }
.empty { color: var(--muted); font-size: 14px; }
footer { margin-top: 40px; font: 12px var(--mono); color: var(--muted); }

ình (tuỳ mood) Mood hôm nay Đi đường này Mới bắt đầu, muốn nền ① ABC (01→04) rồi dừng uống trà Muốn làm model ① → ② (05→11), bỏ qua agent Đang làm search / chatbot ① → ③ (12→14), xem thêm 11 Thích demo vui ④ thẳng (18, 19) rồi quay lại ① nếu bí Làm việc với coding agent ⑤ (15, 16, 21…) — đọc 22 khi chọn model Một dòng chốt Xong một màn thì quay lại hub, search theo , hoặc mở note kế trong bảng trên."}, {"id": "tokenize", "num": "01", "date": "01/2023", "title": "Tokenize", "summary": "Cắt câu chữ thành token rồi đổi thành ID — máy chỉ đọc số. BPE vs WordPiece.", "topics": ["tokenize", "BPE", "vocabulary"], "group": "concept", "page": "notes/tokenize.html", "slides": "slides/tokenize/index.html", "demo": "demos/tokenize/app/index.html", "extra_links": [], "search_text": "tokenize cắt câu chữ thành token rồi đổi thành id — máy chỉ đọc số. bpe vs wordpiece. tokenize bpe vocabulary tokenize máy không đọc chữ — nó đọc số. tokenize là bước cắt câu chữ thành những mẩu nhỏ (token) rồi đổi mỗi mẩu thành một con số (id). vì sao quan trọng mọi mô hình ngôn ngữ chỉ nhận vào một dãy số. trước khi làm bất cứ điều gì — embedding, attention, phân loại — câu chữ phải được biến thành dãy id. nếu bước cắt này sai, mọi bước sau đều nhận sai đầu vào. tokenizer vì thế là \"cửa khẩu\" của cả pipeline. ý chính ba mức cắt: theo từ (word): → . đơn giản nhưng gặp từ lạ là chịu. theo mẩu con (subword): → . ghép được từ chưa gặp từ các mẩu đã biết — cách phổ biến nhất hiện nay. theo ký tự (char): → . không bao giờ bí, nhưng chuỗi rất dài. vocabulary (từ điển): tập cố định mọi token mà mô hình biết; mỗi token ứng với một id. ví dụ . bpe vs wordpiece: hai cách xây từ điển subword. cùng ý tưởng \"gộp dần cặp hay đi cùng nhau\", khác ở tiêu chí gộp. đây là kiểu tokenizer của gpt (bpe) và bert (wordpiece). một token ≈ 4 ký tự tiếng anh: nên chi phí gọi mô hình tính theo token, không theo chữ. sai tokenizer = sai tất cả: dùng tokenizer khác lúc train và lúc chạy → id lệch → mô hình hiểu nhầm hoàn toàn. hình minh họa câu chữ được cắt thành các token, mỗi token tô một màu bpe và wordpiece: hai cách xây từ điển subword gộp dần các cặp ký tự hay đi cùng nhau để dựng vocabulary trong pipeline token id là đầu vào cho embedding.md ; từ đó mới tới attention, phân loại, rag. slides & demo link slides slides/tokenize working app demos/tokenize/app tham khảo hugging face — tokenizers summary sennrich et al. 2016 — neural machine translation of rare words with subword units (bpe) related embedding.md , 05 demo text.md", "body_text": "Tokenize Máy không đọc chữ — nó đọc số. Tokenize là bước cắt câu chữ thành những mẩu nhỏ (token) rồi đổi mỗi mẩu thành một con số (ID). Vì sao quan trọng Mọi mô hình ngôn ngữ chỉ nhận vào một dãy số. Trước khi làm bất cứ điều gì — embedding, attention, phân loại — câu chữ phải được biến thành dãy ID. Nếu bước cắt này sai, mọi bước sau đều nhận sai đầu vào. Tokenizer vì thế là \"cửa khẩu\" của cả pipeline. Ý chính Ba mức cắt: Theo từ (word): → . Đơn giản nhưng gặp từ lạ là chịu. Theo mẩu con (subword): → . Ghép được từ chưa gặp từ các mẩu đã biết — cách phổ biến nhất hiện nay. Theo ký tự (char): → . Không bao giờ bí, nhưng chuỗi rất dài. Vocabulary (từ điển): tập cố định mọi token mà mô hình biết; mỗi token ứng với một ID. Ví dụ . BPE vs WordPiece: hai cách xây từ điển subword. Cùng ý tưởng \"gộp dần cặp hay đi cùng nhau\", khác ở tiêu chí gộp. Đây là kiểu tokenizer của GPT (BPE) và BERT (WordPiece). Một token ≈ 4 ký tự tiếng Anh: nên chi phí gọi mô hình tính theo token, không theo chữ. Sai tokenizer = sai tất cả: dùng tokenizer khác lúc train và lúc chạy → ID lệch → mô hình hiểu nhầm hoàn toàn. Hình minh họa Câu chữ được cắt thành các token, mỗi token tô một màu BPE và WordPiece: hai cách xây từ điển subword Gộp dần các cặp ký tự hay đi cùng nhau để dựng vocabulary Trong pipeline Token ID là đầu vào cho embedding.md ; từ đó mới tới attention, phân loại, RAG. Slides & demo Link Slides slides/tokenize Working app demos/tokenize/app Tham khảo Hugging Face — Tokenizers summary Sennrich et al. 2016 — Neural Machine Translation of Rare Words with Subword Units (BPE) Related embedding.md , 05 demo text.md"}, {"id": "embedding", "num": "02", "date": "03/2023", "title": "Embedding", "summary": "Đổi ID thành vector: gần nghĩa thì gần nhau, đo bằng cosine.", "topics": ["embedding", "cosine", "CBOW"], "group": "concept", "page": "notes/embedding.html", "slides": "slides/embedding/index.html", "demo": "demos/embedding/app/index.html", "extra_links": [], "search_text": "embedding đổi id thành vector: gần nghĩa thì gần nhau, đo bằng cosine. embedding cosine cbow embedding đổi mỗi token id thành một dãy số (vector). điều hay: những gì gần nghĩa thì nằm gần nhau trong không gian số đó. vì sao quan trọng id chỉ là cái tên đánh số, không mang nghĩa: , — hai số này ở cạnh nhau hay xa nhau chẳng nói lên điều gì. embedding thay mỗi id bằng một vector học được, sao cho \"chó\" và \"mèo\" (đều là thú cưng) rơi vào vùng gần nhau, còn \"chó\" và \"hóa đơn\" thì xa. nhờ vậy máy mới \"đo\" được mức giống nhau về nghĩa — nền của tìm kiếm ngữ nghĩa, phân loại, rag. ý chính vector = tọa độ nghĩa: mỗi token/câu là một điểm trong không gian nhiều chiều (vd 300–1536 chiều). gần nghĩa → gần điểm. học từ ngữ cảnh: mô hình như cbow/word2vec học vector bằng cách đoán từ dựa trên các từ xung quanh. \"bạn là ai được quyết định bởi những từ hay đứng cạnh bạn.\" đo độ giống nhau bằng cosine: so hướng của hai vector, không so độ dài. cùng hướng → cosine ≈ 1 (rất giống); vuông góc → ≈ 0. cosine hay dot product? cosine chuẩn hóa độ dài nên hợp khi chỉ quan tâm \"cùng chủ đề\"; dot product còn tính cả độ mạnh/độ dài vector. không chỉ cho chữ: ảnh, âm thanh, người dùng… đều có thể embed để so sánh trong cùng một không gian. hình minh họa embedding: hàm biến token thành vector dày đặc cbow học vector từ các từ ngữ cảnh xung quanh cosine similarity: đo góc giữa hai vector nghĩa các từ được chiếu xuống không gian 3d trong tensorflow projector trong pipeline embedding nhận đầu ra của tokenize.md và cấp \"nhiên liệu\" cho attention.md lẫn rag.md . slides & demo link slides slides/embedding working app demos/embedding/app tham khảo google — machine learning crash course: embeddings mikolov et al. 2013 — word2vec related tokenize.md , rag.md , 05 demo text.md", "body_text": "Embedding Đổi mỗi token ID thành một dãy số (vector). Điều hay: những gì gần nghĩa thì nằm gần nhau trong không gian số đó. Vì sao quan trọng ID chỉ là cái tên đánh số, không mang nghĩa: , — hai số này ở cạnh nhau hay xa nhau chẳng nói lên điều gì. Embedding thay mỗi ID bằng một vector học được, sao cho \"chó\" và \"mèo\" (đều là thú cưng) rơi vào vùng gần nhau, còn \"chó\" và \"hóa đơn\" thì xa. Nhờ vậy máy mới \"đo\" được mức giống nhau về nghĩa — nền của tìm kiếm ngữ nghĩa, phân loại, RAG. Ý chính Vector = tọa độ nghĩa: mỗi token/câu là một điểm trong không gian nhiều chiều (vd 300–1536 chiều). Gần nghĩa → gần điểm. Học từ ngữ cảnh: mô hình như CBOW/Word2Vec học vector bằng cách đoán từ dựa trên các từ xung quanh. \"Bạn là ai được quyết định bởi những từ hay đứng cạnh bạn.\" Đo độ giống nhau bằng cosine: so hướng của hai vector, không so độ dài. Cùng hướng → cosine ≈ 1 (rất giống); vuông góc → ≈ 0. Cosine hay dot product? Cosine chuẩn hóa độ dài nên hợp khi chỉ quan tâm \"cùng chủ đề\"; dot product còn tính cả độ mạnh/độ dài vector. Không chỉ cho chữ: ảnh, âm thanh, người dùng… đều có thể embed để so sánh trong cùng một không gian. Hình minh họa Embedding: hàm biến token thành vector dày đặc CBOW học vector từ các từ ngữ cảnh xung quanh Cosine similarity: đo góc giữa hai vector nghĩa Các từ được chiếu xuống không gian 3D trong TensorFlow Projector Trong pipeline Embedding nhận đầu ra của tokenize.md và cấp \"nhiên liệu\" cho attention.md lẫn rag.md . Slides & demo Link Slides slides/embedding Working app demos/embedding/app Tham khảo Google — Machine Learning Crash Course: Embeddings Mikolov et al. 2013 — Word2Vec Related tokenize.md , rag.md , 05 demo text.md"}, {"id": "attention", "num": "03", "date": "05/2023", "title": "Attention", "summary": "Mỗi từ nên nhìn từ nào khác để hiểu đúng — cơ chế Q·K·V của Transformer.", "topics": ["attention", "QKV", "transformer"], "group": "concept", "page": "notes/attention.html", "slides": "slides/attention/index.html", "demo": "demos/attention/app/index.html", "extra_links": [], "search_text": "attention mỗi từ nên nhìn từ nào khác để hiểu đúng — cơ chế q·k·v của transformer. attention qkv transformer attention khi đọc một từ, nên \"nhìn\" sang những từ nào khác để hiểu đúng? attention là cơ chế cho mô hình tự quyết định điều đó. vì sao quan trọng trong câu \"con chó đuổi con mèo vì nó đói\", chữ \"nó\" chỉ ai? người đọc tự nối \"nó\" với \"chó\". attention cho phép mỗi từ nhìn khắp câu và tự gán trọng số: từ nào liên quan thì chú ý nhiều, từ nào không thì bỏ qua. đây là ý tưởng lõi làm nên transformer — kiến trúc đứng sau gần như mọi mô hình ngôn ngữ hiện đại. ý chính q, k, v — ba vai của mỗi từ: query (q) : \"tôi đang cần thông tin gì?\" key (k) : \"tôi có thể cung cấp thông tin gì?\" value (v) : \"nội dung thực sự tôi mang theo.\" so q của từ này với k của mọi từ → ra điểm liên quan → trộn v theo điểm đó. điểm liên quan → softmax → trung bình có trọng số: điểm thô đi qua softmax.md thành các trọng số cộng lại bằng 1, rồi lấy tổng v theo trọng số. self attention vs cross attention: self = các từ trong cùng một câu nhìn nhau; cross = câu này nhìn sang câu/nguồn khác (vd dịch máy: câu đích nhìn câu nguồn). multi head = nhiều góc nhìn song song: một \"đầu\" bắt quan hệ ngữ pháp, đầu khác bắt quan hệ chủ đề… rồi gộp lại. hình minh họa self attention: mỗi từ trong câu nhìn các từ còn lại bảng attention: trọng số giữa từng cặp từ cross attention: câu đích chú ý sang câu nguồn trọng số attention sau khi qua softmax (cộng lại bằng 1) trong pipeline attention đứng ngay sau embedding.md và dùng softmax.md để chuẩn hóa trọng số. slides & demo link slides slides/attention working app demos/attention/app tham khảo vaswani et al. 2017 — attention is all you need jay alammar — the illustrated transformer related softmax.md , embedding.md", "body_text": "Attention Khi đọc một từ, nên \"nhìn\" sang những từ nào khác để hiểu đúng? Attention là cơ chế cho mô hình tự quyết định điều đó. Vì sao quan trọng Trong câu \"con chó đuổi con mèo vì nó đói\", chữ \"nó\" chỉ ai? Người đọc tự nối \"nó\" với \"chó\". Attention cho phép mỗi từ nhìn khắp câu và tự gán trọng số: từ nào liên quan thì chú ý nhiều, từ nào không thì bỏ qua. Đây là ý tưởng lõi làm nên Transformer — kiến trúc đứng sau gần như mọi mô hình ngôn ngữ hiện đại. Ý chính Q, K, V — ba vai của mỗi từ: Query (Q) : \"tôi đang cần thông tin gì?\" Key (K) : \"tôi có thể cung cấp thông tin gì?\" Value (V) : \"nội dung thực sự tôi mang theo.\" So Q của từ này với K của mọi từ → ra điểm liên quan → trộn V theo điểm đó. Điểm liên quan → softmax → trung bình có trọng số: điểm thô đi qua softmax.md thành các trọng số cộng lại bằng 1, rồi lấy tổng V theo trọng số. Self attention vs cross attention: self = các từ trong cùng một câu nhìn nhau; cross = câu này nhìn sang câu/nguồn khác (vd dịch máy: câu đích nhìn câu nguồn). Multi head = nhiều góc nhìn song song: một \"đầu\" bắt quan hệ ngữ pháp, đầu khác bắt quan hệ chủ đề… rồi gộp lại. Hình minh họa Self attention: mỗi từ trong câu nhìn các từ còn lại Bảng attention: trọng số giữa từng cặp từ Cross attention: câu đích chú ý sang câu nguồn Trọng số attention sau khi qua softmax (cộng lại bằng 1) Trong pipeline Attention đứng ngay sau embedding.md và dùng softmax.md để chuẩn hóa trọng số. Slides & demo Link Slides slides/attention Working app demos/attention/app Tham khảo Vaswani et al. 2017 — Attention Is All You Need Jay Alammar — The Illustrated Transformer Related softmax.md , embedding.md"}, {"id": "softmax", "num": "04", "date": "06/2023", "title": "Softmax", "summary": "Biến điểm số thô thành phần trăm, cộng lại bằng 1.", "topics": ["softmax", "logits", "classification"], "group": "concept", "page": "notes/softmax.html", "slides": "slides/softmax/index.html", "demo": "demos/softmax/app/index.html", "extra_links": [], "search_text": "softmax biến điểm số thô thành phần trăm, cộng lại bằng 1. softmax logits classification softmax biến một dãy điểm số thô (logits) thành phần trăm: mỗi lựa chọn một xác suất, cộng tất cả lại bằng 1. vì sao quan trọng mô hình thường xuất ra vài con số thô, ví dụ điểm cho ba lớp cảm xúc: . những số này khó đọc và không phải xác suất. softmax nén chúng thành — vừa dễ hiểu (\"66% là tiêu cực\"), vừa cộng lại bằng 1. đây là bước cuối ở hầu hết bài phân loại, và cũng là bước chuẩn hóa trọng số bên trong attention. ý chính công thức trực giác: lấy cho từng lựa chọn rồi chia cho tổng. mũ hóa làm điểm cao nổi bật hơn, điểm thấp bị ép nhỏ lại. giữ thứ hạng, nới khoảng cách: lựa chọn điểm cao nhất vẫn xác suất cao nhất, nhưng chênh lệch bị \"kéo giãn\" — thường ra một đỉnh rõ ràng. hai chỗ hay gặp: đầu phân loại (classification head) : ví dụ 3 lớp cảm xúc, xem 05 demo text.md . trọng số attention : chuẩn hóa điểm liên quan giữa các từ, xem attention.md . đi cặp với cross entropy khi train: softmax cho xác suất dự đoán, cross entropy đo nó lệch bao nhiêu so với đáp án đúng → tín hiệu để mô hình học. softmax regression = hồi quy logistic nhiều lớp: phiên bản mở rộng cho bài chọn 1 trong nhiều lớp. hình minh họa softmax biến điểm thô thành phân phối xác suất cộng bằng 1 softmax regression: phân loại nhiều lớp trong pipeline softmax là bước chốt của 05 demo text.md và bước chuẩn hóa bên trong attention.md . slides & demo link slides slides/softmax working app demos/softmax/app tham khảo google — ml crash course: softmax cs231n — softmax classifier related classification.md — bài build model ngay sau softmax attention.md , 05 demo text.md", "body_text": "Softmax Biến một dãy điểm số thô (logits) thành phần trăm: mỗi lựa chọn một xác suất, cộng tất cả lại bằng 1. Vì sao quan trọng Mô hình thường xuất ra vài con số thô, ví dụ điểm cho ba lớp cảm xúc: . Những số này khó đọc và không phải xác suất. Softmax nén chúng thành — vừa dễ hiểu (\"66% là tiêu cực\"), vừa cộng lại bằng 1. Đây là bước cuối ở hầu hết bài phân loại, và cũng là bước chuẩn hóa trọng số bên trong attention. Ý chính Công thức trực giác: lấy cho từng lựa chọn rồi chia cho tổng. Mũ hóa làm điểm cao nổi bật hơn, điểm thấp bị ép nhỏ lại. Giữ thứ hạng, nới khoảng cách: lựa chọn điểm cao nhất vẫn xác suất cao nhất, nhưng chênh lệch bị \"kéo giãn\" — thường ra một đỉnh rõ ràng. Hai chỗ hay gặp: Đầu phân loại (classification head) : ví dụ 3 lớp cảm xúc, xem 05 demo text.md . Trọng số attention : chuẩn hóa điểm liên quan giữa các từ, xem attention.md . Đi cặp với cross entropy khi train: softmax cho xác suất dự đoán, cross entropy đo nó lệch bao nhiêu so với đáp án đúng → tín hiệu để mô hình học. Softmax regression = hồi quy logistic nhiều lớp: phiên bản mở rộng cho bài chọn 1 trong nhiều lớp. Hình minh họa Softmax biến điểm thô thành phân phối xác suất cộng bằng 1 Softmax regression: phân loại nhiều lớp Trong pipeline Softmax là bước chốt của 05 demo text.md và bước chuẩn hóa bên trong attention.md . Slides & demo Link Slides slides/softmax Working app demos/softmax/app Tham khảo Google — ML Crash Course: Softmax CS231n — Softmax classifier Related classification.md — bài build model ngay sau softmax attention.md , 05 demo text.md"}, {"id": "classification", "num": "05", "date": "08/2023", "title": "Classification", "summary": "Dán nhãn cho đầu vào — bài build model phổ biến nhất, ngay sau softmax.", "topics": ["classification", "cross-entropy", "multi-class", "F1"], "group": "concept", "page": "notes/classification.html", "slides": null, "demo": null, "extra_links": [], "search_text": "classification dán nhãn cho đầu vào — bài build model phổ biến nhất, ngay sau softmax. classification cross entropy multi class f1 classification — dán nhãn cho đầu vào cho một đầu vào (câu chữ, ảnh, vài con số), model chọn một nhãn trong tập nhãn cho trước. đây là bài toán \"build model\" phổ biến nhất, đứng ngay sau softmax . vì sao quan trọng rất nhiều việc thực tế quy về phân loại: câu này tích cực hay tiêu cực, email có phải spam, ảnh là chó hay mèo, câu hỏi dễ hay khó. hiểu classification là hiểu cách một model \"ra quyết định rời rạc\" — và nó tái dùng đúng chuỗi tokenize → embedding → softmax mà lab đã đi qua. ý chính classification head: phần cuối của model biến biểu diễn (vector) thành một điểm số cho mỗi nhãn (logits), rồi softmax đổi thành xác suất → chọn nhãn cao nhất. binary vs multi class vs multi label: binary : 2 lớp (spam / không). multi class : chọn 1 trong nhiều lớp (neg / neu / pos). multi label : một đầu vào có thể mang nhiều nhãn cùng lúc. học bằng loss: cross entropy đo xác suất dự đoán lệch đáp án bao nhiêu; train là đẩy loss xuống (06 train infer.md ). đánh giá: accuracy dễ hiểu nhưng gây hiểu lầm khi dữ liệu lệch lớp; nên xem thêm precision / recall / f1. cân bằng dữ liệu: lớp hiếm dễ bị model bỏ qua — cần để ý phân bố nhãn. hình minh họa softmax regression: mô hình phân loại nhiều lớp softmax đổi điểm thô thành xác suất để chọn nhãn trong pipeline classification là \"đích đến\" của softmax.md ; huấn luyện nó bằng pytorch training.md hoặc tensorflow training.md . tham khảo scikit learn — classification google — classification (ml crash course) related softmax.md , 05 demo text.md pytorch training.md , tensorflow training.md", "body_text": "Classification — dán nhãn cho đầu vào Cho một đầu vào (câu chữ, ảnh, vài con số), model chọn một nhãn trong tập nhãn cho trước. Đây là bài toán \"build model\" phổ biến nhất, đứng ngay sau softmax . Vì sao quan trọng Rất nhiều việc thực tế quy về phân loại: câu này tích cực hay tiêu cực, email có phải spam, ảnh là chó hay mèo, câu hỏi dễ hay khó. Hiểu classification là hiểu cách một model \"ra quyết định rời rạc\" — và nó tái dùng đúng chuỗi tokenize → embedding → softmax mà lab đã đi qua. Ý chính Classification head: phần cuối của model biến biểu diễn (vector) thành một điểm số cho mỗi nhãn (logits), rồi softmax đổi thành xác suất → chọn nhãn cao nhất. Binary vs multi class vs multi label: Binary : 2 lớp (spam / không). Multi class : chọn 1 trong nhiều lớp (neg / neu / pos). Multi label : một đầu vào có thể mang nhiều nhãn cùng lúc. Học bằng loss: cross entropy đo xác suất dự đoán lệch đáp án bao nhiêu; train là đẩy loss xuống (06 train infer.md ). Đánh giá: accuracy dễ hiểu nhưng gây hiểu lầm khi dữ liệu lệch lớp; nên xem thêm precision / recall / F1. Cân bằng dữ liệu: lớp hiếm dễ bị model bỏ qua — cần để ý phân bố nhãn. Hình minh họa Softmax regression: mô hình phân loại nhiều lớp Softmax đổi điểm thô thành xác suất để chọn nhãn Trong pipeline Classification là \"đích đến\" của softmax.md ; huấn luyện nó bằng pytorch training.md hoặc tensorflow training.md . Tham khảo scikit learn — classification Google — Classification (ML Crash Course) Related softmax.md , 05 demo text.md pytorch training.md , tensorflow training.md"}, {"id": "pytorch-training", "num": "06", "date": "10/2023", "title": "Train với PyTorch", "summary": "Vòng lặp epoch: forward → loss → backward → step. Tự tay train một classifier.", "topics": ["pytorch", "training", "epoch", "optimizer", "backprop"], "group": "concept", "page": "notes/pytorch-training.html", "slides": null, "demo": null, "extra_links": [], "search_text": "train với pytorch vòng lặp epoch: forward → loss → backward → step. tự tay train một classifier. pytorch training epoch optimizer backprop train với pytorch một bài \"chạy thật\": dùng pytorch để train một classifier — vòng lặp epoch, tính loss, backprop, cập nhật trọng số cho tới khi model đủ tốt. vì sao quan trọng pytorch là framework linh hoạt và phổ biến nhất để tự tay dựng và train model. hiểu vòng lặp training trong pytorch là hiểu cơ chế học thật sự diễn ra thế nào — thứ mà mọi thư viện cấp cao (hugging face , sentence transformers) đều gói lại bên dưới. vòng lặp training (khung xương) ý chính epoch vs batch: epoch = một lần đi hết dữ liệu; batch = một nhóm nhỏ xử lý mỗi bước. nhiều epoch để model học dần. 4 bước lặp lại: forward → loss → (gradient) → (cập nhật). nhớ để gradient không cộng dồn. optimizer & learning rate: adam/sgd quyết định đi bao xa mỗi bước; lr quá lớn → nhảy loạn, quá nhỏ → học chậm. train/val split: theo dõi loss trên tập validation để phát hiện overfitting (thuộc lòng train, kém trên dữ liệu mới). gpu: cho model và batch → train nhanh hơn nhiều; xem train gpu.md . xong thì lưu: → checkpoint để inference . trong pipeline đây là cách hiện thực việc train cho classification.md ; phiên bản tensorflow ở tensorflow training.md . tham khảo pytorch — training a classifier torch.optim related classification.md , tensorflow training.md train gpu.md , huggingface.md", "body_text": "Train với PyTorch Một bài \"chạy thật\": dùng PyTorch để train một classifier — vòng lặp epoch, tính loss, backprop, cập nhật trọng số cho tới khi model đủ tốt. Vì sao quan trọng PyTorch là framework linh hoạt và phổ biến nhất để tự tay dựng và train model. Hiểu vòng lặp training trong PyTorch là hiểu cơ chế học thật sự diễn ra thế nào — thứ mà mọi thư viện cấp cao (Hugging Face , sentence transformers) đều gói lại bên dưới. Vòng lặp training (khung xương) Ý chính Epoch vs batch: epoch = một lần đi hết dữ liệu; batch = một nhóm nhỏ xử lý mỗi bước. Nhiều epoch để model học dần. 4 bước lặp lại: forward → loss → (gradient) → (cập nhật). Nhớ để gradient không cộng dồn. Optimizer & learning rate: Adam/SGD quyết định đi bao xa mỗi bước; lr quá lớn → nhảy loạn, quá nhỏ → học chậm. Train/val split: theo dõi loss trên tập validation để phát hiện overfitting (thuộc lòng train, kém trên dữ liệu mới). GPU: cho model và batch → train nhanh hơn nhiều; xem train gpu.md . Xong thì lưu: → checkpoint để inference . Trong pipeline Đây là cách hiện thực việc train cho classification.md ; phiên bản TensorFlow ở tensorflow training.md . Tham khảo PyTorch — Training a classifier torch.optim Related classification.md , tensorflow training.md train gpu.md , huggingface.md"}, {"id": "tensorflow-training", "num": "07", "date": "11/2023", "title": "Train với TensorFlow / Keras", "summary": "compile + fit: khai báo model rồi để Keras lo vòng lặp epoch.", "topics": ["tensorflow", "keras", "training", "epoch"], "group": "concept", "page": "notes/tensorflow-training.html", "slides": null, "demo": null, "extra_links": [], "search_text": "train với tensorflow / keras compile + fit: khai báo model rồi để keras lo vòng lặp epoch. tensorflow keras training epoch train với tensorflow / keras cùng bài classifier, nhưng làm bằng tensorflow (api keras): định nghĩa model, , rồi qua nhiều epoch. ngắn gọn hơn pytorch nhờ vòng lặp training được gói sẵn. vì sao quan trọng tensorflow (qua keras) là lối train \"khai báo\": bạn mô tả model và cấu hình, framework lo phần lặp epoch. đối chiếu với pytorch (tự viết vòng lặp) giúp thấy rõ cùng một ý tưởng học nhưng hai phong cách api — và bạn chọn cái nào tùy dự án. khung xương ý chính = khai báo cách học: chọn optimizer, loss (softmax + cross entropy cho phân loại), metric theo dõi. = chạy training: framework tự lặp epoch/batch, tự backprop — không cần viết / như pytorch. theo dõi bằng metrics: , in ra mỗi epoch; bắt đầu tăng lại = dấu hiệu overfitting. callbacks: , giúp dừng đúng lúc và lưu model tốt nhất. tensorboard & projector: xem đường loss, và chiếu embedding xuống 3d để kiểm tra (embedding.md ). hình minh họa softmax regression — bài phân loại nhiều lớp làm bằng tensorflow tensorflow embedding projector: chiếu vector xuống 3d trong pipeline cùng đích với pytorch training.md , phục vụ classification.md . tham khảo tensorflow — basic classification keras api related classification.md , pytorch training.md train gpu.md , embedding.md", "body_text": "Train với TensorFlow / Keras Cùng bài classifier, nhưng làm bằng TensorFlow (API Keras): định nghĩa model, , rồi qua nhiều epoch. Ngắn gọn hơn PyTorch nhờ vòng lặp training được gói sẵn. Vì sao quan trọng TensorFlow (qua Keras) là lối train \"khai báo\": bạn mô tả model và cấu hình, framework lo phần lặp epoch. Đối chiếu với PyTorch (tự viết vòng lặp) giúp thấy rõ cùng một ý tưởng học nhưng hai phong cách API — và bạn chọn cái nào tùy dự án. Khung xương Ý chính = khai báo cách học: chọn optimizer, loss (softmax + cross entropy cho phân loại), metric theo dõi. = chạy training: framework tự lặp epoch/batch, tự backprop — không cần viết / như PyTorch. Theo dõi bằng metrics: , in ra mỗi epoch; bắt đầu tăng lại = dấu hiệu overfitting. Callbacks: , giúp dừng đúng lúc và lưu model tốt nhất. TensorBoard & Projector: xem đường loss, và chiếu embedding xuống 3D để kiểm tra (embedding.md ). Hình minh họa Softmax regression — bài phân loại nhiều lớp làm bằng TensorFlow TensorFlow Embedding Projector: chiếu vector xuống 3D Trong pipeline Cùng đích với pytorch training.md , phục vụ classification.md . Tham khảo TensorFlow — Basic classification Keras API Related classification.md , pytorch training.md train gpu.md , embedding.md"}, {"id": "huggingface", "num": "08", "date": "01/2024", "title": "Hugging Face — dataset + Space", "summary": "GitHub của AI: Datasets + Models pretrained + Spaces → ra model dùng được.", "topics": ["huggingface", "datasets", "spaces", "transformers", "fine-tune"], "group": "concept", "page": "notes/huggingface.html", "slides": null, "demo": null, "extra_links": [], "search_text": "hugging face — dataset + space github của ai: datasets + models pretrained + spaces → ra model dùng được. huggingface datasets spaces transformers fine tune hugging face — dataset + space → ra model \"github của ai\": nơi lấy sẵn dataset , model pretrained, và chạy/host demo bằng spaces . rút ngắn quãng đường từ ý tưởng tới một model dùng được. vì sao quan trọng tự train từ đầu rất tốn. hugging face cho phép đứng trên vai người khác : tải dataset có sẵn, lấy model pretrained rồi chỉ fine tune nhẹ, và deploy demo trong vài phút. đây là cách nhanh nhất để đi từ training tới một model có thể chia sẻ. ba mảnh chính mảnh là gì dùng để datasets kho dữ liệu có nhãn, tải 1 dòng có ngay dữ liệu train/eval models (hub) model pretrained (bert, gpt, vit…) fine tune thay vì train từ 0 spaces host app demo (gradio/streamlit), có gpu chạy & chia sẻ model ra web ý chính + : vài dòng là nạp được model + tokenizer + dữ liệu; fine tune bằng hoặc vòng lặp pytorch/tf quen thuộc. fine tune train from scratch: tận dụng kiến thức đã học của model lớn → cần ít dữ liệu và thời gian hơn nhiều. spaces = demo + endpoint: đẩy model lên space (kèm gpu nếu cần) → có ngay ui và api để người khác thử. model card & license: đọc kỹ giấy phép và giới hạn trước khi dùng thương mại. output là một model: kết quả cuối là checkpoint/endpoint sẵn sàng inference . trong pipeline hugging face là \"nguồn dữ liệu + nơi chạy\" cho pytorch training.md / tensorflow training.md ; dữ liệu thi đấu thì xem kaggle.md . tham khảo hugging face hub · datasets · spaces transformers related pytorch training.md , tensorflow training.md kaggle.md , sentence transformers.md , train gpu.md", "body_text": "Hugging Face — dataset + Space → ra model \"GitHub của AI\": nơi lấy sẵn dataset , model pretrained, và chạy/host demo bằng Spaces . Rút ngắn quãng đường từ ý tưởng tới một model dùng được. Vì sao quan trọng Tự train từ đầu rất tốn. Hugging Face cho phép đứng trên vai người khác : tải dataset có sẵn, lấy model pretrained rồi chỉ fine tune nhẹ, và deploy demo trong vài phút. Đây là cách nhanh nhất để đi từ training tới một model có thể chia sẻ. Ba mảnh chính Mảnh Là gì Dùng để Datasets kho dữ liệu có nhãn, tải 1 dòng có ngay dữ liệu train/eval Models (Hub) model pretrained (BERT, GPT, ViT…) fine tune thay vì train từ 0 Spaces host app demo (Gradio/Streamlit), có GPU chạy & chia sẻ model ra web Ý chính + : vài dòng là nạp được model + tokenizer + dữ liệu; fine tune bằng hoặc vòng lặp PyTorch/TF quen thuộc. Fine tune train from scratch: tận dụng kiến thức đã học của model lớn → cần ít dữ liệu và thời gian hơn nhiều. Spaces = demo + endpoint: đẩy model lên Space (kèm GPU nếu cần) → có ngay UI và API để người khác thử. Model card & license: đọc kỹ giấy phép và giới hạn trước khi dùng thương mại. Output là một model: kết quả cuối là checkpoint/endpoint sẵn sàng inference . Trong pipeline Hugging Face là \"nguồn dữ liệu + nơi chạy\" cho pytorch training.md / tensorflow training.md ; dữ liệu thi đấu thì xem kaggle.md . Tham khảo Hugging Face Hub · Datasets · Spaces transformers Related pytorch training.md , tensorflow training.md kaggle.md , sentence transformers.md , train gpu.md"}, {"id": "kaggle", "num": "09", "date": "03/2024", "title": "Kaggle — dataset + GPU notebook", "summary": "Kho dataset + notebook có GPU/TPU miễn phí + competition để cọ xát.", "topics": ["kaggle", "dataset", "gpu", "notebook", "competition"], "group": "concept", "page": "notes/kaggle.html", "slides": null, "demo": null, "extra_links": [], "search_text": "kaggle — dataset + gpu notebook kho dataset + notebook có gpu/tpu miễn phí + competition để cọ xát. kaggle dataset gpu notebook competition kaggle — dataset + notebook + gpu miễn phí nền tảng học và thi đấu ml: kho dataset khổng lồ, notebook chạy sẵn có gpu/tpu miễn phí , và các competition để cọ xát. tương tự hugging face nhưng nghiêng về thực hành và thi đấu. vì sao quan trọng khi mới học, hai thứ hay thiếu là dữ liệu tốt và máy đủ mạnh . kaggle cho cả hai miễn phí: dataset đa dạng và notebook có gpu để train ngay trên trình duyệt. các competition còn cho leaderboard và lời giải công khai — học từ cách người giỏi làm. ý chính datasets: hàng chục nghìn bộ dữ liệu công khai, tải thẳng vào notebook. notebooks (kernels): môi trường chạy sẵn thư viện, bật gpu/tpu trong settings → train không cần cài gì máy cá nhân. competitions: đề bài thật + metric + leaderboard; nộp dự đoán để chấm điểm. đọc public notebooks để học mẹo. giới hạn quota: gpu miễn phí có hạn giờ/tuần → canh dùng cho lúc train thật. kết nối hf: thường tải dataset ở kaggle, model pretrained ở hugging face , rồi train trên notebook kaggle. trong pipeline cùng vai \"dữ liệu + nơi chạy gpu\" với huggingface.md ; tổng quan stack ở train gpu.md . tham khảo kaggle datasets · notebooks kaggle learn related huggingface.md , pytorch training.md train gpu.md , 06 train infer.md", "body_text": "Kaggle — dataset + notebook + GPU miễn phí Nền tảng học và thi đấu ML: kho dataset khổng lồ, notebook chạy sẵn có GPU/TPU miễn phí , và các competition để cọ xát. Tương tự Hugging Face nhưng nghiêng về thực hành và thi đấu. Vì sao quan trọng Khi mới học, hai thứ hay thiếu là dữ liệu tốt và máy đủ mạnh . Kaggle cho cả hai miễn phí: dataset đa dạng và notebook có GPU để train ngay trên trình duyệt. Các competition còn cho leaderboard và lời giải công khai — học từ cách người giỏi làm. Ý chính Datasets: hàng chục nghìn bộ dữ liệu công khai, tải thẳng vào notebook. Notebooks (Kernels): môi trường chạy sẵn thư viện, bật GPU/TPU trong settings → train không cần cài gì máy cá nhân. Competitions: đề bài thật + metric + leaderboard; nộp dự đoán để chấm điểm. Đọc public notebooks để học mẹo. Giới hạn quota: GPU miễn phí có hạn giờ/tuần → canh dùng cho lúc train thật. Kết nối HF: thường tải dataset ở Kaggle, model pretrained ở Hugging Face , rồi train trên notebook Kaggle. Trong pipeline Cùng vai \"dữ liệu + nơi chạy GPU\" với huggingface.md ; tổng quan stack ở train gpu.md . Tham khảo Kaggle Datasets · Notebooks Kaggle Learn Related huggingface.md , pytorch training.md train gpu.md , 06 train infer.md"}, {"id": "transformer", "num": "10", "date": "05/2024", "title": "Transformer — kiến trúc lõi của LLM", "summary": "Xếp chồng khối attention + positional encoding; encoder (BERT) / decoder (GPT).", "topics": ["transformer", "attention", "encoder", "decoder", "positional-encoding"], "group": "concept", "page": "notes/transformer.html", "slides": null, "demo": null, "extra_links": [], "search_text": "transformer — kiến trúc lõi của llm xếp chồng khối attention + positional encoding; encoder (bert) / decoder (gpt). transformer attention encoder decoder positional encoding transformer — kiến trúc lõi của llm kiến trúc ghép nhiều khối attention lại, xử lý cả câu song song thay vì tuần tự. là bộ khung đứng sau bert, gpt và gần như mọi model ngôn ngữ hiện đại. vì sao quan trọng trước transformer, model đọc câu tuần tự (rnn/lstm) — chậm và hay quên phần đầu câu. transformer (2017, \"attention is all you need\") bỏ tuần tự, cho mọi từ nhìn nhau cùng lúc bằng attention → train nhanh trên gpu và bắt được quan hệ xa. đây là bước ngoặt mở ra kỷ nguyên llm. ý chính xếp chồng khối attention: mỗi lớp gồm multi head attention + mạng feed forward, chồng nhiều lớp để học biểu diễn ngày càng trừu tượng. positional encoding: vì xử lý song song (không theo thứ tự), phải chèn thông tin vị trí để model biết từ nào đứng trước/sau. encoder / decoder: encoder (bert): đọc hiểu cả câu → hợp cho classification , embedding. decoder (gpt): sinh từ trái sang phải → hợp cho tạo văn bản. encoder decoder : dịch máy, tóm tắt (dùng cross attention). residual + layer norm: mẹo giúp mạng sâu vẫn train ổn định. song song = nhanh: không phụ thuộc bước trước → tận dụng gpu tối đa (train gpu.md ). hình minh họa self attention trong một khối encoder cross attention: decoder nhìn sang encoder (dịch máy) trọng số attention sau softmax bên trong một lớp trong pipeline transformer là \"khung nhà\" gói attention.md , embedding.md và softmax.md lại thành một model hoàn chỉnh. tham khảo vaswani et al. 2017 — attention is all you need jay alammar — the illustrated transformer related attention.md , embedding.md , softmax.md huggingface.md — model transformer pretrained", "body_text": "Transformer — kiến trúc lõi của LLM Kiến trúc ghép nhiều khối attention lại, xử lý cả câu song song thay vì tuần tự. Là bộ khung đứng sau BERT, GPT và gần như mọi model ngôn ngữ hiện đại. Vì sao quan trọng Trước Transformer, model đọc câu tuần tự (RNN/LSTM) — chậm và hay quên phần đầu câu. Transformer (2017, \"Attention Is All You Need\") bỏ tuần tự, cho mọi từ nhìn nhau cùng lúc bằng attention → train nhanh trên GPU và bắt được quan hệ xa. Đây là bước ngoặt mở ra kỷ nguyên LLM. Ý chính Xếp chồng khối attention: mỗi lớp gồm multi head attention + mạng feed forward, chồng nhiều lớp để học biểu diễn ngày càng trừu tượng. Positional encoding: vì xử lý song song (không theo thứ tự), phải chèn thông tin vị trí để model biết từ nào đứng trước/sau. Encoder / decoder: Encoder (BERT): đọc hiểu cả câu → hợp cho classification , embedding. Decoder (GPT): sinh từ trái sang phải → hợp cho tạo văn bản. Encoder decoder : dịch máy, tóm tắt (dùng cross attention). Residual + layer norm: mẹo giúp mạng sâu vẫn train ổn định. Song song = nhanh: không phụ thuộc bước trước → tận dụng GPU tối đa (train gpu.md ). Hình minh họa Self attention trong một khối encoder Cross attention: decoder nhìn sang encoder (dịch máy) Trọng số attention sau softmax bên trong một lớp Trong pipeline Transformer là \"khung nhà\" gói attention.md , embedding.md và softmax.md lại thành một model hoàn chỉnh. Tham khảo Vaswani et al. 2017 — Attention Is All You Need Jay Alammar — The Illustrated Transformer Related attention.md , embedding.md , softmax.md huggingface.md — model Transformer pretrained"}, {"id": "sentence-transformers", "num": "11", "date": "07/2024", "title": "sentence-transformers — embedding câu", "summary": "Câu → vector trong vài dòng; classification & similarity siêu nhanh, siêu đơn giản.", "topics": ["sentence-transformers", "sbert", "embedding", "similarity", "classification"], "group": "concept", "page": "notes/sentence-transformers.html", "slides": null, "demo": null, "extra_links": [], "search_text": "sentence transformers — embedding câu câu → vector trong vài dòng; classification & similarity siêu nhanh, siêu đơn giản. sentence transformers sbert embedding similarity classification sentence transformers — embedding câu trong vài dòng thư viện của hugging face biến cả một câu thành một vector chất lượng cao chỉ với vài dòng code. nhờ đó các bài classification / similarity làm được siêu nhanh, siêu đơn giản . vì sao quan trọng tự train một model embedding câu tốn rất nhiều công. gói sẵn model pretrained (vd , ) để câu → vector dùng ngay. với nhiều bài toán, chỉ cần embedding tốt + một bước nhẹ là xong — không cần train mạng lớn. dùng nhanh ý chính câu → vector 1 bước: trả embedding đã tối ưu cho so sánh nghĩa ở mức câu (khác embedding từng token). classification siêu nhanh: encode câu rồi gắn một classifier nhẹ (logistic / k nn) lên trên — không cần fine tune cả transformer. similarity & search: để tìm câu gần nghĩa; là lõi của semantic search.md và retrieve trong rag.md . nạp vào vector db: vector từ đẩy thẳng vào vector database.md để tìm top k. chọn model theo nhu cầu: minilm nhẹ & nhanh; mpnet chính xác hơn nhưng nặng hơn. hình minh họa cosine similarity giữa hai vector câu embedding: hàm biến văn bản thành vector trong pipeline đây là con đường ngắn nhất từ embedding.md tới classification.md và semantic search.md mà không phải train nặng. tham khảo sbert / sentence transformers reimers & gurevych 2019 — sentence bert related embedding.md , classification.md semantic search.md , vector database.md , huggingface.md", "body_text": "sentence transformers — embedding câu trong vài dòng Thư viện của Hugging Face biến cả một câu thành một vector chất lượng cao chỉ với vài dòng code. Nhờ đó các bài classification / similarity làm được siêu nhanh, siêu đơn giản . Vì sao quan trọng Tự train một model embedding câu tốn rất nhiều công. gói sẵn model pretrained (vd , ) để câu → vector dùng ngay. Với nhiều bài toán, chỉ cần embedding tốt + một bước nhẹ là xong — không cần train mạng lớn. Dùng nhanh Ý chính Câu → vector 1 bước: trả embedding đã tối ưu cho so sánh nghĩa ở mức câu (khác embedding từng token). Classification siêu nhanh: encode câu rồi gắn một classifier nhẹ (logistic / k NN) lên trên — không cần fine tune cả Transformer. Similarity & search: để tìm câu gần nghĩa; là lõi của semantic search.md và retrieve trong rag.md . Nạp vào vector DB: vector từ đẩy thẳng vào vector database.md để tìm top k. Chọn model theo nhu cầu: MiniLM nhẹ & nhanh; mpnet chính xác hơn nhưng nặng hơn. Hình minh họa Cosine similarity giữa hai vector câu Embedding: hàm biến văn bản thành vector Trong pipeline Đây là con đường ngắn nhất từ embedding.md tới classification.md và semantic search.md mà không phải train nặng. Tham khảo SBERT / sentence transformers Reimers & Gurevych 2019 — Sentence BERT Related embedding.md , classification.md semantic search.md , vector database.md , huggingface.md"}, {"id": "rag", "num": "12", "date": "08/2024", "title": "RAG", "summary": "Tra cứu tài liệu liên quan trước, rồi mới để model soạn câu trả lời có trích dẫn.", "topics": ["RAG", "vector-db", "retrieve"], "group": "concept", "page": "notes/rag.html", "slides": "slides/rag/index.html", "demo": "demos/rag/app/index.html", "extra_links": [], "search_text": "rag tra cứu tài liệu liên quan trước, rồi mới để model soạn câu trả lời có trích dẫn. rag vector db retrieve rag — retrieval augmented generation thay vì bắt mô hình trả lời bằng mỗi trí nhớ, trước tiên đi tra cứu tài liệu liên quan rồi mới để mô hình soạn câu trả lời dựa trên đó. giống mở sách ra tra trước khi phát biểu. vì sao quan trọng mô hình ngôn ngữ biết nhiều nhưng hay \"chém\" (bịa) khi gặp thứ ngoài trí nhớ, và không cập nhật tài liệu riêng của bạn. rag vá cả hai: neo câu trả lời vào một kho tài liệu thật (tài liệu công ty, video, repo…), kèm trích dẫn nguồn. nhờ vậy trả lời đúng hơn, cập nhật hơn, và kiểm chứng được — không cần train lại mô hình. ý chính hai pha: retrieve : đổi câu hỏi thành vector (embedding.md ), tìm trong vector db ra top k đoạn (chunk) gần nghĩa nhất. generate : nhét các đoạn đó vào prompt làm ngữ cảnh, mô hình soạn câu trả lời bám theo. chunk + vector db: tài liệu được cắt thành đoạn nhỏ, mỗi đoạn một vector; db (faiss, chroma, pgvector…) lo tìm nhanh đoạn gần nhất, có thể lọc thêm bằng metadata. khác chat thuần: chat thuần dựa vào trí nhớ mô hình; rag luôn neo vào corpus nên trả lời được câu về tài liệu mô hình chưa từng thấy. chất lượng phụ thuộc retrieve: lấy sai đoạn thì mô hình soạn hay đến mấy cũng sai. cắt chunk hợp lý và embedding tốt là mấu chốt. biến thể nâng cao: graph rag nối các thực thể thành đồ thị để trả lời câu bắc cầu; rerank, hybrid search (từ khóa + vector) để tăng độ chính xác. hình minh họa embed câu hỏi rồi đi truy vấn kho tài liệu đường đi của một pipeline rag graph rag: nối thực thể thành đồ thị để trả lời câu bắc cầu rag nâng cao: thêm rerank / lọc để tăng độ chính xác trong pipeline rag đứng trên embedding.md ; personal knowledge base của lab đi đúng hướng này (personal knowledge base.md ). slides & demo link slides slides/rag working app demos/rag/app tham khảo lewis et al. 2020 — retrieval augmented generation microsoft graphrag related vector database.md , semantic search.md — hạ tầng & retrieve cho rag embedding.md , personal knowledge base.md", "body_text": "RAG — Retrieval Augmented Generation Thay vì bắt mô hình trả lời bằng mỗi trí nhớ, trước tiên đi tra cứu tài liệu liên quan rồi mới để mô hình soạn câu trả lời dựa trên đó. Giống mở sách ra tra trước khi phát biểu. Vì sao quan trọng Mô hình ngôn ngữ biết nhiều nhưng hay \"chém\" (bịa) khi gặp thứ ngoài trí nhớ, và không cập nhật tài liệu riêng của bạn. RAG vá cả hai: neo câu trả lời vào một kho tài liệu thật (tài liệu công ty, video, repo…), kèm trích dẫn nguồn. Nhờ vậy trả lời đúng hơn, cập nhật hơn, và kiểm chứng được — không cần train lại mô hình. Ý chính Hai pha: Retrieve : đổi câu hỏi thành vector (embedding.md ), tìm trong vector DB ra top k đoạn (chunk) gần nghĩa nhất. Generate : nhét các đoạn đó vào prompt làm ngữ cảnh, mô hình soạn câu trả lời bám theo. Chunk + vector DB: tài liệu được cắt thành đoạn nhỏ, mỗi đoạn một vector; DB (FAISS, Chroma, pgvector…) lo tìm nhanh đoạn gần nhất, có thể lọc thêm bằng metadata. Khác chat thuần: chat thuần dựa vào trí nhớ mô hình; RAG luôn neo vào corpus nên trả lời được câu về tài liệu mô hình chưa từng thấy. Chất lượng phụ thuộc retrieve: lấy sai đoạn thì mô hình soạn hay đến mấy cũng sai. Cắt chunk hợp lý và embedding tốt là mấu chốt. Biến thể nâng cao: Graph RAG nối các thực thể thành đồ thị để trả lời câu bắc cầu; rerank, hybrid search (từ khóa + vector) để tăng độ chính xác. Hình minh họa Embed câu hỏi rồi đi truy vấn kho tài liệu Đường đi của một pipeline RAG Graph RAG: nối thực thể thành đồ thị để trả lời câu bắc cầu RAG nâng cao: thêm rerank / lọc để tăng độ chính xác Trong pipeline RAG đứng trên embedding.md ; Personal Knowledge base của lab đi đúng hướng này (personal knowledge base.md ). Slides & demo Link Slides slides/rag Working app demos/rag/app Tham khảo Lewis et al. 2020 — Retrieval Augmented Generation Microsoft GraphRAG Related vector database.md , semantic search.md — hạ tầng & retrieve cho RAG embedding.md , personal knowledge base.md"}, {"id": "vector-database", "num": "13", "date": "10/2024", "title": "Vector database", "summary": "Kho lưu vector + tìm top-k hàng xóm gần nhất (ANN). Hạ tầng cho RAG & semantic search.", "topics": ["vector-db", "ANN", "faiss", "elasticsearch", "pgvector"], "group": "concept", "page": "notes/vector-database.html", "slides": null, "demo": null, "extra_links": [], "search_text": "vector database kho lưu vector + tìm top k hàng xóm gần nhất (ann). hạ tầng cho rag & semantic search. vector db ann faiss elasticsearch pgvector vector database nơi cất hàng triệu vector embedding và trả lời cực nhanh câu hỏi \"vector nào gần cái này nhất?\". là hạ tầng đứng dưới rag và semantic search. vì sao quan trọng embedding biến mọi thứ thành vector, nhưng có vector rồi thì cất ở đâu và tìm thế nào? duyệt lần lượt cả triệu vector để so từng cái (brute force) thì quá chậm. vector database giải đúng bài này: lưu vector kèm dữ liệu gốc, và tìm top k \"hàng xóm gần nhất\" trong mili giây nhờ chỉ mục xấp xỉ. không có nó, rag và semantic search không chạy được ở quy mô thật. ý chính bài toán lõi — nearest neighbor: cho một vector truy vấn, tìm k vector gần nhất theo cosine / dot product (embedding.md ). ann thay vì brute force: chỉ mục xấp xỉ (hnsw, ivf…) đánh đổi một chút độ chính xác để tăng tốc hàng trăm lần — đủ tốt cho tìm kiếm. không chỉ là vector: mỗi bản ghi kèm metadata (nguồn, ngày, nhãn) để lọc trước/sau khi tìm; và cần crud (thêm/sửa/xóa) khi dữ liệu thay đổi. vài lựa chọn quen thuộc: faiss — in memory, rất nhanh, hợp thử nghiệm; nhưng thiếu crud và lưu bền. elasticsearch (knn plugin) — tích hợp sẵn với keyword search, có crud, phân tán được. pgvector / chroma — gắn thẳng vào postgres / dùng nhẹ cho app nhỏ. chọn theo nhu cầu: cần quy mô + crud + phân tán → elastic; cần tốc độ thuần trong ram → faiss. hình minh họa embed câu hỏi rồi đi truy vấn kho vector khi nào dùng cosine, khi nào dùng dot product để so vector trong pipeline vector database nhận vector từ embedding.md và cấp top k cho rag.md lẫn semantic search.md . tham khảo faiss (meta) pgvector · elasticsearch knn search related embedding.md , rag.md , semantic search.md", "body_text": "Vector database Nơi cất hàng triệu vector embedding và trả lời cực nhanh câu hỏi \"vector nào gần cái này nhất?\". Là hạ tầng đứng dưới RAG và semantic search. Vì sao quan trọng Embedding biến mọi thứ thành vector, nhưng có vector rồi thì cất ở đâu và tìm thế nào? Duyệt lần lượt cả triệu vector để so từng cái (brute force) thì quá chậm. Vector database giải đúng bài này: lưu vector kèm dữ liệu gốc, và tìm top k \"hàng xóm gần nhất\" trong mili giây nhờ chỉ mục xấp xỉ. Không có nó, RAG và semantic search không chạy được ở quy mô thật. Ý chính Bài toán lõi — nearest neighbor: cho một vector truy vấn, tìm k vector gần nhất theo cosine / dot product (embedding.md ). ANN thay vì brute force: chỉ mục xấp xỉ (HNSW, IVF…) đánh đổi một chút độ chính xác để tăng tốc hàng trăm lần — đủ tốt cho tìm kiếm. Không chỉ là vector: mỗi bản ghi kèm metadata (nguồn, ngày, nhãn) để lọc trước/sau khi tìm; và cần CRUD (thêm/sửa/xóa) khi dữ liệu thay đổi. Vài lựa chọn quen thuộc: FAISS — in memory, rất nhanh, hợp thử nghiệm; nhưng thiếu CRUD và lưu bền. Elasticsearch (kNN plugin) — tích hợp sẵn với keyword search, có CRUD, phân tán được. pgvector / Chroma — gắn thẳng vào Postgres / dùng nhẹ cho app nhỏ. Chọn theo nhu cầu: cần quy mô + CRUD + phân tán → Elastic; cần tốc độ thuần trong RAM → FAISS. Hình minh họa Embed câu hỏi rồi đi truy vấn kho vector Khi nào dùng cosine, khi nào dùng dot product để so vector Trong pipeline Vector database nhận vector từ embedding.md và cấp top k cho rag.md lẫn semantic search.md . Tham khảo FAISS (Meta) pgvector · Elasticsearch kNN search Related embedding.md , rag.md , semantic search.md"}, {"id": "semantic-search", "num": "14", "date": "12/2024", "title": "Semantic search — hybrid · tiered · fallback", "summary": "Tìm theo nghĩa: ghép inverted-index (Elastic) + semantic index (embedding). Dự án học RAG của tôi.", "topics": ["semantic-search", "hybrid", "inverted-index", "elasticsearch", "ms-marco"], "group": "project", "page": "notes/semantic-search.html", "slides": null, "demo": null, "extra_links": [{"label": "GitHub — semantic-search", "href": "https://github.com/hoanganh25991/semantic-search"}], "search_text": "semantic search — hybrid · tiered · fallback tìm theo nghĩa: ghép inverted index (elastic) + semantic index (embedding). dự án học rag của tôi. semantic search hybrid inverted index elasticsearch ms marco semantic search — hybrid · tiered · fallback tìm theo nghĩa chứ không chỉ khớp từ khóa, bằng cách ghép hai loại chỉ mục: inverted index (elastic, theo từ khóa) và semantic index (embedding, theo nghĩa). đây là dự án mình làm để học sâu về rag. repo: github.com/hoanganh25991/semantic search — hybrid / tiered / fallback trên dataset ms marco. vì sao quan trọng tìm bằng từ khóa (bm25 / tf idf trong elastic) thì nhanh và rẻ, nhưng \"xe hơi\" với \"ô tô\" là hai từ khác nhau nên dễ trượt. tìm bằng embedding thì hiểu nghĩa, nhưng nặng và tốn khi chạy trên mọi câu. semantic search thực dụng là kết hợp cả hai: lấy cái nhanh để lọc, cái hiểu nghĩa để xếp hạng. đây cũng chính là bước \"retrieve\" chất lượng cao cho rag . hai loại chỉ mục chỉ mục cơ chế mạnh yếu inverted index (elastic) map từ khóa → tài liệu nhanh, rẻ, chính xác với truy vấn rõ không hiểu từ đồng nghĩa semantic index (embedding) vector trong vector database hiểu nghĩa, bắt được diễn đạt khác nặng hơn, cần model ba chiến lược tìm kiếm hybrid: dùng inverted index lọc nhanh ứng viên theo từ khóa, rồi semantic index rerank theo nghĩa. tối ưu chi phí; điểm yếu là nếu keyword trượt thì thiếu ứng viên để rerank. tiered: phân loại câu hỏi dễ/khó trước → câu dễ đi keyword, câu khó mới đi semantic. cân bằng tốc độ và độ chính xác (cùng ý tưởng với complexity router ). fallback: semantic trước để tối đa độ chính xác, nếu kết quả kém thì rớt về keyword. chính xác cao nhưng đắt hơn. dataset & đánh giá ms marco — câu hỏi thật của người dùng + đoạn văn liên quan, dùng làm testbed. metrics: precision@k (tỉ lệ kết quả đúng trong top k), mrr@10 (vị trí kết quả đúng đầu tiên) — quan trọng khi câu trả lời đầu tiên là thứ đáng giá nhất. query classification: phân loại câu hỏi simple ( ) vs complex ( , , …) bằng một classifier fine tune trên embedding — đầu vào cho chiến lược tiered. kiến trúc lưu trữ mongodb — lưu tài liệu thô. elasticsearch — lưu dữ liệu đã index (cả inverted lẫn knn) để tìm nhanh. hình minh họa embed câu hỏi rồi đi truy vấn — bước retrieve của semantic search retrieval nâng cao: kết hợp lọc + rerank để tăng độ chính xác trong pipeline semantic search đứng trên embedding.md + vector database.md , và là bước retrieve cho rag.md . tham khảo repo: hoanganh25991/semantic search ms marco · elasticsearch knn related vector database.md , rag.md , embedding.md 05 demo text.md — complexity router (cùng ý \"tiered\")", "body_text": "Semantic search — hybrid · tiered · fallback Tìm theo nghĩa chứ không chỉ khớp từ khóa, bằng cách ghép hai loại chỉ mục: inverted index (Elastic, theo từ khóa) và semantic index (embedding, theo nghĩa). Đây là dự án mình làm để học sâu về RAG. Repo: github.com/hoanganh25991/semantic search — Hybrid / Tiered / Fallback trên dataset MS MARCO. Vì sao quan trọng Tìm bằng từ khóa (BM25 / TF IDF trong Elastic) thì nhanh và rẻ, nhưng \"xe hơi\" với \"ô tô\" là hai từ khác nhau nên dễ trượt. Tìm bằng embedding thì hiểu nghĩa, nhưng nặng và tốn khi chạy trên mọi câu. Semantic search thực dụng là kết hợp cả hai: lấy cái nhanh để lọc, cái hiểu nghĩa để xếp hạng. Đây cũng chính là bước \"retrieve\" chất lượng cao cho RAG . Hai loại chỉ mục Chỉ mục Cơ chế Mạnh Yếu Inverted index (Elastic) map từ khóa → tài liệu nhanh, rẻ, chính xác với truy vấn rõ không hiểu từ đồng nghĩa Semantic index (embedding) vector trong vector database hiểu nghĩa, bắt được diễn đạt khác nặng hơn, cần model Ba chiến lược tìm kiếm Hybrid: dùng inverted index lọc nhanh ứng viên theo từ khóa, rồi semantic index rerank theo nghĩa. Tối ưu chi phí; điểm yếu là nếu keyword trượt thì thiếu ứng viên để rerank. Tiered: phân loại câu hỏi dễ/khó trước → câu dễ đi keyword, câu khó mới đi semantic. Cân bằng tốc độ và độ chính xác (cùng ý tưởng với complexity router ). Fallback: semantic trước để tối đa độ chính xác, nếu kết quả kém thì rớt về keyword. Chính xác cao nhưng đắt hơn. Dataset & đánh giá MS MARCO — câu hỏi thật của người dùng + đoạn văn liên quan, dùng làm testbed. Metrics: Precision@k (tỉ lệ kết quả đúng trong top k), MRR@10 (vị trí kết quả đúng đầu tiên) — quan trọng khi câu trả lời đầu tiên là thứ đáng giá nhất. Query classification: phân loại câu hỏi simple ( ) vs complex ( , , …) bằng một classifier fine tune trên embedding — đầu vào cho chiến lược Tiered. Kiến trúc lưu trữ MongoDB — lưu tài liệu thô. Elasticsearch — lưu dữ liệu đã index (cả inverted lẫn kNN) để tìm nhanh. Hình minh họa Embed câu hỏi rồi đi truy vấn — bước retrieve của semantic search Retrieval nâng cao: kết hợp lọc + rerank để tăng độ chính xác Trong pipeline Semantic search đứng trên embedding.md + vector database.md , và là bước retrieve cho rag.md . Tham khảo Repo: hoanganh25991/semantic search MS MARCO · Elasticsearch kNN Related vector database.md , rag.md , embedding.md 05 demo text.md — complexity router (cùng ý \"tiered\")"}, {"id": "mcp", "num": "15", "date": "01/2025", "title": "MCP", "summary": "Chuẩn chung để agent gọi tool ngoài — như cổng USB-C cho AI. Host ↔ server ↔ tools có schema.", "topics": ["MCP", "tools", "protocol", "server"], "group": "concept", "page": "notes/mcp.html", "slides": "slides/mcp/index.html", "demo": "demos/mcp/app/index.html", "extra_links": [], "search_text": "mcp chuẩn chung để agent gọi tool ngoài — như cổng usb c cho ai. host ↔ server ↔ tools có schema. mcp tools protocol server mcp — model context protocol một chuẩn chung để agent gọi công cụ ngoài . ví như cổng usb c cho ai: thay vì mỗi app một kiểu cắm riêng, mọi tool nói cùng một \"giọng\" nên agent cắm vào là dùng được. vì sao quan trọng bản thân mô hình chỉ sinh chữ; muốn nó làm việc thật — mở trình duyệt, truy vấn db, render blender, search web — phải nối ra công cụ bên ngoài. trước mcp, mỗi tích hợp là code riêng, không tái dùng. mcp chuẩn hóa cách mô tả và gọi tool, nên một server viết một lần dùng được ở cursor, claude, pi… đây chính là bản lề đưa ai từ \"trả lời\" sang \"thực thi\" (xem 10 ai timeline.md ). kiến trúc host : nơi model chạy (cursor, claude code, pi…). server : process expose danh sách tool + input schema (json schema). tool : một hành động cụ thể — navigate browser, query db, render blender, search web. giao tiếp qua stdio hoặc http; mỗi tool tự mô tả tham số → model gọi đúng. ý chính discover rồi invoke: model hỏi server có tool gì (list) rồi mới gọi (call) — không hardcode. thêm tool mới không phải sửa model. kết quả có schema: trả json theo khuôn → dễ parse, dễ nối nhiều tool thành chuỗi. một chuẩn, nhiều client: cùng một mcp server chạy được trên mọi host hỗ trợ mcp. ranh giới an toàn: tool khai báo rõ tham số và quyền → host kiểm soát được model được phép làm gì. mcp ≠ skills mcp skills là gì tool có thể thực thi hướng dẫn (markdown) để model làm đúng dạng server + schema + script khi nào cần chạy action ra ngoài cần know how / quy trình lặp lại xem thêm: skills rules.md . ví dụ mcp server đang dùng browser (playwright / chrome devtools) — navigate, click, screenshot, đọc console. blender — chạy , inspect scene, render. tavily — web search / extract / crawl khi kiến thức local không đủ. tham khảo model context protocol — spec & docs giới thiệu mcp (anthropic) related 07 agents.md , skills rules.md , rag.md", "body_text": "MCP — Model Context Protocol Một chuẩn chung để agent gọi công cụ ngoài . Ví như cổng USB C cho AI: thay vì mỗi app một kiểu cắm riêng, mọi tool nói cùng một \"giọng\" nên agent cắm vào là dùng được. Vì sao quan trọng Bản thân mô hình chỉ sinh chữ; muốn nó làm việc thật — mở trình duyệt, truy vấn DB, render Blender, search web — phải nối ra công cụ bên ngoài. Trước MCP, mỗi tích hợp là code riêng, không tái dùng. MCP chuẩn hóa cách mô tả và gọi tool, nên một server viết một lần dùng được ở Cursor, Claude, Pi… Đây chính là bản lề đưa AI từ \"trả lời\" sang \"thực thi\" (xem 10 ai timeline.md ). Kiến trúc Host : nơi model chạy (Cursor, Claude Code, Pi…). Server : process expose danh sách tool + input schema (JSON Schema). Tool : một hành động cụ thể — navigate browser, query DB, render Blender, search web. Giao tiếp qua stdio hoặc HTTP; mỗi tool tự mô tả tham số → model gọi đúng. Ý chính Discover rồi invoke: model hỏi server có tool gì (list) rồi mới gọi (call) — không hardcode. Thêm tool mới không phải sửa model. Kết quả có schema: trả JSON theo khuôn → dễ parse, dễ nối nhiều tool thành chuỗi. Một chuẩn, nhiều client: cùng một MCP server chạy được trên mọi host hỗ trợ MCP. Ranh giới an toàn: tool khai báo rõ tham số và quyền → host kiểm soát được model được phép làm gì. MCP ≠ Skills MCP Skills Là gì tool có thể thực thi hướng dẫn (markdown) để model làm đúng Dạng server + schema + script Khi nào cần chạy action ra ngoài cần know how / quy trình lặp lại Xem thêm: skills rules.md . Ví dụ MCP server đang dùng browser (Playwright / Chrome DevTools) — navigate, click, screenshot, đọc console. blender — chạy , inspect scene, render. tavily — web search / extract / crawl khi kiến thức local không đủ. Tham khảo Model Context Protocol — spec & docs Giới thiệu MCP (Anthropic) Related 07 agents.md , skills rules.md , rag.md"}, {"id": "skills-rules", "num": "16", "date": "03/2025", "title": "Skills · Rules · Commands", "summary": "Know-how của AI agent: SKILL.md, rules, commands; global ~/.agents.", "topics": ["skills", "rules", "commands", "agents-md", "dot-agents"], "group": "concept", "page": "notes/skills-rules.html", "slides": null, "demo": "demos/mcp/app/index.html", "extra_links": [], "search_text": "skills · rules · commands know how của ai agent: skill.md, rules, commands; global ~/.agents. skills rules commands agents md dot agents skills · rules · commands ba cách \"dạy nghề\" cho một ai coding agent. skill = năng lực đóng gói agent tự lấy ra khi cần; rule = ràng buộc luôn áp; command = shortcut để kích hoạt một quy trình. vì sao quan trọng cùng một model, nếu được nạp đúng know how thì làm việc chuẩn hơn hẳn: biết quy trình của bạn, tuân quy ước dự án, không phải nhắc lại mỗi lần. ba lớp này là cách \"cấu hình bộ não\" đó. hiểu rõ khác biệt giúp đặt đúng thứ vào đúng chỗ — thứ bắt buộc thì thành rule, quy trình phức tạp thì thành skill. ba khái niệm lớp là gì khi nào load ví dụ skill 1 folder (+ script/asset) mô tả một năng lực model tự đọc khi task khớp description , , rule chỉ dẫn luôn áp hoặc theo pattern file mỗi turn (always) hoặc khi match glob commit style, \"docs = notes first\" command prompt / workflow gọi bằng shortcut khi user gõ (vd ) , skill.md — cấu trúc description là phần quan trọng nhất: viết rõ trigger (\"use when…\") để agent tự chọn. skill có thể kèm script → agent chạy qua shell/mcp. global home: canonical: . cursor / claude / pi đều load từ đây → viết một lần, dùng nhiều client. không copy skill vào hay (để trống); pi chỉ dùng symlink trỏ về . cài / khoá version các skill pack từ github : (alias ) — copy tĩnh bằng rsync, lockfile ở . không dùng cho . project local exception skill riêng cho một repo có thể để trong của repo đó. skill cá nhân/global thì vẫn ở . rules — ghi nhớ thực chiến rule \"always\" tốn context mỗi turn → giữ ngắn, chỉ đưa thứ thật sự bắt buộc. rule theo glob ( , ) chỉ nạp khi đụng file khớp → rẻ hơn. dùng rule cho quy ước bền vững (commit, layout docs), skill cho quy trình phức tạp. liên quan hệ thống khi thêm skill mới, cân nhắc nó ảnh hưởng skill đang có thế nào (chồng trigger, mâu thuẫn hướng dẫn). anthropic opus/sonnet mạnh ở việc hỏi ngược để làm rõ tương tác này. tham khảo anthropic — agent skills agents.md — chuẩn khai báo hướng dẫn cho agent related mcp.md , 07 agents.md , 08 model notes.md", "body_text": "Skills · Rules · Commands Ba cách \"dạy nghề\" cho một AI coding agent. Skill = năng lực đóng gói agent tự lấy ra khi cần; Rule = ràng buộc luôn áp; Command = shortcut để kích hoạt một quy trình. Vì sao quan trọng Cùng một model, nếu được nạp đúng know how thì làm việc chuẩn hơn hẳn: biết quy trình của bạn, tuân quy ước dự án, không phải nhắc lại mỗi lần. Ba lớp này là cách \"cấu hình bộ não\" đó. Hiểu rõ khác biệt giúp đặt đúng thứ vào đúng chỗ — thứ bắt buộc thì thành rule, quy trình phức tạp thì thành skill. Ba khái niệm Lớp Là gì Khi nào load Ví dụ Skill 1 folder (+ script/asset) mô tả một năng lực model tự đọc khi task khớp description , , Rule chỉ dẫn luôn áp hoặc theo pattern file mỗi turn (always) hoặc khi match glob commit style, \"docs = notes first\" Command prompt / workflow gọi bằng shortcut khi user gõ (vd ) , SKILL.md — cấu trúc description là phần quan trọng nhất: viết rõ trigger (\"use when…\") để agent tự chọn. Skill có thể kèm script → agent chạy qua shell/MCP. Global home: Canonical: . Cursor / Claude / Pi đều load từ đây → viết một lần, dùng nhiều client. Không copy skill vào hay (để trống); Pi chỉ dùng symlink trỏ về . Cài / khoá version các skill pack từ GitHub : (alias ) — copy tĩnh bằng rsync, lockfile ở . Không dùng cho . Project local exception Skill riêng cho một repo có thể để trong của repo đó. Skill cá nhân/global thì vẫn ở . Rules — ghi nhớ thực chiến Rule \"always\" tốn context mỗi turn → giữ ngắn, chỉ đưa thứ thật sự bắt buộc. Rule theo glob ( , ) chỉ nạp khi đụng file khớp → rẻ hơn. Dùng rule cho quy ước bền vững (commit, layout docs), skill cho quy trình phức tạp. Liên quan hệ thống Khi thêm skill mới, cân nhắc nó ảnh hưởng skill đang có thế nào (chồng trigger, mâu thuẫn hướng dẫn). Anthropic Opus/Sonnet mạnh ở việc hỏi ngược để làm rõ tương tác này. Tham khảo Anthropic — Agent Skills AGENTS.md — chuẩn khai báo hướng dẫn cho agent Related mcp.md , 07 agents.md , 08 model notes.md"}, {"id": "train-gpu", "num": "17", "date": "05/2025", "title": "Train · PyTorch / TensorFlow · GPU", "summary": "HF/Kaggle datasets, PyTorch & TensorFlow, GPU notebooks, train → inference.", "topics": ["pytorch", "tensorflow", "GPU", "huggingface", "kaggle"], "group": "concept", "page": "notes/train-gpu.html", "slides": null, "demo": null, "extra_links": [], "search_text": "train · pytorch / tensorflow · gpu hf/kaggle datasets, pytorch & tensorflow, gpu notebooks, train → inference. pytorch tensorflow gpu huggingface kaggle train · pytorch / tensorflow · gpu notebooks chỗ để mô hình thật sự học : dữ liệu từ hugging face / kaggle, code bằng pytorch hoặc tensorflow, chạy nhiều epoch trên gpu (colab/cloud) đến khi đủ tốt rồi export trọng số. vì sao quan trọng demo trong lab chỉ minh họa inference. muốn có mô hình để cắm vào, phải train ở đâu đó có gpu. note này gom lại stack thực tế đã dùng — công cụ nào, dữ liệu ở đâu, chạy ở đâu — để không phải nhớ lại mỗi lần bắt đầu một mô hình mới. hai lớp việc lớp việc output training hf/kaggle → notebook/endpoint → nhiều epoch trên gpu checkpoint inference nạp model → predict nhãn / hành động khái niệm hai pha xem 06 train infer.md . stack đã dùng pytorch — linh hoạt, hợp classifier và transformer; phần lớn code train trong lab. tensorflow — softmax regression, và embedding projector để nhìn vector. dữ liệu: hugging face datasets và kaggle — tải sẵn, có sẵn nhãn. gpu online: google colab / cloud notebook — train tới ~95%+ rồi export model. quy trình gọn trong ai lab browser demos minh họa flow, không thay gpu train. train thật ở notebook / kaggle / colab; sau đó lấy weights nhúng vào ui demo (car nn, sentiment…). tham khảo pytorch — training a classifier hugging face datasets related 06 train infer.md — hai pha train/infer demo: 04 demo car.md , 05 demo text.md , softmax.md", "body_text": "Train · PyTorch / TensorFlow · GPU notebooks Chỗ để mô hình thật sự học : dữ liệu từ Hugging Face / Kaggle, code bằng PyTorch hoặc TensorFlow, chạy nhiều epoch trên GPU (Colab/cloud) đến khi đủ tốt rồi export trọng số. Vì sao quan trọng Demo trong lab chỉ minh họa inference. Muốn có mô hình để cắm vào, phải train ở đâu đó có GPU. Note này gom lại stack thực tế đã dùng — công cụ nào, dữ liệu ở đâu, chạy ở đâu — để không phải nhớ lại mỗi lần bắt đầu một mô hình mới. Hai lớp việc Lớp Việc Output Training HF/Kaggle → notebook/endpoint → nhiều epoch trên GPU checkpoint Inference Nạp model → predict nhãn / hành động Khái niệm hai pha xem 06 train infer.md . Stack đã dùng PyTorch — linh hoạt, hợp classifier và transformer; phần lớn code train trong lab. TensorFlow — softmax regression, và Embedding Projector để nhìn vector. Dữ liệu: Hugging Face Datasets và Kaggle — tải sẵn, có sẵn nhãn. GPU online: Google Colab / cloud notebook — train tới ~95%+ rồi export model. Quy trình gọn Trong AI Lab Browser demos minh họa flow, không thay GPU train. Train thật ở notebook / Kaggle / Colab; sau đó lấy weights nhúng vào UI demo (car nn, sentiment…). Tham khảo PyTorch — Training a classifier Hugging Face Datasets Related 06 train infer.md — hai pha train/infer Demo: 04 demo car.md , 05 demo text.md , softmax.md"}, {"id": "car-nn", "num": "18", "date": "07/2025", "title": "Car NN — sensor to action", "summary": "3 cảm biến → mạng fully connected → forward / back / left / right. Ví dụ nhìn thấy được của phân loại.", "topics": ["fully-connected", "classification", "sensors"], "group": "concept", "page": "notes/car-nn.html", "slides": "slides/car-nn/index.html", "demo": "demos/car-nn/app/index.html", "extra_links": [], "search_text": "car nn — sensor to action 3 cảm biến → mạng fully connected → forward / back / left / right. ví dụ nhìn thấy được của phân loại. fully connected classification sensors demo: car nn — từ cảm biến ra hành động một chiếc xe đồ chơi có 3 cảm biến khoảng cách. một mạng nơ ron nhỏ (fully connected) nhìn 3 con số đó và quyết định: đi tới, lùi, rẽ trái hay rẽ phải. đây là ví dụ nhìn thấy được của phân loại. vì sao đáng xem các note khái niệm (embedding, softmax) khá trừu tượng. demo này rút gọn tất cả về mức \"thấy tận mắt\": đầu vào là 3 số, đầu ra là 1 trong 4 hành động, và bạn quan sát mạng đổi quyết định ngay khi vật cản dịch chuyển. nó cho cảm giác cụ thể về một lớp fully connected + softmax làm việc gì. ý chính đầu vào: ba cảm biến trái / giữa / phải, mỗi cái là số trong . không vật cản → gần 1; có vật cản → nhỏ dần. mạng: một (hoặc vài) lớp fully connected biến 3 số đầu vào thành 4 điểm — mỗi điểm cho một hành động. ra quyết định: softmax.md đổi 4 điểm thành xác suất, chọn hành động cao nhất → . trực giác \"học\": trọng số của lớp fully connected chính là thứ được điều chỉnh khi train, để bộ 3 cảm biến ánh xạ sang hành động hợp lý. kiến trúc slides & app link slides slides/car nn app demos/car nn/app related softmax.md — bước chọn hành động 06 train infer.md , train gpu.md — huấn luyện trọng số", "body_text": "Demo: Car NN — từ cảm biến ra hành động Một chiếc xe đồ chơi có 3 cảm biến khoảng cách. Một mạng nơ ron nhỏ (fully connected) nhìn 3 con số đó và quyết định: đi tới, lùi, rẽ trái hay rẽ phải. Đây là ví dụ nhìn thấy được của phân loại. Vì sao đáng xem Các note khái niệm (embedding, softmax) khá trừu tượng. Demo này rút gọn tất cả về mức \"thấy tận mắt\": đầu vào là 3 số, đầu ra là 1 trong 4 hành động, và bạn quan sát mạng đổi quyết định ngay khi vật cản dịch chuyển. Nó cho cảm giác cụ thể về một lớp fully connected + softmax làm việc gì. Ý chính Đầu vào: ba cảm biến trái / giữa / phải, mỗi cái là số trong . Không vật cản → gần 1; có vật cản → nhỏ dần. Mạng: một (hoặc vài) lớp fully connected biến 3 số đầu vào thành 4 điểm — mỗi điểm cho một hành động. Ra quyết định: softmax.md đổi 4 điểm thành xác suất, chọn hành động cao nhất → . Trực giác \"học\": trọng số của lớp fully connected chính là thứ được điều chỉnh khi train, để bộ 3 cảm biến ánh xạ sang hành động hợp lý. Kiến trúc Slides & app Link Slides slides/car nn App demos/car nn/app Related softmax.md — bước chọn hành động 06 train infer.md , train gpu.md — huấn luyện trọng số"}, {"id": "sentiment-routing", "num": "19", "date": "09/2025", "title": "Sentiment & complexity routing", "summary": "Đọc câu rồi dán nhãn: cảm xúc (neg/neu/pos) và định tuyến dễ/khó.", "topics": ["sentiment", "routing", "classification"], "group": "concept", "page": "notes/sentiment-routing.html", "slides": "slides/sentiment/index.html", "demo": "demos/sentiment/app/index.html", "extra_links": [{"label": "Complexity router slides", "href": "slides/complexity-router/index.html"}, {"label": "Complexity router app", "href": "demos/complexity-router/app/index.html"}], "search_text": "sentiment & complexity routing đọc câu rồi dán nhãn: cảm xúc (neg/neu/pos) và định tuyến dễ/khó. sentiment routing classification demo: sentiment & complexity routing hai demo văn bản dùng chung một ý: đọc một câu rồi dán nhãn cho nó. sentiment dán nhãn cảm xúc; complexity router dán nhãn \"câu này dễ hay khó\" để chọn cách xử lý. vì sao đáng xem đây là nơi chuỗi khái niệm tokenize → embedding → softmax chạy end to end trên câu chữ thật, và cho thấy phân loại không chỉ để \"đoán cảm xúc\" mà còn để điều phối hệ thống: câu dễ thì trả lời nhanh, câu khó mới huy động agent phức tạp. hai pipeline ý chính sentiment (phân loại cảm xúc): ba lớp tiêu cực / trung tính / tích cực. dùng lại đúng chuỗi tokenize.md → embedding.md → softmax.md . complexity router (định tuyến theo độ khó): phân loại yêu cầu thành \"đơn giản\" hay \"phức tạp\" rồi định tuyến — câu đơn giản đi model nhanh/rẻ, câu phức tạp mới gọi tới crew nhiều agent hoặc first mate. cùng một khuôn, khác mục đích: cả hai đều là bài phân loại; điểm khác là dùng nhãn để làm gì — hiển thị cảm xúc, hay quyết định đường đi tiếp theo. định tuyến = tiết kiệm: không phải câu nào cũng cần mô hình mạnh nhất; router giúp cân bằng chất lượng và chi phí, cùng tinh thần với 08 model notes.md . slides & apps demo slides app sentiment slides app complexity router slides app related tokenize.md , embedding.md , softmax.md 07 agents.md — crew / first mate cho nhánh phức tạp huấn luyện: 06 train infer.md , train gpu.md", "body_text": "Demo: Sentiment & Complexity routing Hai demo văn bản dùng chung một ý: đọc một câu rồi dán nhãn cho nó. Sentiment dán nhãn cảm xúc; Complexity router dán nhãn \"câu này dễ hay khó\" để chọn cách xử lý. Vì sao đáng xem Đây là nơi chuỗi khái niệm tokenize → embedding → softmax chạy end to end trên câu chữ thật, và cho thấy phân loại không chỉ để \"đoán cảm xúc\" mà còn để điều phối hệ thống: câu dễ thì trả lời nhanh, câu khó mới huy động agent phức tạp. Hai pipeline Ý chính Sentiment (phân loại cảm xúc): ba lớp tiêu cực / trung tính / tích cực. Dùng lại đúng chuỗi tokenize.md → embedding.md → softmax.md . Complexity router (định tuyến theo độ khó): phân loại yêu cầu thành \"đơn giản\" hay \"phức tạp\" rồi định tuyến — câu đơn giản đi model nhanh/rẻ, câu phức tạp mới gọi tới crew nhiều agent hoặc first mate. Cùng một khuôn, khác mục đích: cả hai đều là bài phân loại; điểm khác là dùng nhãn để làm gì — hiển thị cảm xúc, hay quyết định đường đi tiếp theo. Định tuyến = tiết kiệm: không phải câu nào cũng cần mô hình mạnh nhất; router giúp cân bằng chất lượng và chi phí, cùng tinh thần với 08 model notes.md . Slides & apps Demo Slides App Sentiment slides app Complexity router slides app Related tokenize.md , embedding.md , softmax.md 07 agents.md — crew / first mate cho nhánh phức tạp Huấn luyện: 06 train infer.md , train gpu.md"}, {"id": "train-infer", "num": "20", "date": "10/2025", "title": "Train → Inference", "summary": "Hai đời của mô hình: học weights nặng một lần (train) rồi dùng nhẹ nhiều lần (infer).", "topics": ["train", "inference", "checkpoint"], "group": "concept", "page": "notes/train-infer.html", "slides": null, "demo": null, "extra_links": [], "search_text": "train → inference hai đời của mô hình: học weights nặng một lần (train) rồi dùng nhẹ nhiều lần (infer). train inference checkpoint train → inference mọi mô hình đều sống hai đời: đời học (train) tốn công một lần để chỉnh trọng số, và đời dùng (inference) chạy đi chạy lại để dự đoán. hiểu tách bạch hai pha này giúp biết chỗ nào tốn gpu, chỗ nào chạy nhẹ. vì sao quan trọng người mới hay gộp \"ai\" thành một khối. thực ra phần nặng (train nhiều epoch trên gpu) chỉ làm một lần để ra checkpoint; phần nhẹ (inference) mới là thứ chạy trong app mỗi lần người dùng bấm. các demo trong lab đều là inference — train thật diễn ra ở notebook / cloud gpu rồi mới cắm trọng số vào. hai pha pha việc chi phí output train lặp qua dữ liệu nhiều epoch, so dự đoán với đáp án, chỉnh trọng số nặng, cần gpu checkpoint (bộ trọng số) inference nạp trọng số, đưa đầu vào, lấy dự đoán nhẹ, chạy realtime nhãn / hành động ý chính học = giảm sai số: mỗi vòng, mô hình dự đoán, đo lệch (loss, vd cross entropy đi cùng softmax.md ), rồi dịch trọng số theo hướng bớt lệch. checkpoint là \"thành phẩm\": train xong ta cất bộ trọng số; từ đó inference không cần dữ liệu train nữa. trong ai lab: browser demos = minh họa inference , không train trong trình duyệt. train nặng ở notebook protonx / kaggle / colab → export → cắm vào ui. related đầy đủ stack (pytorch, tensorflow, hf, kaggle, gpu): train gpu.md demo inference: 04 demo car.md , 05 demo text.md softmax.md — loss khi train phân loại", "body_text": "Train → Inference Mọi mô hình đều sống hai đời: đời học (train) tốn công một lần để chỉnh trọng số, và đời dùng (inference) chạy đi chạy lại để dự đoán. Hiểu tách bạch hai pha này giúp biết chỗ nào tốn GPU, chỗ nào chạy nhẹ. Vì sao quan trọng Người mới hay gộp \"AI\" thành một khối. Thực ra phần nặng (train nhiều epoch trên GPU) chỉ làm một lần để ra checkpoint; phần nhẹ (inference) mới là thứ chạy trong app mỗi lần người dùng bấm. Các demo trong lab đều là inference — train thật diễn ra ở notebook / cloud GPU rồi mới cắm trọng số vào. Hai pha Pha Việc Chi phí Output Train Lặp qua dữ liệu nhiều epoch, so dự đoán với đáp án, chỉnh trọng số Nặng, cần GPU checkpoint (bộ trọng số) Inference Nạp trọng số, đưa đầu vào, lấy dự đoán Nhẹ, chạy realtime nhãn / hành động Ý chính Học = giảm sai số: mỗi vòng, mô hình dự đoán, đo lệch (loss, vd cross entropy đi cùng softmax.md ), rồi dịch trọng số theo hướng bớt lệch. Checkpoint là \"thành phẩm\": train xong ta cất bộ trọng số; từ đó inference không cần dữ liệu train nữa. Trong AI Lab: browser demos = minh họa inference , không train trong trình duyệt. Train nặng ở notebook protonx / Kaggle / Colab → export → cắm vào UI. Related Đầy đủ stack (PyTorch, TensorFlow, HF, Kaggle, GPU): train gpu.md Demo inference: 04 demo car.md , 05 demo text.md softmax.md — loss khi train phân loại"}, {"id": "agents", "num": "21", "date": "12/2025", "title": "AI Agents · So sánh harness", "summary": "Harness ≠ model: Cursor, Claude Code, Pi, Cline/Kilo, OpenCode, Zed.", "topics": ["agents", "harness", "cursor", "claude", "pi", "first-mate"], "group": "concept", "page": "notes/agents.html", "s oding (mạnh terminal bench 2.1), không dẫn đầu tuyệt đối; được train cùng cursor. điểm mạnh chính = intelligence trên mỗi đơn vị thời gian & chi phí , hợp task verify được bằng máy. → đây chính là lý do \"chạy tốt hơn auto mà đốt ít tiền\": tốc độ cao + ít token. nguyên tắc rút ra greenfield (dự án mới, ít codebase): ưu tiên model mạnh reasoning (anthropic, grok) hơn deepseek/qwen. debug / fix trên codebase có sẵn : deepseek v4 rất hiệu quả, rẻ. cần ảnh (screenshot, diagram) : tránh deepseek (không nhận ảnh). cần tốc độ + chi phí thấp : grok 4.5 / composer fast. cần làm rõ ràng buộc, thiết kế skill : anthropic mạnh nhất ở hỏi ngược. tham khảo openrouter — models & giá lmarena leaderboard — xếp hạng theo bình chọn related 07 agents.md , mcp.md , skills rules.md , personal knowledge base.md", "body_text": "Model field notes Model ≠ harness. Đây là cảm nhận về bản thân mô hình (qua OpenRouter + Cursor). So sánh harness ở 07 agents.md . Bảng nhanh (kinh nghiệm cá nhân) Model / Mode Mạnh Yếu / chi phí Grok 4.5 Nhanh, mượt, cảm giác rất tốt; chất lượng cao; đốt ít tiền Không dẫn đầu mọi benchmark; hallucination cao hơn ở task không verify được Composer 2.5 Fast Rất nhanh, trả lời tốt Tốn tiền hơn Auto Cursor Auto Feedback loop nhanh Chất lượng dao động theo routing Anthropic Opus / Sonnet / Fable Hỏi ngược làm rõ context & skill cực tốt; tương tác chắc Chậm; có session limit DeepSeek V4 Debug / fix lỗi tốt Không nhận ảnh; yếu khi code mới (greenfield) Qwen 3 Task đơn giản Yếu ở complex follow / mô tả dự án lớn không có codebase Kimi / GLM Code tốt Đắt Grok 4.5 — vì sao ấn tượng Trải nghiệm: nhanh, mượt, thật sự rất tốt — đặc biệt khi để làm default trong Cursor thì tiền không bị đốt nhiều mà chất lượng còn tốt hơn Auto . Context công khai (xAI, 2026 07) khớp cảm nhận: Tối ưu cho coding + agentic, phục vụ ở tốc độ ~ 80 TPS (fast model). Token efficiency : dùng ~4.2× ít output token hơn Opus 4.8 trên SWE Bench Pro → rẻ hơn nhiều mỗi task (giá $2 in / $6 out /1M). Benchmark ngang tầm Opus 4.8 / GPT 5.5 ở nhiều eval coding (mạnh Terminal Bench 2.1), không dẫn đầu tuyệt đối; được train cùng Cursor. Điểm mạnh chính = intelligence trên mỗi đơn vị thời gian & chi phí , hợp task verify được bằng máy. → Đây chính là lý do \"chạy tốt hơn Auto mà đốt ít tiền\": tốc độ cao + ít token. Nguyên tắc rút ra Greenfield (dự án mới, ít codebase): ưu tiên model mạnh reasoning (Anthropic, Grok) hơn DeepSeek/Qwen. Debug / fix trên codebase có sẵn : DeepSeek V4 rất hiệu quả, rẻ. Cần ảnh (screenshot, diagram) : tránh DeepSeek (không nhận ảnh). Cần tốc độ + chi phí thấp : Grok 4.5 / Composer Fast. Cần làm rõ ràng buộc, thiết kế skill : Anthropic mạnh nhất ở hỏi ngược. Tham khảo OpenRouter — models & giá LMArena leaderboard — xếp hạng theo bình chọn Related 07 agents.md , mcp.md , skills rules.md , personal knowledge base.md"}, {"id": "agent-automation", "num": "23", "date": "03/2026", "title": "Agent automation — OpenClaw · Hermess", "summary": "Câu chuyện: OpenClaw (pi harness) mở màn cảm giác agent control mọi thứ → Hermess làm tốt.", "topics": ["openclaw", "hermess", "pi", "automation", "harness"], "group": "concept", "page": "notes/agent-automation.html", "slides": "slides/hermess/index.html", "demo": null, "extra_links": [], "search_text": "agent automation — openclaw · hermess câu chuyện: openclaw (pi harness) mở màn cảm giác agent control mọi thứ → hermess làm tốt. openclaw hermess pi automation harness agent automation — openclaw · hermess câu chuyện cá nhân về làn sóng \"ai agent tự chạy việc\": từ chatbot trả lời → agent cầm tay làm (chạy lệnh, đụng file, điều khiển máy). hai con mình dùng qua: openclaw và hermess . bối cảnh trước đây ai chỉ trả lời : hỏi — đáp, còn làm là việc của mình. bước ngoặt là khi agent bắt đầu tích hợp vào máy và control mọi thứ : tự mở terminal, sửa file, gọi tool, chạy cả một chuỗi task mà không cần mình bấm từng bước. openclaw — con đầu tiên cho cảm giác đó dùng làm harness: đơn giản, nhanh, gọn, nhẹ — cắm vào là chạy ta
