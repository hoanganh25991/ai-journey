<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Car NN · App</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #eef3f9; --ink: #16202e; --muted: #5a6b80; --amber: #c2703a; --cyan: #0f8a9b; --line: rgba(20,32,46,.12);
  --font: Sora, sans-serif; --mono: "IBM Plex Mono", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh; background: radial-gradient(ellipse at 80% 0%, rgba(194,112,58,.10), transparent 50%), var(--bg);
  color: var(--ink); font-family: var(--font); padding: 32px 40px 48px;
}
header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 28px; }
header h1 { font-size: 28px; }
header a { color: var(--cyan); font-family: var(--mono); font-size: 13px; text-decoration: none; }
.grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 28px; max-width: 1100px; }
canvas {
  width: 100%; height: 360px; background: #ffffff; border: 1px solid var(--line);
  border-radius: 16px; display: block;
}
.panel { border: 1px solid var(--line); border-radius: 16px; padding: 22px; background: rgba(255,255,255,.88); }
.panel h2 { font-size: 14px; font-family: var(--mono); letter-spacing: .1em; text-transform: uppercase; color: var(--amber); margin-bottom: 16px; }
label { display: block; font-size: 14px; color: var(--muted); margin: 14px 0 6px; font-family: var(--mono); }
input[type=range] { width: 100%; accent-color: var(--cyan); }
.val { float: right; color: var(--ink); }
.actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
.actions div {
  text-align: center; padding: 14px 8px; border-radius: 12px; border: 1px solid var(--line);
  font-family: var(--mono); font-size: 12px; color: var(--muted);
}
.actions div.on { border-color: var(--amber); color: var(--amber); background: rgba(194,112,58,.10); }
.hint { margin-top: 18px; font-size: 14px; color: var(--muted); line-height: 1.5; }
@media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
</style>
<link rel="stylesheet" href="../../_shared/app.css" />
</head>
<body>
<header>
  <h1>Car NN · working app</h1>
  <div>
    <a href="../../../slides/car-nn/">Slides</a>
    ·
    <a href="../../../index.html">Lab UI</a>
  </div>
</header>
<div class="grid">
  <div>
    <canvas id="c" width="640" height="360"></canvas>
    <p class="hint">Drag the 3 sensors. Obstacle = low value. Small FC network (demo weights) picks the action.</p>
  </div>
  <div class="panel">
    <h2>Sensors [0–1]</h2>
    <label>Left <span class="val" id="vl">1.00</span></label>
    <input id="left" type="range" min="0" max="1" step="0.01" value="1" />
    <label>Middle <span class="val" id="vm">1.00</span></label>
    <input id="mid" type="range" min="0" max="1" step="0.01" value="1" />
    <label>Right <span class="val" id="vr">1.00</span></label>
    <input id="right" type="range" min="0" max="1" step="0.01" value="1" />
    <h2 style="margin-top:24px;">Output</h2>
    <div class="actions" id="acts">
      <div data-a="forward">forward</div>
      <div data-a="back">back</div>
      <div data-a="left">left</div>
      <div data-a="right">right</div>
    </div>
    <p class="hint" id="logits"></p>
  </div>
</div>
<script>
// Tiny FC: 3 → 6 → 4 (hand-tuned for demo pedagogy)
const W1 = [
  [1.2, -0.4, 0.2, 0.8, -0.3, 0.1],
  [0.3, 1.4, 0.3, -0.5, 0.9, -0.2],
  [0.2, -0.3, 1.2, 0.1, -0.4, 0.8],
];
const b1 = [0.1, 0.1, 0.1, 0, 0, 0];
const W2 = [
  // forward, back, left, right
  [0.9, -0.6, -0.2, -0.2],
  [-0.5, 0.2, 0.1, 0.1],
  [0.8, -0.5, -0.1, -0.1],
  [-0.2, -0.1, 1.1, -0.7],
  [0.3, 0.9, -0.2, -0.2],
  [-0.2, -0.1, -0.7, 1.1],
];
const b2 = [0.2, -0.3, 0, 0];
const labels = ["forward", "back", "left", "right"];

function relu(x) { return Math.max(0, x); }
function infer(x) {
  const h = b1.map((b, j) => relu(b + x[0]*W1[0][j] + x[1]*W1[1][j] + x[2]*W1[2][j]));
  const o = b2.map((b, k) => b + h.reduce((s, hj, j) => s + hj * W2[j][k], 0));
  // bias: if all clear → forward
  if (x[0] > 0.85 && x[1] > 0.85 && x[2] > 0.85) o[0] += 1.5;
  // obstacle ahead → prefer turn toward clearer side or back
  if (x[1] < 0.45) {
    o[0] -= 1.2;
    if (x[0] > x[2]) o[2] += 1.0; else o[3] += 1.0;
    if (x[1] < 0.25) o[1] += 0.8;
  }
  let best = 0;
  for (let i = 1; i < 4; i++) if (o[i] > o[best]) best = i;
  return { logits: o, action: labels[best] };
}

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
function draw(L, M, R, action) {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  // road
  ctx.fillStyle = "#dde5ee";
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = "rgba(20,32,46,.14)";
  ctx.beginPath(); ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h); ctx.stroke();
  // obstacles as bars at sensor directions
  const sensors = [
    { v: L, ang: -0.7, label: "L" },
    { v: M, ang: 0, label: "M" },
    { v: R, ang: 0.7, label: "R" },
  ];
  const cx = w/2, cy = h*0.72;
  sensors.forEach((s) => {
    const dist = 40 + s.v * 180;
    const x = cx + Math.sin(s.ang) * dist;
    const y = cy - Math.cos(s.ang) * dist;
    ctx.strokeStyle = s.v < 0.5 ? "#c2703a" : "#0f8a9b";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x, y); ctx.stroke();
    ctx.fillStyle = s.v < 0.5 ? "#c2703a" : "#0f8a9b";
    ctx.beginPath(); ctx.arc(x, y, 8 + (1-s.v)*10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#5a6b80";
    ctx.font = "12px IBM Plex Mono";
    ctx.fillText(`${s.label}:${s.v.toFixed(2)}`, x - 18, y - 14);
  });
  // car
  ctx.fillStyle = "#16202e";
  ctx.fillRect(cx - 18, cy - 12, 36, 28);
  ctx.fillStyle = "#c2703a";
  ctx.font = "bold 14px Sora";
  ctx.fillText(action.toUpperCase(), 24, 36);
}

function tick() {
  const L = +left.value, M = +mid.value, R = +right.value;
  vl.textContent = L.toFixed(2);
  vm.textContent = M.toFixed(2);
  vr.textContent = R.toFixed(2);
  const { logits, action } = infer([L, M, R]);
  document.querySelectorAll("#acts div").forEach((el) => {
    el.classList.toggle("on", el.dataset.a === action);
  });
  logitsEl.textContent = "logits: " + logits.map((n, i) => `${labels[i]}=${n.toFixed(2)}`).join(" · ");
  draw(L, M, R, action);
}
const left = document.getElementById("left");
const mid = document.getElementById("mid");
const right = document.getElementById("right");
const vl = document.getElementById("vl");
const vm = document.getElementById("vm");
const vr = document.getElementById("vr");
const logitsEl = document.getElementById("logits");
[left, mid, right].forEach((el) => el.addEventListener("input", tick));
tick();
</script>
<script>window.LAB={"kind": "app", "title": "Car Nn · Demo", "download": "../car-nn.zip", "downloadName": "car-nn.zip"};</script>
<script src="../../_shared/chrome.js"></script>

</body>
</html>
