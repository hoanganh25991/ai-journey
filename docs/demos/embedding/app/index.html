<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Embedding · App</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#eef3f9;--ink:#16202e;--muted:#5a6b80;--amber:#c2703a;--cyan:#0f8a9b;--line:rgba(20,32,46,.12)}
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:Sora,sans-serif;padding:28px 32px}
header{display:flex;justify-content:space-between;margin-bottom:20px}a{color:var(--cyan);font:13px "IBM Plex Mono",monospace;text-decoration:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:960px}
canvas{width:100%;height:360px;background:#ffffff;border:1px solid var(--line);border-radius:14px}
select,button{background:#ffffff;border:1px solid var(--line);color:var(--ink);padding:10px 12px;border-radius:8px;font:13px "IBM Plex Mono",monospace;margin:6px 6px 6px 0}
.meta{color:var(--muted);font:13px "IBM Plex Mono",monospace;line-height:1.6;margin-top:12px}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
</style><link rel="stylesheet" href="../../_shared/app.css" />
</head><body>
<header><h1>Embedding · app</h1><div><a href="../../../slides/embedding/">Slides</a> · <a href="../../../index.html">Lab UI</a></div></header>
<div class="grid">
  <canvas id="c" width="480" height="360"></canvas>
  <div>
    <div>
      <label>A </label><select id="a"></select>
      <label>B </label><select id="b"></select>
    </div>
    <p class="meta" id="out"></p>
    <p class="meta">Toy 2D embeddings — cosine gần 1 = gần nghĩa (demo). Thật: dim 384–1024+, xem TensorFlow Projector ảnh protonx.</p>
  </div>
</div>
<script>
const V={
  king:[0.9,0.8], queen:[0.85,0.75], man:[0.7,0.2], woman:[0.65,0.15],
  apple:[0.1,0.9], orange:[0.15,0.85], car:[0.2,0.1], bus:[0.25,0.12],
  happy:[0.8,-0.3], sad:[-0.7,-0.2], embedding:[0.4,0.4], tokenize:[-0.2,0.5]
};
const keys=Object.keys(V);
a.innerHTML=b.innerHTML=keys.map(k=>`<option>${k}</option>`).join("");
a.value="king"; b.value="queen";
function cos(u,v){const d=Math.hypot(...u)*Math.hypot(...v)||1; return (u[0]*v[0]+u[1]*v[1])/d;}
function draw(){
  const ctx=c.getContext("2d"), w=c.width, h=c.height;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle="rgba(20,32,46,.14)";
  ctx.beginPath(); ctx.moveTo(w/2,0); ctx.lineTo(w/2,h); ctx.moveTo(0,h/2); ctx.lineTo(w,h/2); ctx.stroke();
  const toXY=([x,y])=>[w/2+x*140, h/2-y*140];
  for(const [k,vec] of Object.entries(V)){
    const [x,y]=toXY(vec);
    const hi=k===a.value||k===b.value;
    ctx.fillStyle=hi?"#c2703a":"#0f8a9b";
    ctx.beginPath(); ctx.arc(x,y,hi?7:4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#5a6b80"; ctx.font="11px IBM Plex Mono"; ctx.fillText(k,x+8,y-6);
  }
  const u=V[a.value], v=V[b.value];
  const s=cos(u,v);
  out.textContent=`cosine(${a.value}, ${b.value}) = ${s.toFixed(3)}`;
}
a.onchange=b.onchange=draw; draw();
</script><script>window.LAB={"kind": "app", "title": "Embedding · Demo", "download": "../embedding.zip", "downloadName": "embedding.zip"};</script>
<script src="../../_shared/chrome.js"></script>

</body></html>
