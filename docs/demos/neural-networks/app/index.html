<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Neural Networks · App</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../../_shared/app.css"/>
<style>
header{display:flex;justify-content:space-between;margin-bottom:16px;max-width:1000px}
a{color:var(--cyan);font:13px var(--mono);text-decoration:none}
.wrap{max-width:1000px;display:grid;grid-template-columns:1.1fr 1fr;gap:22px}
canvas{width:100%;height:360px;background:#fff;border:1px solid var(--line);border-radius:14px}
.panel{border:1px solid var(--line);border-radius:14px;padding:18px;background:rgba(255,255,255,.9)}
label{display:block;margin:12px 0 6px;font:13px var(--mono);color:var(--muted)}
input[type=range]{width:100%;accent-color:var(--cyan)}
.meta{font:13px var(--mono);color:var(--muted);margin-top:12px;line-height:1.5}
@media(max-width:800px){.wrap{grid-template-columns:1fr}}
</style></head><body>
<header><h1>Neural networks · app</h1><div><a href="../../../slides/neural-networks/">Slides</a> · <a href="../../../index.html">Lab UI</a></div></header>
<div class="wrap">
  <canvas id="c" width="640" height="360"></canvas>
  <div class="panel">
    <h2 style="font:14px var(--mono);color:var(--amber);letter-spacing:.08em;text-transform:uppercase">Architecture</h2>
    <label>Hidden width <span id="vw">4</span></label>
    <input id="w" type="range" min="2" max="10" step="1" value="4"/>
    <label>Depth (hidden layers) <span id="vd">1</span></label>
    <input id="d" type="range" min="1" max="3" step="1" value="1"/>
    <label>Manual weight w₀₀ <span id="vww">0.80</span></label>
    <input id="ww" type="range" min="-2" max="2" step="0.05" value="0.8"/>
    <p class="meta" id="info"></p>
    <p class="meta">Left: live graph of layers. Edit width/depth (hyperparams) or one weight by hand — same intuition as the Understanding AI videos.</p>
  </div>
</div>
<script>
const c=document.getElementById('c'), ctx=c.getContext('2d');
const wEl=document.getElementById('w'), dEl=document.getElementById('d'), wwEl=document.getElementById('ww');
function paint(){
  const width=+wEl.value, depth=+dEl.value, w00=+wwEl.value;
  document.getElementById('vw').textContent=width;
  document.getElementById('vd').textContent=depth;
  document.getElementById('vww').textContent=w00.toFixed(2);
  const layers=[3, ...Array(depth).fill(width), 4];
  document.getElementById('info').textContent=`shape [${layers.join(', ')}] · params≈${layers.slice(0,-1).reduce((s,n,i)=>s+n*layers[i+1],0)}`;
  ctx.clearRect(0,0,c.width,c.height);
  const cols=layers.length;
  const xs=layers.map((_,i)=>40+(c.width-80)*i/(cols-1));
  const nodes=layers.map((n,li)=>Array.from({length:n},(_,j)=>{
    const y=40+(c.height-80)*(n===1?0.5:j/(n-1));
    return {x:xs[li],y};
  }));
  ctx.lineWidth=1.5;
  for(let li=0;li<cols-1;li++){
    for(let i=0;i<nodes[li].length;i++){
      for(let j=0;j<nodes[li+1].length;j++){
        const special=li===0&&i===0&&j===0;
        ctx.strokeStyle=special?'#c2703a':`rgba(15,138,155,${0.15+0.15*Math.abs(Math.sin(i+j))})`;
        if(special) ctx.lineWidth=3; else ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(nodes[li][i].x,nodes[li][i].y);
        ctx.lineTo(nodes[li+1][j].x,nodes[li+1][j].y);
        ctx.stroke();
      }
    }
  }
  nodes.forEach((col,li)=>col.forEach((p,i)=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,10,0,Math.PI*2);
    ctx.fillStyle=li===0?'#0f8a9b':li===cols-1?'#c2703a':'#16202e';
    ctx.globalAlpha=li>0&&li<cols-1?0.75:1; ctx.fill(); ctx.globalAlpha=1;
  }));
}
[wEl,dEl,wwEl].forEach(el=>el.oninput=paint); paint();
</script><script>window.LAB={"kind": "app", "title": "Neural Networks · Demo", "download": "../neural-networks.zip", "downloadName": "neural-networks.zip"};</script>
<script src="../../_shared/chrome.js"></script>

</body></html>
