<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MCP · App</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#eef3f9;--ink:#16202e;--muted:#5a6b80;--amber:#c2703a;--cyan:#0f8a9b;--line:rgba(20,32,46,.12)}
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:Sora,sans-serif;padding:28px 32px}
header{display:flex;justify-content:space-between;margin-bottom:20px}a{color:var(--cyan);font:13px "IBM Plex Mono",monospace;text-decoration:none}
.flow{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:20px 0}
.box{border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:#ffffff;min-width:140px}
.box strong{display:block;color:var(--amber);font:12px "IBM Plex Mono",monospace;margin-bottom:6px}
.arr{color:var(--amber)}
.tools{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;max-width:900px;margin-top:12px}
.tools button{text-align:left;background:#ffffff;border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:14px;cursor:pointer;font:14px Sora,sans-serif}
.tools button:hover{border-color:var(--cyan)}
.log{margin-top:18px;font:12px "IBM Plex Mono",monospace;color:var(--muted);white-space:pre-wrap;max-width:800px;line-height:1.6;border:1px solid var(--line);border-radius:12px;padding:14px;min-height:120px;background:#f4f7fb}
</style><link rel="stylesheet" href="../../_shared/app.css" />
</head><body>
<header><h1>MCP · app</h1><div><a href="../../../slides/mcp/">Slides</a> · <a href="../../../index.html">Lab UI</a></div></header>
<div class="flow">
  <div class="box"><strong>HOST</strong>Cursor / Claude</div><span class="arr">→</span>
  <div class="box"><strong>MCP SERVER</strong>tools protocol</div><span class="arr">→</span>
  <div class="box"><strong>TOOLS</strong>browser · blender · …</div>
</div>
<p style="color:var(--muted);font-size:14px;max-width:700px;line-height:1.5;margin-bottom:12px">
Mock tool calls — minh họa MCP. Skills/rules nằm ở <code style="color:var(--cyan)">~/.agents</code>; MCP là kênh gọi tool có schema.
</p>
<div class="tools">
  <button data-t="browser_navigate">browser_navigate</button>
  <button data-t="execute_blender_code">execute_blender_code</button>
  <button data-t="tavily_search">tavily_search</button>
  <button data-t="kb_search">kb_search (local)</button>
</div>
<pre class="log" id="log">Click a tool…</pre>
<script>
const payloads={
  browser_navigate:{url:"http://127.0.0.1:8765"},
  execute_blender_code:{code:"bpy.ops.mesh.primitive_cube_add()"},
  tavily_search:{query:"first mate AI automation"},
  kb_search:{q:"Tiny URL system design"}
};
document.querySelectorAll(".tools button").forEach(b=>b.onclick=()=>{
  const name=b.dataset.t;
  const req={jsonrpc:"2.0", method:"tools/call", params:{name, arguments:payloads[name]}};
  log.textContent="→ host calls MCP\n"+JSON.stringify(req,null,2)+"\n\n← server result (mock)\n"+JSON.stringify({ok:true, tool:name, note:"Wire real MCP in Cursor Settings → MCP"},null,2);
});
</script><script>window.LAB={"kind": "app", "title": "Mcp · Demo", "download": "../mcp.zip", "downloadName": "mcp.zip"};</script>
<script src="../../_shared/chrome.js"></script>

</body></html>
