<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Complexity Router · App</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:#eef3f9; --ink:#16202e; --muted:#5a6b80; --amber:#c2703a; --cyan:#0f8a9b; --line:rgba(20,32,46,.12);
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  min-height:100vh; background:radial-gradient(ellipse at 90% 20%, rgba(194,112,58,.10), transparent 50%), var(--bg);
  color:var(--ink); font-family:Sora,sans-serif; padding:32px 40px;
}
header { display:flex; justify-content:space-between; margin-bottom:24px; }
header a { color:var(--cyan); font-family:"IBM Plex Mono",monospace; font-size:13px; text-decoration:none; }
.wrap { max-width:800px; }
textarea {
  width:100%; min-height:160px; background:#ffffff; border:1px solid var(--line); border-radius:14px;
  color:var(--ink); padding:16px; font:16px/1.5 Sora,sans-serif;
}
.meter {
  margin-top:20px; height:14px; background:#ffffff; border-radius:999px; overflow:hidden; border:1px solid var(--line);
}
.meter > div { height:100%; width:0; background:linear-gradient(90deg, var(--cyan), var(--amber)); transition:width .25s; }
.route {
  margin-top:22px; display:grid; grid-template-columns:1fr 1fr; gap:16px;
}
.card {
  border:1px solid var(--line); border-radius:14px; padding:18px; background:rgba(255,255,255,.9);
  opacity:.45; transition:opacity .2s, border-color .2s;
}
.card.on { opacity:1; border-color:var(--amber); }
.card h3 { font-size:16px; margin-bottom:8px; }
.card p { color:var(--muted); font-size:14px; line-height:1.45; }
.meta { margin-top:16px; font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--muted); line-height:1.6; }
</style>
<link rel="stylesheet" href="../../_shared/app.css" />
</head>
<body>
<header>
  <h1>Complexity router · working app</h1>
  <div><a href="../../../slides/complexity-router/">Slides</a> · <a href="../../../index.html">Lab UI</a></div>
</header>
<div class="wrap">
  <textarea id="t">Design a multi-agent system with a first mate that orchestrates crew skills and agents.md for a large greenfield refactor.</textarea>
  <div class="meter"><div id="bar"></div></div>
  <div class="route">
    <div class="card" id="simple">
      <h3>Fast path · simple</h3>
      <p>Trả lời thẳng / small model / rule. Không cần crew.</p>
    </div>
    <div class="card" id="complex">
      <h3>Heavy path · complex</h3>
      <p>First mate → orchestrate crewmates · skills · agents.md.</p>
    </div>
  </div>
  <p class="meta" id="meta"></p>
</div>
<script>
const HEAVY = [
  "architect","architecture","migrate","migration","refactor","multi-agent","agents",
  "orchestrat","first mate","firstmate","crew","greenfield","distributed","system design",
  "taxonomy","knowledge base","end-to-end","production","scale"
];
function score(text) {
  const t = text.toLowerCase();
  const words = t.split(/\s+/).filter(Boolean);
  let s = 0;
  const hits = [];
  if (words.length > 28) { s += 0.25; hits.push("long"); }
  if (words.length > 50) { s += 0.15; hits.push("very-long"); }
  if (/(then|after that|sau đó|và rồi|\d+\.)/i.test(text)) { s += 0.2; hits.push("multi-step"); }
  for (const k of HEAVY) {
    if (t.includes(k)) { s += 0.18; hits.push(k); }
  }
  s = Math.min(1, s);
  return { s, hits, route: s >= 0.45 ? "complex" : "simple" };
}
function render() {
  const { s, hits, route } = score(t.value);
  bar.style.width = Math.round(s * 100) + "%";
  simple.classList.toggle("on", route === "simple");
  complex.classList.toggle("on", route === "complex");
  meta.textContent = `complexity=${s.toFixed(2)} · route=${route} · signals=${hits.slice(0, 8).join(", ") || "none"}`;
}
const t = document.getElementById("t");
const bar = document.getElementById("bar");
const simple = document.getElementById("simple");
const complex = document.getElementById("complex");
const meta = document.getElementById("meta");
t.addEventListener("input", render);
render();
</script>

<script src="../../_shared/chrome.js"></script>

</body>
</html>
