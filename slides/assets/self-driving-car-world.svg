<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Virtual world graph to road borders to corridor">
  <rect width="960" height="540" fill="#eef3f9"/>
  <text x="48" y="64" font-family="ui-monospace,monospace" font-size="22" fill="#c2703a">world</text>
  <text x="48" y="110" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="#16202e">Graph -&gt; borders -&gt; corridor</text>
  <g transform="translate(70,170)">
    <circle cx="40" cy="40" r="10" fill="#0f8a9b"/>
    <circle cx="160" cy="20" r="10" fill="#0f8a9b"/>
    <circle cx="180" cy="140" r="10" fill="#0f8a9b"/>
    <circle cx="40" cy="160" r="10" fill="#0f8a9b"/>
    <circle cx="100" cy="90" r="10" fill="#0f8a9b"/>
    <path d="M40 40 L160 20 L100 90 L40 40 M160 20 L180 140 L100 90 M40 160 L100 90 L40 40" stroke="#16202e" stroke-width="2" fill="none" opacity=".35"/>
    <text x="110" y="210" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#5a6b80">graph</text>
  </g>
  <path d="M320 260 H380" stroke="#0f8a9b" stroke-width="3" fill="none"/>
  <polygon points="380,253 398,260 380,267" fill="#0f8a9b"/>
  <g transform="translate(430,190)">
    <rect x="20" y="10" width="160" height="140" rx="8" fill="#fff" stroke="#d0d7e0"/>
    <path d="M40 20 V140 M160 20 V140" stroke="#16202e" stroke-width="4"/>
    <path d="M80 20 V140 M120 20 V140" stroke="#0f8a9b" stroke-width="2" stroke-dasharray="10 10"/>
    <text x="100" y="180" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#5a6b80">road borders</text>
  </g>
  <path d="M640 260 H700" stroke="#0f8a9b" stroke-width="3" fill="none"/>
  <polygon points="700,253 718,260 700,267" fill="#0f8a9b"/>
  <g transform="translate(740,200)">
    <path d="M20 120 C40 40, 100 40, 140 20" stroke="#c2703a" stroke-width="8" fill="none" stroke-linecap="round"/>
    <circle cx="20" cy="120" r="8" fill="#0f8a9b"/>
    <circle cx="140" cy="20" r="8" fill="#c2703a"/>
    <text x="80" y="170" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#5a6b80">corridor -&gt; target</text>
  </g>
  <text x="48" y="480" font-family="system-ui,sans-serif" font-size="18" fill="#5a6b80">OSM overlay -&gt; .world -&gt; same sensors + brain on a real campus map.</text>
